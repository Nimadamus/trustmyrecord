<html lang="en">

    <style>
        :root {
            --bg: #0b1220;
            --bg-2: #101827;
            --panel: rgba(15, 23, 42, 0.86);
            --panel-2: rgba(17, 28, 49, 0.78);
            --line: rgba(148, 163, 184, 0.18);
            --line-strong: rgba(45, 212, 191, 0.32);
            --text: #f8fafc;
            --muted: #9aa8bc;
            --muted-2: #6f7f95;
            --teal: #2dd4bf;
            --teal-soft: rgba(45, 212, 191, 0.12);
            --gold: #d4a72c;
            --green: #22c55e;
            --red: #ef4444;
            --radius: 24px;
            --shadow: 0 28px 78px rgba(0, 0, 0, 0.28);
            --font: "Inter", system-ui, sans-serif;
            --display: "Barlow Condensed", system-ui, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: var(--font);
            background:
                radial-gradient(circle at 12% 0%, rgba(45,212,191,0.13), transparent 34%),
                radial-gradient(circle at 90% 8%, rgba(212,167,44,0.10), transparent 30%),
                linear-gradient(180deg, #0b1220 0%, #101827 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.18;
            background-image:
                linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 46px 46px;
            mask-image: linear-gradient(180deg, black, transparent 70%);
        }

        a { color: inherit; text-decoration: none; }

        .shell {
            width: min(1220px, calc(100% - 36px));
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .nav {
            min-height: 76px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 22px;
            align-items: center;
            border-bottom: 1px solid var(--line);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: var(--display);
            font-size: clamp(1.8rem, 2.5vw, 2.45rem);
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand-mark {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 13px;
            color: #06120f;
            background: linear-gradient(135deg, var(--teal), #b9fff1);
            font: 900 0.78rem/1 var(--font);
        }

        .brand span span { color: var(--teal); }

        .nav-links {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: clamp(12px, 2vw, 26px);
        }

        .nav-links a {
            color: #dce8f5;
            font-family: var(--display);
            font-size: clamp(1.05rem, 1.4vw, 1.35rem);
            font-weight: 800;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .nav-links a:hover { color: var(--teal); }

        .nav-actions {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .nav-actions .auth-link {
            display: inline-flex;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 10px 16px;
            color: var(--text);
            background: rgba(255,255,255,0.055);
            font-size: 0.9rem;
            font-weight: 850;
            white-space: nowrap;
        }

        .btn.primary {
            color: #06120f;
            border-color: transparent;
            background: linear-gradient(135deg, var(--teal), #b9fff1);
            box-shadow: 0 18px 44px rgba(45,212,191,0.18);
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 0.94fr) minmax(420px, 0.82fr);
            gap: clamp(30px, 4.4vw, 58px);
            align-items: center;
            padding: 32px 0 26px;
        }

        .hero-copy {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 30px;
            padding: clamp(26px, 3.6vw, 42px);
            background:
                radial-gradient(circle at 18% 0%, rgba(45,212,191,0.16), transparent 32%),
                linear-gradient(145deg, rgba(17,28,49,0.92), rgba(10,17,31,0.98));
            box-shadow: var(--shadow);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            border: 1px solid var(--line-strong);
            border-radius: 999px;
            padding: 9px 13px;
            color: #d9fffa;
            background: var(--teal-soft);
            font-size: clamp(0.82rem, 1vw, 0.98rem);
            font-weight: 900;
            letter-spacing: 0.085em;
            text-transform: uppercase;
        }

        h1, h2, h3 {
            margin: 0;
            font-family: var(--display);
            letter-spacing: -0.018em;
        }

        h1 {
            max-width: 560px;
            margin-top: 20px;
            font-size: clamp(3.55rem, 6.1vw, 6.2rem);
            line-height: 0.94;
            text-transform: uppercase;
        }

        .hero-copy p {
            max-width: 580px;
            margin: 18px 0 0;
            color: #cbd6e4;
            font-size: clamp(1rem, 1.12vw, 1.14rem);
            line-height: 1.58;
            font-weight: 650;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        .hero-points {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 26px;
        }

        .hero-point {
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 16px;
            padding: 13px;
            background: rgba(255,255,255,0.05);
        }

        .hero-point b {
            display: block;
            font-size: 0.9rem;
            color: var(--text);
        }

        .hero-point span {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.78rem;
            line-height: 1.35;
            font-weight: 700;
        }

        .hero-media {
            border: 1px solid var(--line);
            border-radius: 28px;
            overflow: hidden;
            background: #06111f;
            box-shadow: var(--shadow);
        }

        .hero-media img {
            display: block;
            width: 100%;
            height: clamp(400px, 38vw, 520px);
            object-fit: cover;
        }

        .media-caption {
            padding: 16px;
            border-top: 1px solid var(--line);
            background:
                radial-gradient(circle at 90% 0%, rgba(45,212,191,0.14), transparent 34%),
                rgba(8, 15, 27, 0.96);
        }

        .media-caption small {
            display: block;
            color: var(--teal);
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .media-caption strong {
            display: block;
            margin-top: 7px;
            color: var(--text);
            font-size: 0.98rem;
            line-height: 1.4;
        }

        .caption-pills {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .caption-pills span {
            border-radius: 999px;
            padding: 8px 9px;
            text-align: center;
            color: #d9e4f0;
            background: rgba(255,255,255,0.06);
            font-size: 0.76rem;
            font-weight: 800;
        }

        .section {
            padding: 26px 0;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            gap: 24px;
            align-items: end;
            margin-bottom: 18px;
        }

        .section-head h2 {
            max-width: 520px;
            font-size: clamp(2rem, 3.3vw, 3.25rem);
            line-height: 1.04;
            text-transform: none;
        }

        .section-head p {
            max-width: 510px;
            margin: 0;
            color: var(--muted);
            line-height: 1.58;
            font-weight: 650;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .feature-card,
        .visual-card,
        .trust-card {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.065), rgba(255,255,255,0.03)),
                var(--panel);
            box-shadow: 0 20px 54px rgba(0,0,0,0.18);
        }

        .feature-card {
            min-height: 190px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .feature-card::after {
            content: "";
            position: absolute;
            inset: auto -45px -55px auto;
            width: 120px;
            height: 120px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(45,212,191,0.14), transparent 66%);
        }

        .icon {
            width: 46px;
            height: 46px;
            display: grid;
            place-items: center;
            border-radius: 15px;
            color: #06120f;
            background: linear-gradient(135deg, var(--teal), #b9fff1);
            font-weight: 900;
        }

        .feature-card h3 {
            margin-top: 16px;
            font-size: 1.45rem;
            line-height: 1;
        }

        .feature-card p {
            margin: 9px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.48;
            font-weight: 650;
        }

        .visual-grid {
            display: grid;
            grid-template-columns: 0.95fr 1.05fr;
            gap: 16px;
            align-items: stretch;
        }

        .visual-card {
            padding: 22px;
        }

        .record-card {
            display: grid;
            gap: 12px;
        }

        .record-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .record-badge {
            border: 1px solid var(--line-strong);
            border-radius: 999px;
            padding: 7px 10px;
            color: var(--teal);
            background: var(--teal-soft);
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.09em;
            text-transform: uppercase;
        }

        .mock-profile {
            display: grid;
            grid-template-columns: 54px 1fr;
            gap: 12px;
            align-items: center;
        }

        .mock-avatar {
            width: 54px;
            height: 54px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            color: #06120f;
            background: linear-gradient(135deg, var(--gold), var(--teal));
            font: 900 1rem/1 var(--font);
        }

        .mock-profile b {
            display: block;
            font-size: 1.04rem;
        }

        .mock-profile span {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 650;
        }

        .record-bars {
            display: grid;
            gap: 9px;
            margin-top: 8px;
        }

        .bar {
            height: 11px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .bar span {
            display: block;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--teal), rgba(45,212,191,0.20));
        }

        .feed-mock {
            display: grid;
            gap: 12px;
        }

        .feed-card {
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 18px;
            padding: 14px;
            background: rgba(255,255,255,0.045);
        }

        .feed-card b {
            display: block;
            font-size: 0.95rem;
        }

        .feed-card span {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 0.84rem;
            line-height: 1.4;
            font-weight: 650;
        }

        .mini-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .mini-pills span {
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 999px;
            padding: 6px 8px;
            color: #dce8f5;
            background: rgba(255,255,255,0.045);
            font-size: 0.72rem;
            font-weight: 800;
        }

        .trust-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .live-grid {
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 16px;
        }

        .live-panel,
        .pulse-card {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.065), rgba(255,255,255,0.03)),
                var(--panel);
            box-shadow: 0 20px 54px rgba(0,0,0,0.18);
        }

        .live-panel {
            padding: 22px;
        }

        .live-panel-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            margin-bottom: 16px;
        }

        .live-panel-head h3 {
            font-size: 1.75rem;
            line-height: 1;
        }

        .live-panel-head p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.45;
            font-weight: 650;
        }

        .panel-link {
            color: var(--teal);
            font-size: 0.82rem;
            font-weight: 850;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .panel-link:hover {
            color: #b9fff1;
        }

        .panel-note {
            margin-top: 14px;
            color: var(--muted-2);
            font-size: 0.78rem;
            line-height: 1.45;
            font-weight: 650;
        }

        .live-loading,
        .live-empty {
            display: grid;
            place-items: center;
            min-height: 220px;
            border: 1px dashed rgba(148, 163, 184, 0.26);
            border-radius: 18px;
            color: var(--muted);
            font-size: 0.92rem;
            text-align: center;
            background: rgba(255,255,255,0.035);
        }

        .ledger-table {
            width: 100%;
            border-collapse: collapse;
        }

        .ledger-table thead th {
            padding: 0 0 10px;
            color: var(--muted-2);
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.09em;
            text-align: left;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        }

        .ledger-table tbody td {
            padding: 12px 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            vertical-align: middle;
            font-size: 0.87rem;
        }

        .ledger-table tbody tr:last-child td {
            border-bottom: none;
        }

        .rank-pill {
            width: 30px;
            height: 30px;
            display: inline-grid;
            place-items: center;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: var(--text);
            font-size: 0.82rem;
            font-weight: 900;
        }

        .rank-pill.top-1 { background: rgba(212,167,44,0.22); color: #ffe8a3; }
        .rank-pill.top-2 { background: rgba(148,163,184,0.24); color: #e2e8f0; }
        .rank-pill.top-3 { background: rgba(194,120,70,0.24); color: #ffd3b5; }

        .capper-cell {
            display: flex;
            align-items: center;
            gap: 11px;
        }

        .capper-avatar {
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            border-radius: 12px;
            color: #06120f;
            background: linear-gradient(135deg, var(--teal), #b9fff1);
            font-size: 0.84rem;
            font-weight: 900;
            flex: 0 0 auto;
        }

        .capper-meta {
            min-width: 0;
        }

        .capper-meta b {
            display: block;
            font-size: 0.92rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .capper-meta span {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stat-pos { color: var(--green); font-weight: 850; }
        .stat-neg { color: var(--red); font-weight: 850; }

        .pulse-stack {
            display: grid;
            gap: 14px;
        }

        .pulse-card {
            padding: 18px;
        }

        .pulse-card h3 {
            font-size: 1.28rem;
            line-height: 1;
        }

        .pulse-list {
            display: grid;
            gap: 10px;
            margin-top: 14px;
        }

        .pulse-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 16px;
            padding: 12px;
            background: rgba(255,255,255,0.045);
        }

        .pulse-row b {
            display: block;
            font-size: 0.9rem;
        }

        .pulse-row span {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.78rem;
            line-height: 1.42;
            font-weight: 700;
        }

        .pulse-tag {
            border-radius: 999px;
            padding: 7px 10px;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: rgba(45,212,191,0.12);
            color: #d9fffa;
            border: 1px solid rgba(45,212,191,0.18);
        }

        .pulse-tag.gold {
            background: rgba(212,167,44,0.14);
            border-color: rgba(212,167,44,0.24);
            color: #ffe8a3;
        }

        .pulse-tag.red {
            background: rgba(239,68,68,0.14);
            border-color: rgba(239,68,68,0.24);
            color: #fecaca;
        }

        .trust-card {
            padding: 18px;
        }

        .trust-card b {
            display: block;
            font-size: 0.95rem;
            color: var(--text);
        }

        .trust-card span {
            display: block;
            margin-top: 7px;
            color: var(--muted);
            font-size: 0.86rem;
            line-height: 1.45;
            font-weight: 650;
        }

        .gameplay {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .game-panel {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 22px;
            background:
                radial-gradient(circle at 86% 0%, rgba(212,167,44,0.12), transparent 32%),
                var(--panel);
        }

        .game-panel h3 {
            font-size: 1.65rem;
        }

        .game-panel p {
            margin: 8px 0 0;
            color: var(--muted);
            line-height: 1.52;
            font-weight: 650;
        }

        .sample-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 15px;
            padding: 11px;
            margin-top: 13px;
            background: rgba(255,255,255,0.045);
        }

        .sample-row span {
            color: var->omitted for brevity<snip>
