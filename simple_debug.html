<!DOCTYPE html>
<html>
<head><title>Simple Debug</title><style>body{font-family:monospace;padding:20px;background:#1a1a2e;color:#fff}pre{background:#0f0f23;padding:10px;overflow:auto}</style></head>
<body>
<h1>Raw localStorage Data</h1>
<h2>Current User (tmr_current_user)</h2>
<pre id="user"></pre>
<h2>All Picks (tmr_picks)</h2>
<pre id="picks"></pre>
<h2>All Users (trustmyrecord_users)</h2>
<pre id="users"></pre>
<h2>Current User Key (trustmyrecord_current_user)</h2>
<pre id="curUser"></pre>
<script>
document.getElementById('user').textContent = localStorage.getItem('tmr_current_user') || 'NOT SET';
document.getElementById('picks').textContent = localStorage.getItem('tmr_picks') || 'NOT SET';
document.getElementById('users').textContent = localStorage.getItem('trustmyrecord_users') || 'NOT SET';
document.getElementById('curUser').textContent = localStorage.getItem('trustmyrecord_current_user') || 'NOT SET';
</script>
</body>
</html>
