name: Sportsbook Team Row Live Proof

on:
  workflow_dispatch:

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Capture live sportsbook team rows
        run: |
          mkdir -p artifacts
          cat > artifacts/team-row-proof.js <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 1100 }, deviceScaleFactor: 1 });
            await page.goto('https://trustmyrecord.com/sportsbook/?teamrowproof=' + Date.now(), { waitUntil: 'domcontentloaded', timeout: 60000 });
            await page.waitForLoadState('networkidle', { timeout: 30000 }).catch(() => {});
            await wait(3000);
            await page.evaluate(() => {
              if (window.selectSportAndShowGames) window.selectSportAndShowGames('MLB');
            }).catch(() => {});
            await wait(5000);
            await page.evaluate(() => {
              if (window.TMR && window.TMR.setMarket) window.TMR.setMarket('first_5');
              if (window.tmrSetBoardFilter) window.tmrSetBoardFilter('first-5');
            }).catch(() => {});
            await page.getByText(/5 Inning|First 5|1ST 5/i).first().click({ timeout: 4000 }).catch(() => {});
            await wait(8000);

            const proof = await page.evaluate(() => {
              const clean = text => String(text || '').replace(/\s+/g, ' ').trim();
              const card = document.querySelector('.tmr-market-card[data-market-filter="first-5"]') || document.querySelector('.tmr-market-card');
              if (card) {
                card.scrollIntoView({ block: 'start', inline: 'nearest' });
                card.style.outline = '4px solid #22c55e';
                card.style.outlineOffset = '4px';
              }
              const rows = Array.from((card || document).querySelectorAll('.tmr-market-matchup .tmr-team-row')).slice(0, 2).map((row, index) => {
                const nameEl = row.querySelector('.tmr-team-name');
                const style = nameEl ? getComputedStyle(nameEl) : null;
                return {
                  index,
                  text: clean(row.innerText || row.textContent),
                  logoCount: row.querySelectorAll('.tmr-team-logo-badge,.team-logo').length,
                  badgeCount: row.querySelectorAll('.tmr-team-side').length,
                  name: nameEl ? clean(nameEl.textContent) : '',
                  textOverflow: style ? style.textOverflow : '',
                  overflowX: style ? style.overflowX : '',
                  whiteSpace: style ? style.whiteSpace : ''
                };
              });
              const first5Buttons = Array.from(document.querySelectorAll('.tmr-group[data-category="first-5"] .tmr-option-btn')).map(el => clean(el.innerText || el.textContent)).slice(0, 12);
              const body = clean(document.body.innerText);
              return {
                url: location.href,
                rows,
                first5Buttons,
                hasF5Spread: first5Buttons.some(text => /[+-]0\.5|Run Line|Spread/i.test(text)),
                hasF5Moneyline: first5Buttons.some(text => /F5 ML|Moneyline|American/i.test(text) && !/Over|Under/i.test(text)),
                hasF5Total: first5Buttons.some(text => /\bOver\b|\bUnder\b/i.test(text)),
                f5TotalsNoPlus: /Over\s*3\.5|Under\s*3\.5|Over\s*4\.5|Under\s*4\.5|Over\s*5\.5|Under\s*5\.5/i.test(body)
              };
            });

            fs.writeFileSync('artifacts/live-team-row-proof.json', JSON.stringify(proof, null, 2));
            await page.screenshot({ path: 'artifacts/live-team-row-proof.png', fullPage: true });
            await browser.close();

            if (proof.rows.length < 2) throw new Error('Could not find two sportsbook team rows.');
            for (const row of proof.rows) {
              if (row.logoCount !== 1) throw new Error('Expected one logo in row: ' + JSON.stringify(row));
              if (row.badgeCount !== 1) throw new Error('Expected one home/away badge in row: ' + JSON.stringify(row));
              if (!row.name || /\.\.\.|…/.test(row.name)) throw new Error('Expected full team name in row: ' + JSON.stringify(row));
              if (row.textOverflow === 'ellipsis' || row.overflowX === 'hidden') throw new Error('Team name is still styled as truncated: ' + JSON.stringify(row));
            }
            if (!proof.hasF5Spread || !proof.hasF5Moneyline || !proof.hasF5Total || !proof.f5TotalsNoPlus) {
              throw new Error('F5 market display regression detected: ' + JSON.stringify(proof));
            }
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
          node artifacts/team-row-proof.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sportsbook-team-row-live-proof
          path: |
            artifacts/live-team-row-proof.png
            artifacts/live-team-row-proof.json
