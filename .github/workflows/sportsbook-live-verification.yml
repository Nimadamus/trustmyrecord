name: Sportsbook Live Verification

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - pages-build-deployment
    types:
      - completed

jobs:
  verify-live-sportsbook:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run verify:sportsbook-live
        env:
          TMR_SPORTSBOOK_URL: https://trustmyrecord.com/sportsbook/
      - run: sudo apt-get update && sudo apt-get install -y imagemagick
      - run: xvfb-run --auto-servernum npm run verify:sportsbook-live:browser-proof
        env:
          TMR_SPORTSBOOK_URL: https://trustmyrecord.com/sportsbook/
      - run: xvfb-run --auto-servernum node tests/sportsbook-team-totals-live-proof.js
        env:
          TMR_SPORTSBOOK_URL: https://trustmyrecord.com/sportsbook/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sportsbook-live-verification
          path: |
            artifacts/sportsbook-live-verification.png
            artifacts/sportsbook-live-browser-proof.png
            artifacts/sportsbook-team-totals-live-proof.png
            artifacts/sportsbook-team-totals-live-proof.json
            artifacts/playwright-results/**
