name: Sportsbook Live Verification

on:
  workflow_dispatch:
  push:
    paths:
      - 'sportsbook/**'
      - 'static/js/sportsbook-production-fix-persist-reliability.js'
      - 'static/css/**sportsbook**'
      - 'tests/sportsbook-live-verification.*'
      - 'playwright.config.cjs'
      - 'package.json'
      - '.github/workflows/sportsbook-live-verification.yml'

jobs:
  verify-live-sportsbook:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run verify:sportsbook-live
        env:
          TMR_SPORTSBOOK_URL: https://trustmyrecord.com/sportsbook/
      - run: xvfb-run --auto-servernum npm run verify:sportsbook-live:browser-proof
        env:
          TMR_SPORTSBOOK_URL: https://trustmyrecord.com/sportsbook/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sportsbook-live-verification
          path: |
            artifacts/sportsbook-live-verification.png
            artifacts/sportsbook-live-browser-proof.png
            artifacts/playwright-results/**
