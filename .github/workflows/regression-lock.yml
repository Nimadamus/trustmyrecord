name: TrustMyRecord Regression Lock

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  regression-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run verify:regression
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-lock-artifacts
          path: |
            artifacts/regression-report.json
            artifacts/regression-playwright-results/**
            artifacts/playwright-results/**
