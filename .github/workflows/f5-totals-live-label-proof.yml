name: F5 Totals Live Label Proof

on:
  workflow_dispatch:

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Capture live F5 totals labels
        run: |
          mkdir -p artifacts
          cat > artifacts/f5-live-proof.js <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const url = 'https://trustmyrecord.com/sportsbook/?f5proof=' + Date.now();
          const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 1100 }, deviceScaleFactor: 1 });
            await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
            await page.waitForLoadState('networkidle', { timeout: 30000 }).catch(() => {});
            await wait(3000);

            await page.evaluate(() => {
              if (window.selectSportAndShowGames) window.selectSportAndShowGames('MLB');
            }).catch(() => {});
            await wait(5000);
            await page.getByText(/MLB|Baseball/i).first().click({ timeout: 4000 }).catch(() => {});
            await wait(3000);
            await page.evaluate(() => {
              if (window.TMR && window.TMR.setMarket) window.TMR.setMarket('first_5');
              if (window.tmrSetBoardFilter) window.tmrSetBoardFilter('first-5');
            }).catch(() => {});
            await page.getByText(/5 Inning|First 5/i).first().click({ timeout: 4000 }).catch(() => {});
            await wait(8000);

            const proof = await page.evaluate(() => {
              const clean = text => String(text || '').replace(/\s+/g, ' ').trim();
              const rows = Array.from(document.querySelectorAll('.sb-odds, .tmr-option-btn, button')).map((el, i) => {
                const text = clean(el.innerText || el.textContent);
                return { i, text, className: String(el.className || '') };
              });
              const corrected = rows.filter(row => /\b(Over|Under)\s+\d+(\.\d+)?\b/.test(row.text) || /\b(Over|Under)\b.*\+\d+(\.\d+)?/.test(row.text));
              const broken = rows.filter(row => /^\+\d+(\.\d+)?\s+[-+]\d+/.test(row.text) || row.text === '+3.5' || row.text === '+4.5' || row.text === '+5.5');
              const target = Array.from(document.querySelectorAll('.sb-odds, .tmr-option-btn, button')).find(el => {
                const text = clean(el.innerText || el.textContent);
                return /\bOver\s+\d+(\.\d+)?\b/.test(text) || /\bUnder\s+\d+(\.\d+)?\b/.test(text) || /\bOver\b.*\+\d+(\.\d+)?/.test(text);
              });
              if (target) {
                target.scrollIntoView({ block: 'center', inline: 'center' });
                target.style.outline = '4px solid #22c55e';
                target.style.outlineOffset = '3px';
              }
              return {
                url: location.href,
                corrected: corrected.slice(0, 40),
                broken: broken.slice(0, 40),
                bodySample: clean(document.body.innerText).slice(0, 4000),
                targetText: target ? clean(target.innerText || target.textContent) : ''
              };
            });

            fs.writeFileSync('artifacts/live-f5-totals-label-proof.json', JSON.stringify(proof, null, 2));
            await wait(1000);
            await page.screenshot({ path: 'artifacts/live-f5-totals-label-proof.png', fullPage: true });
            await browser.close();
            if (!proof.corrected.some(row => /\bOver\b/i.test(row.text)) || !proof.corrected.some(row => /\bUnder\b/i.test(row.text))) {
              throw new Error('Did not find both corrected Over and Under F5 totals labels on the live page.');
            }
            if (proof.broken.some(row => /^\+\d+(\.\d+)?\b/.test(row.text))) {
              throw new Error('Found a totals-looking button starting with a raw + line.');
            }
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
          npx playwright install chromium
          node artifacts/f5-live-proof.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: f5-totals-live-label-proof
          path: |
            artifacts/live-f5-totals-label-proof.png
            artifacts/live-f5-totals-label-proof.json
