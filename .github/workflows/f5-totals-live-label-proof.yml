name: F5 Totals Live Label Proof

on:
  workflow_dispatch:

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Capture live F5 totals labels
        run: |
          mkdir -p artifacts
          cat > artifacts/f5-live-proof.js <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const url = 'https://trustmyrecord.com/sportsbook/?f5proof=' + Date.now();
          const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 1100 }, deviceScaleFactor: 1 });
            await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
            await page.waitForLoadState('networkidle', { timeout: 30000 }).catch(() => {});
            await wait(3000);

            await page.evaluate(() => {
              if (window.selectSportAndShowGames) window.selectSportAndShowGames('MLB');
            }).catch(() => {});
            await wait(5000);
            await page.getByText(/MLB|Baseball/i).first().click({ timeout: 4000 }).catch(() => {});
            await wait(3000);
            await page.evaluate(() => {
              if (window.TMR && window.TMR.setMarket) window.TMR.setMarket('first_5');
              if (window.tmrSetBoardFilter) window.tmrSetBoardFilter('first-5');
            }).catch(() => {});
            await page.getByText(/5 Inning|First 5/i).first().click({ timeout: 4000 }).catch(() => {});
            await wait(8000);

            const proof = await page.evaluate(() => {
              const clean = text => String(text || '').replace(/\s+/g, ' ').trim();
              const rows = Array.from(document.querySelectorAll('.sb-odds, .tmr-option-btn, button')).map((el, i) => {
                const text = clean(el.innerText || el.textContent);
                return { i, text, className: String(el.className || '') };
              });
              const buttons = Array.from(document.querySelectorAll('.tmr-group[data-category="first-5"] .tmr-option-btn, .sb-odds'));
              const f5Totals = buttons.map((el, i) => {
                const tag = clean((el.querySelector('.tmr-option-tag') || el.querySelector('.sb-odds-line') || {}).textContent);
                const line = clean((el.querySelector('.tmr-option-line') || {}).textContent);
                const market = clean((el.querySelector('.tmr-option-market') || {}).textContent);
                const text = clean(el.innerText || el.textContent);
                return { i, tag, line, market, text };
              }).filter(row => {
                return /\b(Over|Under)\b/i.test(row.market || row.text) && /\b(\+)?\d+(\.\d+)?\b/.test(row.line || row.market || row.text);
              });
              const corrected = f5Totals.filter(row => /^(Over|Under)$/i.test(row.tag) || /^(Over|Under)\s+\d+(\.\d+)?$/i.test(row.tag));
              const broken = f5Totals.filter(row => /^\+\d+(\.\d+)?$/i.test(row.tag));
              const group = document.querySelector('.tmr-group[data-category="first-5"]');
              if (group) group.setAttribute('data-f5-proof-group', 'true');
              const target = buttons.find(el => {
                const text = clean(el.innerText || el.textContent);
                return /\bOver\b/i.test(text) && /\b\+?\d+(\.\d+)?\b/.test(text);
              });
              if (target) {
                target.scrollIntoView({ block: 'center', inline: 'center' });
                target.style.outline = '4px solid #22c55e';
                target.style.outlineOffset = '3px';
              }
              return {
                url: location.href,
                corrected: corrected.slice(0, 40),
                broken: broken.slice(0, 40),
                bodySample: clean(document.body.innerText).slice(0, 4000),
                targetText: target ? clean(target.innerText || target.textContent) : ''
              };
            });

            fs.writeFileSync('artifacts/live-f5-totals-label-proof.json', JSON.stringify(proof, null, 2));
            await wait(1000);
            await page.screenshot({ path: 'artifacts/live-f5-totals-label-proof.png', fullPage: true });
            const groupLocator = page.locator('[data-f5-proof-group="true"]').first();
            if (await groupLocator.count()) {
              await groupLocator.screenshot({ path: 'artifacts/live-f5-totals-label-proof-group.png' });
            }
            await browser.close();
            if (!proof.corrected.some(row => /\bOver\b/i.test(row.tag || row.text)) || !proof.corrected.some(row => /\bUnder\b/i.test(row.tag || row.text))) {
              throw new Error('Did not find both corrected Over and Under F5 totals labels on the live page.');
            }
            if (proof.broken.length) {
              throw new Error('Found an F5 totals button whose side tag is a raw + line.');
            }
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
          npx playwright install chromium
          node artifacts/f5-live-proof.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: f5-totals-live-label-proof
          path: |
            artifacts/live-f5-totals-label-proof.png
            artifacts/live-f5-totals-label-proof-group.png
            artifacts/live-f5-totals-label-proof.json
