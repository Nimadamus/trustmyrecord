name: Homepage Integrity Live Proof

on:
  workflow_dispatch:
  push:
    paths:
      - 'tests/homepage-integrity-live-proof.js'
      - '.github/workflows/homepage-integrity-live-proof.yml'

jobs:
  homepage-live-browser-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: sudo apt-get update && sudo apt-get install -y imagemagick
      - run: xvfb-run --auto-servernum node tests/homepage-integrity-live-proof.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: homepage-integrity-live-proof
          path: |
            artifacts/homepage-integrity-live-browser-proof.png
            artifacts/homepage-integrity-live-proof.json
