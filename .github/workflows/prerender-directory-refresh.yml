name: Prerender Directory Refresh

# Keeps the crawler-visible rows on /handicappers/ and /leaderboards/ fresh.
# scripts/prerender_directory.py pulls the live Render API and bakes real member
# rows + hero counts into the static HTML (GitHub Pages = legacy, source main/,
# so a push to main republishes automatically). Commits made by GITHUB_TOKEN do
# not trigger `on: push` workflows, so this cannot loop; we also only commit when
# the generated output actually changed and tag the message [skip ci].

on:
  schedule:
    # Every 30 minutes. Script is stdlib-only and hits a free-tier Render API;
    # if rate/limits ever bite, change to '0 * * * *' (hourly).
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    # Fired by the backend grader (services/prerenderNotifier.js in
    # trustmyrecord-backend) right after a grading run that changed records,
    # so the homepage leaderboard preview never waits for the next cron tick.
    types: [tmr-grading-completed]

permissions:
  contents: write

concurrency:
  group: prerender-directory-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bake directory + homepage (/handicappers/, /leaderboards/, /)
        run: python scripts/prerender_directory.py

      - name: Set up Node (homepage snapshot prerender)
        uses: actions/setup-node@v5
        with:
          node-version: 22

      # Same pattern as every other Playwright workflow in this repo: install from
      # the repo's own lockfile so the module and the downloaded browser are the
      # same version. Installing an ad-hoc pinned playwright alongside the lock
      # gives you a module and a browser build that do not match, and launch fails.
      - run: npm install
      - run: npx playwright install --with-deps chromium

      - name: Bake real live data into the homepage first paint
        # Runs the homepage's own JS against the live API and writes the resulting
        # markup into index.html between <!--MK:--> markers, so the first frame shows
        # real numbers instead of em-dash placeholders. Fail-closed: if any region is
        # still a placeholder when it times out, nothing is written and this fails.
        run: node scripts/prerender_home_snapshot.cjs

      - name: Verify homepage highlights are reproducible from live graded picks
        # Fail closed: if any baked "Live highlights" row cannot be re-derived from
        # real graded picks (fake/stale/hand-injected), the job stops here and the
        # commit step never runs - nothing fake can reach the live homepage.
        run: python scripts/verify_home_highlights.py

      - name: Regenerate eligible /u/ profile pages + sitemap
        run: python scripts/build_profile_pages.py

      - name: Regenerate crawlable /forum/thread/<id>/<slug>/ pages + sitemap
        # Every thread gets a real indexable URL. Fails closed: if the API's own
        # reported thread total does not match what was enumerated, the script
        # aborts rather than emit a short list that would drop live threads out
        # of the sitemap. A failure here stops the commit; the last good bake stays.
        run: python scripts/build_forum_threads.py

      - name: Commit only if generated output changed
        run: |
          # Stage every crawlable SEO surface, incl. NEW profile dirs for users
          # that just crossed the graded-pick threshold (untracked files need
          # `git add` before a --cached diff can see them) and NEW/renamed forum
          # thread dirs.
          git add -A handicappers/index.html leaderboards/index.html index.html u forum/thread sitemap.xml
          if git diff --cached --quiet; then
            echo "No data change in generated output — skipping commit."
          else
            git config user.name "tmr-prerender-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(prerender): refresh crawlable directory + homepage + profile pages + forum threads + sitemap [skip ci]"
            git push origin HEAD:main
            echo "Pushed refreshed prerender output."
          fi

      - name: Log refresh failure (last good bake stays live)
        if: failure()
        run: |
          echo "::error::Prerender refresh FAILED (trigger: ${{ github.event_name }}). No commit was made, so the last successfully calculated leaderboard preview remains live on trustmyrecord.com. Inspect the failed step above; the homepage was NOT blanked or corrupted."
