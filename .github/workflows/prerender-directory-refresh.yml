name: Prerender Directory Refresh

# Keeps the crawler-visible rows on /handicappers/ and /leaderboards/ fresh.
# scripts/prerender_directory.py pulls the live Render API and bakes real member
# rows + hero counts into the static HTML (GitHub Pages = legacy, source main/,
# so a push to main republishes automatically). Commits made by GITHUB_TOKEN do
# not trigger `on: push` workflows, so this cannot loop; we also only commit when
# the generated output actually changed and tag the message [skip ci].

on:
  schedule:
    # Every 30 minutes. Script is stdlib-only and hits a free-tier Render API;
    # if rate/limits ever bite, change to '0 * * * *' (hourly).
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prerender-directory-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bake directory + homepage (/handicappers/, /leaderboards/, /)
        run: python scripts/prerender_directory.py

      - name: Verify homepage highlights are reproducible from live graded picks
        # Fail closed: if any baked "Live highlights" row cannot be re-derived from
        # real graded picks (fake/stale/hand-injected), the job stops here and the
        # commit step never runs - nothing fake can reach the live homepage.
        run: python scripts/verify_home_highlights.py

      - name: Regenerate eligible /u/ profile pages + sitemap
        run: python scripts/build_profile_pages.py

      - name: Commit only if generated output changed
        run: |
          # Stage every crawlable SEO surface, incl. NEW profile dirs for users
          # that just crossed the graded-pick threshold (untracked files need
          # `git add` before a --cached diff can see them).
          git add -A handicappers/index.html leaderboards/index.html index.html u sitemap.xml
          if git diff --cached --quiet; then
            echo "No data change in generated output — skipping commit."
          else
            git config user.name "tmr-prerender-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(prerender): refresh crawlable directory + homepage + profile pages + sitemap [skip ci]"
            git push origin HEAD:main
            echo "Pushed refreshed prerender output."
          fi
