name: Sportsbook Team Row Direct Logo Proof

on:
  workflow_dispatch:

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Capture direct-logo live proof
        run: |
          mkdir -p artifacts
          cat > artifacts/team-row-direct-proof.js <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const wait = ms => new Promise(r => setTimeout(r, ms));
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 1100 }, deviceScaleFactor: 1 });
            await page.goto('https://trustmyrecord.com/sportsbook/?directrowproof=' + Date.now(), { waitUntil: 'domcontentloaded', timeout: 60000 });
            await page.waitForLoadState('networkidle', { timeout: 30000 }).catch(() => {});
            await wait(3000);
            await page.evaluate(() => { if (window.selectSportAndShowGames) window.selectSportAndShowGames('MLB'); }).catch(() => {});
            await wait(5000);
            await page.evaluate(() => {
              if (window.TMR && window.TMR.setMarket) window.TMR.setMarket('first_5');
              if (window.tmrSetBoardFilter) window.tmrSetBoardFilter('first-5');
            }).catch(() => {});
            await page.getByText(/5 Inning|First 5|1ST 5/i).first().click({ timeout: 4000 }).catch(() => {});
            await wait(8000);
            const proof = await page.evaluate(() => {
              const clean = text => String(text || '').replace(/\s+/g, ' ').trim();
              const card = document.querySelector('.tmr-market-card[data-market-filter="first-5"]') || document.querySelector('.tmr-market-card');
              if (card) { card.scrollIntoView({ block: 'start' }); card.style.outline = '4px solid #22c55e'; }
              const rows = Array.from((card || document).querySelectorAll('.tmr-market-matchup .tmr-team-row')).slice(0, 2).map((row, index) => {
                const nameEl = row.querySelector('.tmr-team-name');
                const style = nameEl ? getComputedStyle(nameEl) : null;
                return {
                  index,
                  html: row.outerHTML,
                  text: clean(row.innerText || row.textContent),
                  directChildren: Array.from(row.children).map(el => el.className),
                  logoCount: row.querySelectorAll('.team-logo,.tmr-team-logo-badge').length,
                  wrapperCount: row.querySelectorAll('.tmr-team-abbr').length,
                  badgeCount: row.querySelectorAll('.tmr-team-side').length,
                  name: nameEl ? clean(nameEl.textContent) : '',
                  overflowX: style ? style.overflowX : '',
                  textOverflow: style ? style.textOverflow : '',
                  whiteSpace: style ? style.whiteSpace : ''
                };
              });
              const buttons = Array.from(document.querySelectorAll('.tmr-group[data-category="first-5"] .tmr-option-btn')).map(el => clean(el.innerText || el.textContent)).slice(0, 12);
              return {
                url: location.href,
                rows,
                buttons,
                hasF5Spread: buttons.some(text => /[+-]0\.5/i.test(text)),
                hasF5Moneyline: buttons.some(text => /American[-+]\d+/.test(text) && !/Over|Under/i.test(text)),
                hasF5Total: buttons.some(text => /(Over|Under)\d+(\.\d+)?(Over|Under)\s+\d+(\.\d+)?/i.test(text))
              };
            });
            fs.writeFileSync('artifacts/live-team-row-direct-proof.json', JSON.stringify(proof, null, 2));
            await page.screenshot({ path: 'artifacts/live-team-row-direct-proof.png', fullPage: true });
            const card = page.locator('.tmr-market-card[data-market-filter="first-5"]').first();
            if (await card.count()) await card.screenshot({ path: 'artifacts/live-team-row-direct-card-proof.png' }).catch(() => {});
            await browser.close();
            if (proof.rows.length < 2) throw new Error('Missing team rows');
            for (const row of proof.rows) {
              if (row.logoCount !== 1) throw new Error('Logo count is not one: ' + JSON.stringify(row));
              if (row.wrapperCount !== 0) throw new Error('Wrapper logo node still present: ' + JSON.stringify(row));
              if (row.badgeCount !== 1) throw new Error('Badge count is not one: ' + JSON.stringify(row));
              if (!row.name || /\.\.\.|…/.test(row.name)) throw new Error('Full name missing: ' + JSON.stringify(row));
              if (row.overflowX === 'hidden' || row.textOverflow === 'ellipsis') throw new Error('Name still truncates: ' + JSON.stringify(row));
            }
            if (!proof.hasF5Spread || !proof.hasF5Moneyline || !proof.hasF5Total) throw new Error('F5 columns missing');
          })().catch(err => { console.error(err); process.exit(1); });
          NODE
          node artifacts/team-row-direct-proof.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sportsbook-team-row-direct-proof
          path: |
            artifacts/live-team-row-direct-proof.png
            artifacts/live-team-row-direct-card-proof.png
            artifacts/live-team-row-direct-proof.json
