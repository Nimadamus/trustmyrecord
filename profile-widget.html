<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustMyRecord Profile Widget</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V5MCVXS2HE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-V5MCVXS2HE');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg: #08111d;
            --card: rgba(11, 20, 34, 0.94);
            --card-2: rgba(255, 255, 255, 0.045);
            --border: rgba(148, 163, 184, 0.18);
            --text: #eef4fb;
            --muted: #97a8bc;
            --accent: #2dd4bf;
            --accent-2: #8df5ea;
            --good: #22c55e;
            --bad: #ef4444;
            --neutral: #94a3b8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: transparent;
            color: var(--text);
        }

        body.theme-light {
            color-scheme: light;
            --bg: #f8fafc;
            --card: #ffffff;
            --card-2: #f8fafc;
            --border: rgba(15, 23, 42, 0.12);
            --text: #142133;
            --muted: #5f7088;
            --accent: #0284c7;
            --accent-2: #7c3aed;
            --good: #16a34a;
            --bad: #dc2626;
            --neutral: #64748b;
        }

        .widget {
            width: 100%;
            background:
                radial-gradient(circle at top right, rgba(45, 212, 191, 0.16), transparent 30%),
                linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.015)),
                linear-gradient(180deg, var(--card), var(--bg));
            border: 1px solid var(--border);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.24);
        }

        .widget.compact { border-radius: 18px; }

        .head {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 18px 14px;
            border-bottom: 1px solid var(--border);
        }

        .widget.compact .head {
            padding: 14px 14px 10px;
            gap: 10px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #06120f;
            font-weight: 800;
            font-size: 1.05rem;
            overflow: hidden;
            flex: 0 0 auto;
        }

        .widget.compact .avatar {
            width: 40px;
            height: 40px;
            font-size: 0.92rem;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .identity {
            min-width: 0;
            flex: 1;
        }

        .name {
            font-size: 0.98rem;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .handle {
            font-size: 0.82rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .verified {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            font-size: 0.72rem;
            color: #d7fffb;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            padding: 14px 18px;
        }

        .widget.compact .grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 10px 14px;
        }

        .stat {
            background: var(--card-2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 10px;
            text-align: center;
        }

        .label {
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .value {
            font-size: 1.08rem;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .good { color: var(--good); }
        .bad { color: var(--bad); }
        .neutral { color: var(--neutral); }

        .recent {
            padding: 0 18px 14px;
        }

        .widget.compact .recent {
            padding: 0 14px 10px;
        }

        .recent-label {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-strip {
            display: flex;
            gap: 4px;
        }

        .form-box {
            flex: 1;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.66rem;
            font-weight: 800;
            color: white;
        }

        .foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 18px 16px;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.76rem;
        }

        .widget.compact .foot {
            padding: 10px 14px 12px;
            font-size: 0.72rem;
        }

        .cta {
            color: #06120f;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-radius: 999px;
            padding: 9px 13px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.74rem;
            white-space: nowrap;
        }

        .loading,
        .error {
            padding: 24px 18px;
            color: var(--muted);
            text-align: center;
            font-size: 0.92rem;
        }
    </style>
</head>
<body>
    <div id="widgetRoot" class="widget">
        <div class="loading">Loading TrustMyRecord profile...</div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const username = (params.get('user') || '').trim();
            const theme = (params.get('theme') || 'dark').trim().toLowerCase();
            const compact = ['1', 'true', 'yes'].includes(String(params.get('compact') || '').toLowerCase());
            const pollMs = Math.max(15000, parseInt(params.get('refresh') || '30000', 10) || 30000);
            const apiBase = 'https://trustmyrecord-api.onrender.com/api';
            const siteBase = 'https://trustmyrecord.com';
            const root = document.getElementById('widgetRoot');
            let timer = null;

            if (theme === 'light') {
                document.body.classList.add('theme-light');
            }
            if (compact) {
                root.classList.add('compact');
            }

            function escapeHtml(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function statClass(value) {
                const num = Number(value || 0);
                if (num > 0) return 'good';
                if (num < 0) return 'bad';
                return 'neutral';
            }

            function fmtUnits(value) {
                const num = Number(value || 0);
                return (num > 0 ? '+' : '') + num.toFixed(2) + 'u';
            }

            function fmtPct(value) {
                const num = Number(value || 0);
                return (num > 0 ? '+' : '') + num.toFixed(1) + '%';
            }

            function formBoxes(recentForm) {
                const items = (recentForm || []).slice(0, compact ? 6 : 10);
                if (!items.length) {
                    return '<div style="color:var(--muted);font-size:0.8rem;">No graded picks yet</div>';
                }
                return '<div class="form-strip">' + items.map(function(item) {
                    const status = String(item.status || '').toLowerCase();
                    const label = status === 'won' ? 'W' : status === 'lost' ? 'L' : 'P';
                    const bg = status === 'won' ? 'var(--good)' : status === 'lost' ? 'var(--bad)' : 'var(--neutral)';
                    return '<div class="form-box" style="background:' + bg + ';">' + label + '</div>';
                }).join('') + '</div>';
            }

            async function fetchJson(url) {
                const response = await fetch(url + (url.includes('?') ? '&' : '?') + '_ts=' + Date.now(), {
                    cache: 'no-store'
                });
                if (!response.ok) {
                    throw new Error('Failed to load profile data');
                }
                return response.json();
            }

            async function load() {
                if (!username) {
                    root.innerHTML = '<div class="error">Missing profile username.</div>';
                    return;
                }

                try {
                    const [profileResp, advancedResp] = await Promise.all([
                        fetchJson(apiBase + '/users/' + encodeURIComponent(username)),
                        fetchJson(apiBase + '/users/' + encodeURIComponent(username) + '/stats/advanced')
                    ]);

                    const profile = profileResp.user || profileResp || {};
                    const summary = advancedResp.summary || {};
                    const displayName = profile.display_name || profile.username || username;
                    const handle = profile.username || username;
                    const initial = handle.charAt(0).toUpperCase() || '?';
                    const record = Number(summary.wins || 0) + '-' + Number(summary.losses || 0) + '-' + Number(summary.pushes || 0);
                    const totalPicks = Number(summary.total_picks || 0);
                    const updatedAt = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                    const verified = ['verified', 'trusted', 'premium'].includes(String(profile.verification_status || '').toLowerCase());

                    root.innerHTML =
                        '<div class="head">' +
                            '<div class="avatar">' +
                                (profile.avatar_url ? '<img src="' + escapeHtml(profile.avatar_url) + '" alt="' + escapeHtml(displayName) + '">' : escapeHtml(initial)) +
                            '</div>' +
                            '<div class="identity">' +
                                '<div class="name">' + escapeHtml(displayName) + '</div>' +
                                '<div class="handle">@' + escapeHtml(handle) + '</div>' +
                                (verified ? '<div class="verified">Verified Record</div>' : '') +
                            '</div>' +
                        '</div>' +
                        '<div class="grid">' +
                            '<div class="stat"><div class="label">Record</div><div class="value">' + escapeHtml(record) + '</div></div>' +
                            '<div class="stat"><div class="label">ROI</div><div class="value ' + statClass(summary.roi) + '">' + escapeHtml(fmtPct(summary.roi)) + '</div></div>' +
                            '<div class="stat"><div class="label">Units</div><div class="value ' + statClass(summary.net_units) + '">' + escapeHtml(fmtUnits(summary.net_units)) + '</div></div>' +
                            '<div class="stat"><div class="label">Win Rate</div><div class="value">' + escapeHtml(Number(summary.win_rate || 0).toFixed(1) + '%') + '</div></div>' +
                        '</div>' +
                        '<div class="recent">' +
                            '<div class="recent-label">Recent Form' + (totalPicks ? ' • ' + totalPicks + ' picks' : '') + '</div>' +
                            formBoxes(advancedResp.recentForm) +
                        '</div>' +
                        '<div class="foot">' +
                            '<span>Live stats • updated ' + escapeHtml(updatedAt) + '</span>' +
            '<a class="cta" href="' + siteBase + '/profile/?user=' + encodeURIComponent(handle) + '" target="_blank" rel="noopener">View Profile</a>' +
                        '</div>';

                    if (window.parent && window.parent !== window) {
                        const height = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
                        window.parent.postMessage({ type: 'tmr-profile-widget-height', height: height }, '*');
                    }
                } catch (error) {
                    root.innerHTML = '<div class="error">Unable to load live profile data right now.</div>';
                }
            }

            load();
            timer = window.setInterval(load, pollMs);
            window.addEventListener('beforeunload', function() {
                if (timer) window.clearInterval(timer);
            });
        })();
    </script>
    <script src="static/js/config.js?v=20260330"></script>
    <script src="static/js/analytics.js?v=20260417"></script>
</body>
</html>
