<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://trustmyrecord.com/trivia/history/">
    <title>Trivia History | TrustMyRecord</title>
    <meta name="description" content="Full sports trivia history: every question attempted, the answer given, the correct answer, response time and points earned. Filter by category, difficulty, result and date.">
    <meta property="og:title" content="Trivia History | TrustMyRecord">
    <meta property="og:description" content="Every trivia question you have played, with points, response time and results.">
    <meta property="og:url" content="https://trustmyrecord.com/trivia/history/">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tmr-sitewide.css?v=20260723bell1">
    <script defer src="/static/js/tmr-sitewide.js?v=20260723bell1"></script>
    <link rel="stylesheet" href="/static/css/tmr-linkhub.css?v=20260721nav4">
    <script defer src="/static/js/tmr-linkhub.js?v=20260721nav4"></script>
    <style>
        :root { color-scheme: dark; --text-muted:#94a3b8; }
        body { margin:0; background:#070b12; color:#e8eef5; font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif; }
        html, body { overflow-x:hidden; max-width:100%; }
        .th-wrap { max-width:1120px; margin:0 auto; padding:26px 18px 70px; box-sizing:border-box; }
        .th-card, .th-stat, .th-row { box-sizing:border-box; max-width:100%; }
        .th-btn { flex:0 0 auto; }
        .th-head h1 { font-family:Barlow,Inter,sans-serif; font-size:clamp(26px,4vw,38px); margin:0 0 6px; letter-spacing:-.01em; }
        .th-head p { color:var(--text-muted); margin:0 0 20px; font-size:14.5px; line-height:1.6; }
        .th-head a { color:#5eead4; }

        .th-card { background:rgba(15,23,42,.6); border:1px solid rgba(148,163,184,.16); border-radius:14px; padding:18px; margin-bottom:18px; }
        .th-card h2 { font-size:16px; margin:0 0 12px; font-family:Barlow,Inter,sans-serif; letter-spacing:.02em; }

        .th-summary { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
        @media (max-width:900px){ .th-summary { grid-template-columns:repeat(3,1fr); } }
        @media (max-width:520px){ .th-summary { grid-template-columns:repeat(2,1fr); } }
        .th-stat { background:rgba(148,163,184,.06); border:1px solid rgba(148,163,184,.12); border-radius:11px; padding:12px 10px; text-align:center; }
        .th-stat .v { font-size:20px; font-weight:800; color:#f4f7fb; font-family:Barlow,Inter,sans-serif; }
        .th-stat .l { font-size:10.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-top:4px; }

        .th-filters { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
        .th-field { display:flex; flex-direction:column; gap:5px; flex:1 1 150px; min-width:0; }
        .th-field label { font-size:10.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; }
        .th-field select, .th-field input {
            background:#0d141c; border:1px solid #2b3a4d; border-radius:8px; color:#e8eef5;
            padding:8px 10px; font-size:13px; font-family:inherit; width:100%; min-width:0; max-width:100%;
        }
        .th-btn {
            background:rgba(45,212,191,.16); border:1px solid rgba(45,212,191,.45); color:#5eead4;
            border-radius:8px; padding:9px 16px; font-size:13px; font-weight:700; cursor:pointer;
        }
        .th-btn.secondary { background:rgba(148,163,184,.1); border-color:rgba(148,163,184,.22); color:#cbd5e1; }

        .th-row {
            display:flex; gap:14px; justify-content:space-between; align-items:flex-start;
            padding:14px 0; border-bottom:1px solid rgba(148,163,184,.1);
        }
        .th-row:last-child { border-bottom:none; }
        .th-q { font-size:14.5px; color:#f4f7fb; line-height:1.45; margin-bottom:6px; overflow-wrap:anywhere; }
        .th-meta { font-size:12px; color:var(--text-muted); line-height:1.7; }
        .th-meta strong { color:#e2e8f0; }
        .th-pts { font-size:17px; font-weight:800; font-family:Barlow,Inter,sans-serif; white-space:nowrap; }
        .th-pts.zero { color:#64748b; }
        .th-pts.pos  { color:#4ade80; }
        .badge { display:inline-block; padding:1px 8px; border-radius:999px; font-size:10px; font-weight:700;
                 letter-spacing:.04em; text-transform:uppercase; margin-right:5px; }
        .badge.correct { background:rgba(0,200,83,.16); color:#4ade80; }
        .badge.wrong   { background:rgba(255,68,68,.16); color:#f87171; }
        .badge.forfeit { background:rgba(249,115,22,.18); color:#fb923c; }
        .badge.expired { background:rgba(255,152,0,.16); color:#fbbf24; }
        .badge.diff    { background:rgba(148,163,184,.14); color:#cbd5e1; }

        .th-pager { display:flex; gap:10px; align-items:center; justify-content:center; margin-top:18px; flex-wrap:wrap; }
        .th-pager span { font-size:13px; color:var(--text-muted); }
        .th-empty { text-align:center; padding:44px 16px; color:var(--text-muted); }
        .th-empty .icon { font-size:34px; opacity:.55; margin-bottom:10px; }
        .th-breakdown { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        @media (max-width:760px){ .th-breakdown { grid-template-columns:1fr; } }
        .th-bd-row { display:flex; justify-content:space-between; gap:12px; font-size:13px; padding:7px 0;
                     border-bottom:1px solid rgba(148,163,184,.08); }
        .th-bd-row:last-child { border-bottom:none; }
        .th-bd-row .n { color:var(--text-muted); }
    </style>
</head>
<body class="tmr-site-shell">

<div class="th-wrap">
    <div class="th-head">
        <h1>Trivia History</h1>
        <p id="thIntro">Every trivia question attempted, with the answer given, the correct answer, response time and points earned.
            <a href="/trivia/">Back to trivia &rarr;</a></p>
    </div>

    <div class="th-card">
        <h2>Career Summary</h2>
        <div class="th-summary" id="thSummary"></div>
    </div>

    <div class="th-card">
        <h2>Performance Breakdown</h2>
        <div class="th-breakdown">
            <div><h3 style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;">By Difficulty</h3><div id="thByDifficulty"></div></div>
            <div><h3 style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;">By Category</h3><div id="thByCategory"></div></div>
        </div>
    </div>

    <div class="th-card">
        <h2>Filter Attempts</h2>
        <div class="th-filters">
            <div class="th-field"><label for="fCategory">Category</label><select id="fCategory"><option value="">All categories</option></select></div>
            <div class="th-field"><label for="fDifficulty">Difficulty</label><select id="fDifficulty">
                <option value="">All</option><option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option></select></div>
            <div class="th-field"><label for="fResult">Result</label><select id="fResult">
                <option value="">All results</option><option value="correct">Correct</option><option value="incorrect">Incorrect</option>
                <option value="forfeited">Forfeited</option><option value="expired">Expired</option></select></div>
            <div class="th-field"><label for="fFrom">From</label><input type="date" id="fFrom"></div>
            <div class="th-field"><label for="fTo">To</label><input type="date" id="fTo"></div>
            <button type="button" class="th-btn" id="applyBtn">Apply</button>
            <button type="button" class="th-btn secondary" id="resetBtn">Reset</button>
        </div>
    </div>

    <div class="th-card">
        <h2 id="thListTitle">Attempts</h2>
        <div id="thList"><div class="th-empty"><div class="icon">&#9203;</div>Loading...</div></div>
        <div class="th-pager" id="thPager"></div>
    </div>
</div>

<script src="/static/js/config.js?v=20260318"></script>
<script src="/static/js/backend-api.js?v=20260423a"></script>
<script src="/static/js/auth-persistent.js?v=20260424a"></script>
<script>
(function () {
    'use strict';

    var page = 1;
    var LIMIT = 25;
    var username = null;

    function esc(t) { var d = document.createElement('div'); d.textContent = t == null ? '' : t; return d.innerHTML; }
    function qs(k) { try { return new URLSearchParams(location.search).get(k); } catch (e) { return null; } }

    function resolveUsername() {
        var fromUrl = qs('user') || qs('username');
        if (fromUrl) return fromUrl;
        try {
            if (window.auth && typeof auth.getCurrentUser === 'function') {
                var a = auth.getCurrentUser();
                if (a && a.username) return a.username;
            }
        } catch (e) {}
        try {
            if (window.api && typeof api.getCurrentUser === 'function') {
                var u = api.getCurrentUser();
                if (u && u.username) return u.username;
            }
        } catch (e) {}
        var keys = ['trustmyrecord_session', 'tmr_current_user', 'currentUser'];
        for (var i = 0; i < keys.length; i++) {
            try {
                var raw = localStorage.getItem(keys[i]);
                if (!raw) continue;
                var parsed = JSON.parse(raw);
                var user = parsed && parsed.user ? parsed.user : parsed;
                if (user && user.username) return user.username;
            } catch (e) {}
        }
        return null;
    }

    function fmtMs(ms) {
        if (ms == null) return '--';
        var n = Number(ms);
        return n >= 1000 ? (n / 1000).toFixed(1) + 's' : n + 'ms';
    }

    function badge(a) {
        if (a.forfeited) return '<span class="badge forfeit">Forfeited</span>';
        if (a.expired)   return '<span class="badge expired">Expired</span>';
        if (a.is_correct) return '<span class="badge correct">Correct</span>';
        return '<span class="badge wrong">Incorrect</span>';
    }

    function stat(v, l) {
        return '<div class="th-stat"><div class="v">' + v + '</div><div class="l">' + l + '</div></div>';
    }

    async function loadStats() {
        var box = document.getElementById('thSummary');
        try {
            await api.ready;
            var d = await api.request('/trivia/v2/users/' + encodeURIComponent(username) + '/stats');
            var s = d.stats || {};
            box.innerHTML =
                stat((Number(s.career_points) || 0).toLocaleString(), 'Career Points') +
                stat(s.attempts || 0, 'Attempted') +
                stat(s.correct || 0, 'Correct') +
                stat((Number(s.accuracy) || 0).toFixed(1) + '%', 'Accuracy') +
                stat(s.current_streak || 0, 'Current Streak') +
                stat(s.best_streak || 0, 'Best Streak') +
                stat((Number(s.points_per_attempt) || 0).toFixed(1), 'Pts / Attempt') +
                stat((Number(s.points_per_correct) || 0).toFixed(1), 'Pts / Correct') +
                stat(fmtMs(s.avg_response_ms), 'Avg Response') +
                stat(fmtMs(s.best_response_ms), 'Best Response') +
                stat(s.games_played || 0, 'Games Played') +
                stat((Number(s.best_game_score) || 0).toLocaleString(), 'Best Game') +
                stat(s.forfeited || 0, 'Forfeited') +
                stat(s.expired || 0, 'Expired');

            document.getElementById('thByDifficulty').innerHTML =
                (s.by_difficulty || []).map(function (r) {
                    return '<div class="th-bd-row"><span>' + esc(r.difficulty) + '</span>' +
                        '<span class="n">' + r.correct + '/' + r.attempts + ' &middot; ' + r.accuracy + '% &middot; ' +
                        r.points + ' pts &middot; ' + fmtMs(r.avg_response_ms) + '</span></div>';
                }).join('') || '<div class="th-bd-row"><span class="n">No attempts yet.</span></div>';

            document.getElementById('thByCategory').innerHTML =
                (s.by_category || []).map(function (r) {
                    return '<div class="th-bd-row"><span>' + esc(r.category_name) + '</span>' +
                        '<span class="n">' + r.correct + '/' + r.attempts + ' &middot; ' + r.accuracy + '% &middot; ' +
                        r.points + ' pts</span></div>';
                }).join('') || '<div class="th-bd-row"><span class="n">No attempts yet.</span></div>';

            var sel = document.getElementById('fCategory');
            (s.by_category || []).forEach(function (r) {
                if (!r.category_slug || r.category_slug === 'unknown') return;
                var o = document.createElement('option');
                o.value = r.category_slug; o.textContent = r.category_name;
                sel.appendChild(o);
            });
        } catch (e) {
            box.innerHTML = '<div class="th-empty">Could not load career stats.</div>';
        }
    }

    function filterQuery() {
        var p = ['limit=' + LIMIT, 'page=' + page];
        var c = document.getElementById('fCategory').value;
        var d = document.getElementById('fDifficulty').value;
        var r = document.getElementById('fResult').value;
        var f = document.getElementById('fFrom').value;
        var t = document.getElementById('fTo').value;
        if (c) p.push('category=' + encodeURIComponent(c));
        if (d) p.push('difficulty=' + encodeURIComponent(d));
        if (r) p.push('result=' + encodeURIComponent(r));
        if (f) p.push('from=' + encodeURIComponent(f));
        if (t) p.push('to=' + encodeURIComponent(t));
        return p.join('&');
    }

    async function loadList() {
        var list = document.getElementById('thList');
        var pager = document.getElementById('thPager');
        list.innerHTML = '<div class="th-empty"><div class="icon">&#9203;</div>Loading...</div>';
        pager.innerHTML = '';
        try {
            await api.ready;
            var d = await api.request('/trivia/v2/users/' + encodeURIComponent(username) + '/history?' + filterQuery());
            var rows = d.attempts || [];
            document.getElementById('thListTitle').textContent =
                'Attempts (' + d.pagination.total.toLocaleString() + ')';

            if (!rows.length) {
                list.innerHTML = '<div class="th-empty"><div class="icon">&#128203;</div>No attempts match these filters.</div>';
                return;
            }

            list.innerHTML = rows.map(function (a) {
                var pts = Number(a.points_earned) || 0;
                return '<div class="th-row">' +
                    '<div style="min-width:0;flex:1;">' +
                        '<div class="th-q">' + esc(a.question_text || '(question no longer available)') + '</div>' +
                        '<div class="th-meta">' + badge(a) +
                            '<span class="badge diff">' + esc(a.difficulty || '') + '</span>' +
                            esc(a.category_name || a.category_slug || '') +
                            ' &middot; ' + esc(a.settled_at ? new Date(a.settled_at).toLocaleString() : '') +
                            ' &middot; ' + fmtMs(a.response_time_ms) + '</div>' +
                        '<div class="th-meta">Your answer: <strong>' + esc(a.selected_answer || '(none)') + '</strong>' +
                            (a.correct_answer ? ' &middot; Correct: <strong>' + esc(a.correct_answer) + '</strong>' : '') + '</div>' +
                        (a.explanation ? '<div class="th-meta">' + esc(a.explanation) + '</div>' : '') +
                    '</div>' +
                    '<div class="th-pts ' + (pts > 0 ? 'pos' : 'zero') + '">+' + pts + '</div>' +
                '</div>';
            }).join('');

            var pages = d.pagination.pages || 1;
            pager.innerHTML =
                '<button type="button" class="th-btn secondary" id="prevBtn"' + (page <= 1 ? ' disabled' : '') + '>&larr; Previous</button>' +
                '<span>Page ' + page + ' of ' + pages + '</span>' +
                '<button type="button" class="th-btn secondary" id="nextBtn"' + (page >= pages ? ' disabled' : '') + '>Next &rarr;</button>';
            var pb = document.getElementById('prevBtn'), nb = document.getElementById('nextBtn');
            if (pb) pb.onclick = function () { if (page > 1) { page--; loadList(); window.scrollTo({ top: 0, behavior: 'smooth' }); } };
            if (nb) nb.onclick = function () { if (page < pages) { page++; loadList(); window.scrollTo({ top: 0, behavior: 'smooth' }); } };
        } catch (e) {
            list.innerHTML = '<div class="th-empty"><div class="icon">&#9888;</div>Could not load trivia history.</div>';
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        username = resolveUsername();
        if (!username) {
            document.getElementById('thList').innerHTML =
                '<div class="th-empty"><div class="icon">&#128274;</div>Log in to see your trivia history, ' +
                'or open a member profile and use the Trivia tab.<br><br>' +
                '<a class="th-btn" href="/login/?redirect=' + encodeURIComponent('/trivia/history/') + '">Log in</a></div>';
            document.getElementById('thSummary').innerHTML = '';
            return;
        }
        document.getElementById('thIntro').innerHTML =
            'Every trivia question <strong>@' + esc(username) + '</strong> has played, with the answer given, the correct answer, ' +
            'response time and points earned. <a href="/trivia/">Back to trivia &rarr;</a> ' +
            '<a href="/u/' + encodeURIComponent(username) + '/">View profile &rarr;</a>';
        document.title = 'Trivia History: ' + username + ' | TrustMyRecord';

        document.getElementById('applyBtn').onclick = function () { page = 1; loadList(); };
        document.getElementById('resetBtn').onclick = function () {
            ['fCategory', 'fDifficulty', 'fResult', 'fFrom', 'fTo'].forEach(function (id) {
                document.getElementById(id).value = '';
            });
            page = 1; loadList();
        };

        loadStats();
        loadList();
    });
})();
</script>

</body>
</html>
