<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Polls - TrustMyRecord</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #6c7380;
            --primary: #0ea5e9;
            --primary-glow: rgba(14, 165, 233, 0.3);
            --accent-purple: #8b5cf6;
            --accent-green: #00c853;
            --accent-red: #ff4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Nav Bar */
        .nav-bar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 800;
            font-size: 1.15rem;
        }

        .nav-brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--accent-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background: rgba(14, 165, 233, 0.1);
        }

        .nav-links a.active {
            color: var(--primary);
            background: rgba(14, 165, 233, 0.15);
        }

        .nav-user-status {
            font-size: 0.82rem;
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
        }

        .nav-user-status.logged-in {
            color: var(--accent-green);
            border-color: rgba(0, 200, 83, 0.3);
            background: rgba(0, 200, 83, 0.08);
        }

        /* Page Container */
        .page-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 80px;
        }

        /* Page Header */
        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        /* Stats Card */
        .user-stats-card {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
            padding: 24px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-top: 4px;
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 24px;
        }

        /* Category Filters */
        .category-filters {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: rgba(14, 165, 233, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: rgba(14, 165, 233, 0.2);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Create Poll Button */
        .create-poll-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .create-poll-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        /* Polls Grid */
        .polls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* Poll Card */
        .poll-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
        }

        .poll-card:hover {
            border-color: rgba(14, 165, 233, 0.3);
            box-shadow: 0 8px 40px rgba(14, 165, 233, 0.08);
            transform: translateY(-2px);
        }

        .poll-card.expired {
            opacity: 0.65;
            border-color: #333;
        }

        .poll-card.expired:hover {
            transform: none;
            box-shadow: none;
        }

        .poll-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .poll-category-pill {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .poll-time-left {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
        }

        .poll-time-left.ended {
            color: var(--accent-red);
        }

        .poll-question {
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .poll-meta {
            color: var(--text-muted);
            font-size: 0.78rem;
            margin-bottom: 16px;
        }

        /* Vote Buttons */
        .vote-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
        }

        .vote-btn:hover {
            background: rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }

        /* Result Bars */
        .result-bar {
            position: relative;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            overflow: hidden;
            border: 1px solid transparent;
        }

        .result-bar.my-vote {
            border-color: var(--primary);
        }

        .result-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease;
        }

        .result-bar-fill.winner {
            background: rgba(0, 200, 83, 0.15);
        }

        .result-bar-fill.normal {
            background: rgba(102, 126, 234, 0.1);
        }

        .result-bar-content {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-bar-text {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .result-bar-text.voted {
            font-weight: 700;
        }

        .result-bar-pct {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .result-bar-pct.winner {
            color: var(--accent-green);
        }

        .result-bar-pct.normal {
            color: var(--text-muted);
        }

        /* Poll Footer */
        .poll-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        /* Expired Section Divider */
        .expired-divider {
            grid-column: 1 / -1;
            text-align: center;
            padding: 16px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
        }

        .expired-divider::before,
        .expired-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 80px);
            height: 1px;
            background: var(--glass-border);
        }

        .expired-divider::before { left: 0; }
        .expired-divider::after { right: 0; }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .empty-state button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            font-family: inherit;
        }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 36px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.6rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-box h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
            margin-bottom: 8px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .form-group select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 3000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            backdrop-filter: blur(12px);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: rgba(0, 200, 83, 0.9);
            border: 1px solid rgba(0, 200, 83, 0.5);
        }

        .toast.error {
            background: rgba(255, 68, 68, 0.9);
            border: 1px solid rgba(255, 68, 68, 0.5);
        }

        .toast.info {
            background: rgba(14, 165, 233, 0.9);
            border: 1px solid rgba(14, 165, 233, 0.5);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links { display: none; }

            .page-header h1 { font-size: 1.6rem; }

            .user-stats-card {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 18px;
            }

            .stat-value { font-size: 1.4rem; }

            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .category-filters {
                justify-content: center;
            }

            .create-poll-btn {
                justify-content: center;
            }

            .polls-grid {
                grid-template-columns: 1fr;
            }

            .modal-box {
                padding: 24px;
            }
        }

        @media (max-width: 480px) {
            .filter-btn {
                padding: 6px 12px;
                font-size: 0.78rem;
            }
        }
    </style>
</head>
<body>

    <!-- Nav Bar -->
        <header>
        <div class="header-content">
            <a href="index.html" class="logo">TRUST<span>MY</span>RECORD</a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="challenges.html" class="nav-link">Arena</a>
                <a href="forum.html" class="nav-link">Forum</a>
                <a href="polls.html" class="nav-link active">Polls</a>
                <a href="trivia.html" class="nav-link">Trivia</a>
                <a href="activity.html" class="nav-link">Activity</a>
                
                <a href="messages.html" class="nav-link nav-icon">
                    <i class="fas fa-envelope"></i>
                    <span class="nav-badge" id="messageBadge" style="display: none;">0</span>
                </a>
                <a href="#" class="nav-link nav-icon" id="notificationsBtn">
                    <i class="fas fa-bell"></i>
                    <span class="nav-badge" id="notifBadge" style="display: none;">0</span>
                </a>
                <a href="profile.html" class="nav-link" id="profileLink">My Profile</a>
            </nav>
        </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

        <!-- Page Header -->
        <div class="page-header">
            <h1>Prediction Polls</h1>
            <p>Make predictions on upcoming games and compete for the top spot</p>
        </div>

        <!-- User Stats Card -->
        <div class="user-stats-card">
            <div class="stat-item">
                <div class="stat-value" id="pollsAccuracy">--</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pollsVoteCount">0</div>
                <div class="stat-label">Predictions</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pollsRank">--</div>
                <div class="stat-label">Rank</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pollsPoints">0</div>
                <div class="stat-label">Points</div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
            <div class="category-filters" id="categoryFilters">
                <button class="filter-btn active" data-cat="all" onclick="filterPolls('all', this)">All</button>
                <button class="filter-btn" data-cat="nfl" onclick="filterPolls('nfl', this)">&#x1F3C8; NFL</button>
                <button class="filter-btn" data-cat="nba" onclick="filterPolls('nba', this)">&#x1F3C0; NBA</button>
                <button class="filter-btn" data-cat="mlb" onclick="filterPolls('mlb', this)">&#x26BE; MLB</button>
                <button class="filter-btn" data-cat="nhl" onclick="filterPolls('nhl', this)">&#x1F3D2; NHL</button>
                <button class="filter-btn" data-cat="soccer" onclick="filterPolls('soccer', this)">&#x26BD; Soccer</button>
            </div>
            <button class="create-poll-btn" onclick="openCreatePollModal()">
                <span>&#x2795;</span> Create Poll
            </button>
        </div>

        <!-- Polls Grid -->
        <div class="polls-grid" id="pollsGrid">
            <!-- Rendered by JS -->
        </div>

    </div>

    <!-- Create Poll Modal -->
    <div class="modal-overlay" id="createPollModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeCreatePollModal()">&times;</button>
            <h2>Create Prediction Poll</h2>
            <form id="createPollForm" onsubmit="submitPoll(event)">
                <div class="form-group">
                    <label>Sport Category</label>
                    <select id="pollCategory" required>
                        <option value="">Select Sport</option>
                        <option value="nfl">&#x1F3C8; NFL</option>
                        <option value="nba">&#x1F3C0; NBA</option>
                        <option value="mlb">&#x26BE; MLB</option>
                        <option value="nhl">&#x1F3D2; NHL</option>
                        <option value="soccer">&#x26BD; Soccer</option>
                        <option value="ncaaf">&#x1F393; NCAAF</option>
                        <option value="ncaab">&#x1F3EB; NCAAB</option>
                        <option value="other">&#x1F3B2; Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Poll Question</label>
                    <input type="text" id="pollQuestion" placeholder="e.g., Who will win tonight's game?" required>
                </div>
                <div class="form-group">
                    <label>Options (2-4)</label>
                    <input type="text" id="pollOption1" placeholder="Option 1" required>
                    <input type="text" id="pollOption2" placeholder="Option 2" required>
                    <input type="text" id="pollOption3" placeholder="Option 3 (optional)">
                    <input type="text" id="pollOption4" placeholder="Option 4 (optional)">
                </div>
                <div class="form-group">
                    <label>End Time</label>
                    <input type="datetime-local" id="pollEndTime" required>
                </div>
                <div class="form-group">
                    <label>Points Reward</label>
                    <select id="pollPoints">
                        <option value="25">25 points (Easy)</option>
                        <option value="50" selected>50 points (Medium)</option>
                        <option value="75">75 points (Hard)</option>
                        <option value="100">100 points (Expert)</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Create Poll</button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    // ============ AUTH HELPERS ============

    function isLoggedIn() {
        if (localStorage.getItem('tmr_is_logged_in') === 'true') return true;
        if (localStorage.getItem('trustmyrecord_session') !== null) return true;
        return false;
    }

    function getCurrentUsername() {
        try {
            var u = JSON.parse(localStorage.getItem('tmr_current_user') || 'null');
            if (u && u.username) return u.username;
        } catch(e) {}
        try {
            var sess = JSON.parse(localStorage.getItem('trustmyrecord_session') || 'null');
            if (sess && sess.userId) {
                var users = JSON.parse(localStorage.getItem('trustmyrecord_users') || '[]');
                var user = users.find(function(u) { return u.id === sess.userId; });
                if (user) return user.username;
            }
        } catch(e) {}
        return null;
    }

    // ============ TOAST ============

    function showToast(message, type) {
        var t = document.getElementById('toast');
        t.textContent = message;
        t.className = 'toast ' + (type || 'info');
        setTimeout(function() { t.classList.add('show'); }, 10);
        setTimeout(function() { t.classList.remove('show'); }, 3000);
    }

    // ============ NAV STATUS ============

    function updateNavStatus() {
        var el = document.getElementById('navUserStatus');
        if (!el) return;
        var username = getCurrentUsername();
        if (isLoggedIn() && username) {
            el.textContent = '@' + username;
            el.classList.add('logged-in');
        } else if (isLoggedIn()) {
            el.textContent = 'Logged in';
            el.classList.add('logged-in');
        } else {
            el.textContent = 'Not logged in';
            el.classList.remove('logged-in');
        }
    }

    // ============ POLLS DATA ============

    function getPolls() {
        return JSON.parse(localStorage.getItem('trustmyrecord_polls') || '[]');
    }

    function savePolls(polls) {
        localStorage.setItem('trustmyrecord_polls', JSON.stringify(polls));
    }

    function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    // No sample data - polls start empty until real users create them

    // ============ CURRENT FILTER STATE ============
    var currentFilter = 'all';

    function filterPolls(cat, btnEl) {
        currentFilter = cat;
        // Update active button
        var btns = document.querySelectorAll('.filter-btn');
        btns.forEach(function(b) { b.classList.remove('active'); });
        if (btnEl) btnEl.classList.add('active');
        renderPollsGrid();
    }

    // ============ RENDER POLLS ============

    function renderPollsGrid() {
        var grid = document.getElementById('pollsGrid');
        if (!grid) return;

        var polls = getPolls();
        var now = new Date();
        var username = getCurrentUsername() || '';

        // Filter by category
        if (currentFilter && currentFilter !== 'all') {
            polls = polls.filter(function(p) { return p.category === currentFilter; });
        }

        // Separate active vs expired
        var active = polls.filter(function(p) { return new Date(p.expiresAt) > now; });
        var expired = polls.filter(function(p) { return new Date(p.expiresAt) <= now; });

        if (active.length === 0 && expired.length === 0) {
            grid.innerHTML = '<div class="empty-state">' +
                '<div class="empty-state-icon">&#x1F4CA;</div>' +
                '<h3>No polls found</h3>' +
                '<p>' + (currentFilter !== 'all' ? 'No polls in this category yet.' : 'Create a poll to get predictions from the community!') + '</p>' +
                '<button onclick="openCreatePollModal()">Create Poll</button>' +
                '</div>';
            return;
        }

        // Update user stats
        updateUserStats(username);

        var html = '';

        // Render active polls
        active.forEach(function(poll) {
            html += buildPollCard(poll, username, now, false);
        });

        // Expired divider
        if (expired.length > 0 && active.length > 0) {
            html += '<div class="expired-divider">Expired Polls</div>';
        } else if (expired.length > 0 && active.length === 0) {
            html += '<div class="expired-divider">All Polls Expired</div>';
        }

        // Render expired polls
        expired.forEach(function(poll) {
            html += buildPollCard(poll, username, now, true);
        });

        grid.innerHTML = html;
    }

    function buildPollCard(poll, username, now, isExpired) {
        var totalVotes = 0;
        poll.options.forEach(function(o) { totalVotes += (o.votes || 0); });

        var hasVoted = false;
        var votedIndex = -1;
        if (username) {
            poll.options.forEach(function(o, idx) {
                if (o.voters && o.voters.indexOf(username) !== -1) {
                    hasVoted = true;
                    votedIndex = idx;
                }
            });
        }

        var showResults = hasVoted || isExpired;

        // Time left
        var timeLeft = '';
        if (!isExpired) {
            var diff = new Date(poll.expiresAt) - now;
            var days = Math.floor(diff / 86400000);
            var hours = Math.floor((diff % 86400000) / 3600000);
            var mins = Math.floor((diff % 3600000) / 60000);
            if (days > 0) timeLeft = days + 'd ' + hours + 'h left';
            else if (hours > 0) timeLeft = hours + 'h ' + mins + 'm left';
            else timeLeft = mins + 'm left';
        } else {
            timeLeft = 'Ended';
        }

        var catIcons = { nfl: '\uD83C\uDFC8', nba: '\uD83C\uDFC0', mlb: '\u26BE', nhl: '\uD83C\uDFD2', ncaaf: '\uD83C\uDF93', ncaab: '\uD83C\uDFEB', soccer: '\u26BD', other: '\uD83C\uDFB2' };
        var catIcon = catIcons[poll.category] || '\uD83D\uDCCA';

        var card = '<div class="poll-card' + (isExpired ? ' expired' : '') + '">';

        // Top row
        card += '<div class="poll-top">';
        card += '<span class="poll-category-pill">' + catIcon + ' ' + (poll.category || 'general').toUpperCase() + '</span>';
        card += '<span class="poll-time-left' + (isExpired ? ' ended' : '') + '">' + timeLeft + '</span>';
        card += '</div>';

        // Question
        card += '<div class="poll-question">' + escapeHtml(poll.question) + '</div>';
        card += '<div class="poll-meta">by @' + escapeHtml(poll.createdBy) + ' &middot; ' + totalVotes + ' votes</div>';

        // Get max percentage for winner detection
        var maxPct = 0;
        if (showResults && totalVotes > 0) {
            poll.options.forEach(function(o) {
                var p = Math.round((o.votes / totalVotes) * 100);
                if (p > maxPct) maxPct = p;
            });
        }

        // Options
        poll.options.forEach(function(opt, idx) {
            var pct = totalVotes > 0 ? Math.round((opt.votes / totalVotes) * 100) : 0;
            var isWinner = showResults && pct === maxPct && pct > 0;
            var isMyVote = votedIndex === idx;

            if (showResults) {
                card += '<div class="result-bar' + (isMyVote ? ' my-vote' : '') + '">';
                card += '<div class="result-bar-fill ' + (isWinner ? 'winner' : 'normal') + '" style="width: ' + pct + '%;"></div>';
                card += '<div class="result-bar-content">';
                card += '<span class="result-bar-text' + (isMyVote ? ' voted' : '') + '">' + escapeHtml(opt.text) + (isMyVote ? ' \u2713' : '') + '</span>';
                card += '<span class="result-bar-pct ' + (isWinner ? 'winner' : 'normal') + '">' + pct + '%</span>';
                card += '</div></div>';
            } else {
                card += '<button class="vote-btn" onclick="votePoll(\'' + poll.id + '\',' + idx + ')">' + escapeHtml(opt.text) + '</button>';
            }
        });

        // Footer
        card += '<div class="poll-footer">';
        card += '<span>\uD83C\uDFC6 ' + (poll.points || 50) + ' pts</span>';
        card += '<span>' + totalVotes + ' total votes</span>';
        card += '</div>';

        card += '</div>';
        return card;
    }

    // ============ UPDATE USER STATS ============

    function updateUserStats(username) {
        var allPolls = getPolls();
        var userVoteCount = 0;

        allPolls.forEach(function(p) {
            p.options.forEach(function(o) {
                if (o.voters && o.voters.indexOf(username) !== -1) userVoteCount++;
            });
        });

        var vcEl = document.getElementById('pollsVoteCount');
        if (vcEl) vcEl.textContent = userVoteCount;

        // Points
        var pollPoints = parseInt(localStorage.getItem('trustMyRecordPollPoints') || '0', 10);
        var ppEl = document.getElementById('pollsPoints');
        if (ppEl) ppEl.textContent = pollPoints;

        // Rank
        var voterMap = {};
        allPolls.forEach(function(p) {
            p.options.forEach(function(o) {
                if (o.voters) o.voters.forEach(function(v) {
                    voterMap[v] = (voterMap[v] || 0) + 1;
                });
            });
        });

        var voterList = Object.entries(voterMap).sort(function(a, b) { return b[1] - a[1]; });
        var rank = voterList.findIndex(function(v) { return v[0] === username; });
        var rkEl = document.getElementById('pollsRank');
        if (rkEl) rkEl.textContent = rank >= 0 ? '#' + (rank + 1) : '--';

        // Accuracy (votes out of total polls)
        var acEl = document.getElementById('pollsAccuracy');
        if (acEl) acEl.textContent = userVoteCount > 0 ? Math.round((userVoteCount / Math.max(allPolls.length, 1)) * 100) + '%' : '--';
    }

    // ============ VOTE ============

    function votePoll(pollId, optionIndex) {
        if (!isLoggedIn()) {
            showToast('Please log in to vote on polls.', 'error');
            return;
        }

        var username = getCurrentUsername();
        if (!username) {
            showToast('Could not determine your username. Please log in again.', 'error');
            return;
        }

        var polls = getPolls();
        var pollIdx = -1;
        for (var i = 0; i < polls.length; i++) {
            if (polls[i].id === pollId) { pollIdx = i; break; }
        }
        if (pollIdx === -1) return;

        var poll = polls[pollIdx];

        // Check expiry
        if (new Date(poll.expiresAt) <= new Date()) {
            showToast('This poll has expired.', 'error');
            renderPollsGrid();
            return;
        }

        // Check already voted
        for (var j = 0; j < poll.options.length; j++) {
            if (poll.options[j].voters && poll.options[j].voters.indexOf(username) !== -1) {
                showToast('You already voted on this poll!', 'info');
                renderPollsGrid();
                return;
            }
        }

        // Cast vote
        poll.options[optionIndex].votes = (poll.options[optionIndex].votes || 0) + 1;
        if (!poll.options[optionIndex].voters) poll.options[optionIndex].voters = [];
        poll.options[optionIndex].voters.push(username);
        poll.totalVotes = (poll.totalVotes || 0) + 1;

        polls[pollIdx] = poll;
        savePolls(polls);

        showToast('Vote recorded! +' + (poll.points || 50) + ' pts', 'success');

        // Add points
        var currentPts = parseInt(localStorage.getItem('trustMyRecordPollPoints') || '0', 10);
        localStorage.setItem('trustMyRecordPollPoints', String(currentPts + (poll.points || 50)));

        renderPollsGrid();
    }

    // ============ CREATE POLL MODAL ============

    function openCreatePollModal() {
        if (!isLoggedIn()) {
            showToast('Please log in to create a poll.', 'error');
            return;
        }
        // Set default end time to 24h from now
        var dt = new Date(Date.now() + 86400000);
        var local = dt.toISOString().slice(0, 16);
        document.getElementById('pollEndTime').value = local;
        document.getElementById('createPollModal').classList.add('active');
    }

    function closeCreatePollModal() {
        document.getElementById('createPollModal').classList.remove('active');
        document.getElementById('createPollForm').reset();
    }

    function submitPoll(event) {
        event.preventDefault();

        if (!isLoggedIn()) {
            showToast('Please log in to create a poll.', 'error');
            return;
        }

        var username = getCurrentUsername() || 'Anonymous';
        var question = document.getElementById('pollQuestion').value.trim();
        var category = document.getElementById('pollCategory').value;
        var opt1 = document.getElementById('pollOption1').value.trim();
        var opt2 = document.getElementById('pollOption2').value.trim();
        var opt3 = document.getElementById('pollOption3').value.trim();
        var opt4 = document.getElementById('pollOption4').value.trim();
        var endTime = document.getElementById('pollEndTime').value;
        var points = document.getElementById('pollPoints').value;

        if (!question || !opt1 || !opt2 || !category) {
            showToast('Please fill in the question, category, and at least 2 options.', 'error');
            return;
        }

        var options = [
            { text: opt1, votes: 0, voters: [] },
            { text: opt2, votes: 0, voters: [] }
        ];
        if (opt3) options.push({ text: opt3, votes: 0, voters: [] });
        if (opt4) options.push({ text: opt4, votes: 0, voters: [] });

        var poll = {
            id: 'poll_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            question: question,
            category: category,
            options: options,
            createdBy: username,
            createdAt: new Date().toISOString(),
            expiresAt: endTime ? new Date(endTime).toISOString() : new Date(Date.now() + 86400000).toISOString(),
            points: parseInt(points) || 50,
            totalVotes: 0
        };

        var polls = getPolls();
        polls.unshift(poll);
        savePolls(polls);

        closeCreatePollModal();
        showToast('Poll created successfully!', 'success');
        renderPollsGrid();
    }

    // Close modal on overlay click
    document.getElementById('createPollModal').addEventListener('click', function(e) {
        if (e.target === this) closeCreatePollModal();
    });

    // Close modal on Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeCreatePollModal();
    });

    // ============ INIT ============

    document.addEventListener('DOMContentLoaded', function() {
        updateNavStatus();
        renderPollsGrid();
    });
    </script>

</body>
