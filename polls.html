<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Hangout | TrustMyRecord</title>
    <meta http-equiv="refresh" content="0; url=hangout.html">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="static/css/tmr-sitewide.css?v=20260421b">
    <script defer src="static/js/tmr-sitewide.js?v=20260421b"></script>
    <script>
        window.location.replace('hangout.html');
    </script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(0, 255, 255, 0.12), transparent 35%),
                linear-gradient(180deg, #07111d 0%, #04080f 100%);
            color: #f5fbff;
            font-family: Inter, system-ui, sans-serif;
        }

        .redirect-card {
            width: min(540px, calc(100vw - 32px));
            padding: 32px;
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 255, 0.16);
            background: rgba(9, 17, 29, 0.88);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
        }

        .redirect-kicker {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(0, 255, 255, 0.1);
            color: #87ffff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 2.6rem);
            line-height: 1.05;
        }

        p {
            margin: 0;
            color: rgba(226, 232, 240, 0.88);
            line-height: 1.7;
        }

        a {
            color: #8ef9ff;
        }
    </style>
</head>
<body>
    <div class="redirect-card">
        <div class="redirect-kicker">Hangout redirect</div>
        <h1>Moving to the Hangout</h1>
        <p>If the redirect does not happen automatically, open <a href="hangout.html">hangout.html</a>.</p>
    </div>
</body>
</html>
