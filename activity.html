<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Feed | TrustMyRecord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #ff00ff;
            --neon-green: #39ff14;
            --neon-gold: #ffd700;
            --neon-red: #ff073a;
            --neon-orange: #ff6b35;
            --primary: #00ffff;
            --primary-dark: #00cccc;
            --success: #39ff14;
            --success-dark: #2ecc0f;
            --danger: #ff073a;
            --warning: #ffd700;
            --gold: #ffd700;
            --dark-bg: #0a0a0f;
            --darker-bg: #050508;
            --card-bg: rgba(20, 20, 35, 0.8);
            --glass-border: rgba(0, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #b0b0c0;
            --text-muted: #808090;
            --border-color: rgba(0, 255, 255, 0.2);
            --gradient-neon: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            --gradient-gold: linear-gradient(45deg, var(--neon-gold), var(--neon-cyan));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--dark-bg);
            background-image:
                radial-gradient(circle at 25% 75%, rgba(0, 255, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 75% 25%, rgba(255, 215, 0, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, var(--darker-bg) 0%, var(--dark-bg) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 20s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* ========== HEADER / NAV BAR ========== */
        header {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--neon-gold);
            text-decoration: none;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            cursor: pointer;
            transition: all 0.3s;
        }

        .logo:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            transform: scale(1.02);
        }

        .logo span {
            color: var(--neon-cyan);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .nav-link:hover {
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.1);
        }

        .nav-link.active {
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
        }
        

        /* Main Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: var(--gradient-neon);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--text-secondary);
        }

        /* Feed Filters */
        .feed-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .filter-btn {
            padding: 10px 20px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            white-space: nowrap;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: rgba(0, 255, 255, 0.2);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        /* Activity Cards */
        .activity-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .activity-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
        }

        .activity-card:hover {
            border-color: rgba(0, 243, 255, 0.3);
            transform: translateY(-2px);
        }

        .activity-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .activity-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gradient-neon);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .activity-meta {
            flex: 1;
        }

        .activity-user {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .activity-user a {
            color: inherit;
            text-decoration: none;
        }

        .activity-user a:hover {
            color: var(--primary);
        }

        .activity-action {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .activity-time {
            font-size: 13px;
            color: var(--text-muted);
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .activity-icon.bet-placed { background: rgba(0, 243, 255, 0.1); color: var(--primary); }
        .activity-icon.bet-won { background: rgba(57, 255, 20, 0.1); color: var(--success); }
        .activity-icon.bet-lost { background: rgba(255, 7, 58, 0.1); color: var(--danger); }
        .activity-icon.challenge { background: rgba(255, 215, 0, 0.1); color: var(--warning); }
        .activity-icon.achievement { background: rgba(255, 140, 0, 0.1); color: var(--neon-orange); }
        .activity-icon.friend { background: rgba(0, 243, 255, 0.1); color: var(--primary); }
        .activity-icon.milestone { background: rgba(255, 0, 255, 0.1); color: var(--primary); }

        /* Bet Card Content */
        .bet-content {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
        }

        .bet-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .bet-team {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-logo {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .vs {
            font-family: 'Exo 2', sans-serif;
            color: var(--text-muted);
            font-size: 12px;
        }

        .bet-details {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .bet-detail {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .bet-detail i {
            color: var(--primary);
        }

        .bet-outcome {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .bet-outcome.win {
            background: rgba(57, 255, 20, 0.2);
            color: var(--success);
        }

        .bet-outcome.loss {
            background: rgba(255, 7, 58, 0.2);
            color: var(--danger);
        }

        .bet-outcome.pending {
            background: rgba(255, 215, 0, 0.2);
            color: var(--warning);
        }

        /* Achievement Card */
        .achievement-content {
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(90deg, rgba(255, 140, 0, 0.1), rgba(255, 215, 0, 0.1));
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .achievement-icon {
            font-size: 3rem;
        }

        .achievement-info h4 {
            font-family: 'Orbitron', sans-serif;
            color: var(--warning);
            margin-bottom: 5px;
        }

        .achievement-info p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Challenge Card */
        .challenge-content {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
        }

        .challenge-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .challenge-title {
            font-weight: 600;
        }

        .challenge-prize {
            color: var(--warning);
            font-weight: 700;
        }

        .challenge-vs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .challenge-player {
            text-align: center;
        }

        .challenge-player-name {
            font-weight: 600;
            margin-top: 5px;
        }

        /* Actions Bar */
        .activity-actions {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
        }

        .activity-action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .activity-action-btn:hover {
            color: var(--primary);
        }

        .activity-action-btn.liked {
            color: var(--danger);
        }

        /* Comments Section */
        .comments-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
            display: none;
        }

        .comments-section.show {
            display: block;
        }

        .comment-input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .comment-input {
            flex: 1;
            padding: 10px 15px;
            background: rgba(20, 20, 35, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: white;
            font-family: 'Exo 2', sans-serif;
        }

        .comment-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .comment-submit {
            padding: 10px 20px;
            background: var(--neon-cyan);
            border: none;
            border-radius: 20px;
            color: var(--dark-bg);
            font-weight: 700;
            cursor: pointer;
        }

        .comment {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--gradient-neon);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
        }

        .comment-author {
            font-weight: 600;
            font-size: 14px;
        }

        .comment-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .comment-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* New Activity Animation */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .activity-card.new {
            animation: slideIn 0.5s ease;
            border-color: var(--primary);
        }

        /* Live Indicator */
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 7, 58, 0.2);
            color: var(--danger);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Load More */
        .load-more {
            text-align: center;
            padding: 30px;
        }

        .load-more-btn {
            padding: 12px 40px;
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
        }

        .load-more-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .page-title {
                font-size: 1.8rem;
            }

            .bet-teams {
                flex-direction: column;
                gap: 10px;
            }

            .challenge-vs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
        <header>
        <div class="header-content">
            <a href="index.html" class="logo">TRUST<span>MY</span>RECORD</a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="challenges.html" class="nav-link">Arena</a>
                <a href="forum.html" class="nav-link">Forum</a>
                <a href="activity.html" class="nav-link active">Activity</a>
                <a href="profile.html" class="nav-link">My Profile</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-stream"></i> Activity Feed</h1>
            <p class="page-subtitle">See what your friends are betting on</p>
        </div>

        <!-- Filters -->
        <div class="feed-filters">
            <button class="filter-btn active" onclick="filterFeed('all')">All Activity</button>
            <button class="filter-btn" onclick="filterFeed('bets')">🎯 Bets</button>
            <button class="filter-btn" onclick="filterFeed('wins')">🏆 Wins</button>
            <button class="filter-btn" onclick="filterFeed('challenges')">⚔️ Challenges</button>
            <button class="filter-btn" onclick="filterFeed('achievements')">🏅 Achievements</button>
        </div>

        <!-- Activity Feed -->
        <div class="activity-feed" id="activityFeed">
            <!-- Activities loaded by JS -->
        </div>

        <div class="load-more">
            <button class="load-more-btn" onclick="loadMore()">Load More</button>
        </div>
    </main>

    <script src="static/js/config.js"></script>
    <script src="static/js/backend-api.js"></script>
    <script src="static/js/auth-persistent.js"></script>
    <script src="static/js/notifications.js"></script>
    <script>
        let currentFilter = 'all';
        let feedItems = [];
        let feedOffset = 0;
        const FEED_LIMIT = 20;
        let loadingMore = false;
        let noMoreItems = false;

        function getStatusIcon(status) {
            if (status === 'won') return { cls: 'bet-won', icon: 'fa-trophy' };
            if (status === 'lost') return { cls: 'bet-lost', icon: 'fa-times-circle' };
            return { cls: 'bet-placed', icon: 'fa-check-circle' };
        }

        function getStatusLabel(status) {
            if (status === 'won') return 'won a pick';
            if (status === 'lost') return 'lost a pick';
            return 'posted a pick';
        }

        function timeAgo(timestamp) {
            const d = typeof timestamp === 'string' ? new Date(timestamp) : new Date(timestamp);
            const seconds = Math.floor((Date.now() - d.getTime()) / 1000);
            if (seconds < 60) return 'just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        function renderPickCard(item) {
            const currentUser = (typeof auth !== 'undefined' && auth.getCurrentUser) ? auth.getCurrentUser() : null;
            const { cls, icon } = getStatusIcon(item.status);
            const username = item.username || item.display_name || 'Unknown';
            const avatarLetter = username[0]?.toUpperCase() || '?';
            const avatarUrl = item.avatar_url;
            const avatarHtml = avatarUrl
                ? `<img src="${avatarUrl}" alt="${username}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`
                : avatarLetter;

            const oddsStr = item.odds > 0 ? `+${item.odds}` : `${item.odds}`;
            const outcomeHtml = item.status === 'won'
                ? `<div style="margin-top:10px;"><span class="bet-outcome win">Won</span></div>`
                : item.status === 'lost'
                ? `<div style="margin-top:10px;"><span class="bet-outcome loss">Lost</span></div>`
                : `<div style="margin-top:10px;"><span class="bet-outcome pending">Pending</span></div>`;

            const isLiked = item.is_liked || false;
            const likesCount = parseInt(item.likes_count || 0);
            const commentsCount = parseInt(item.comments_count || 0);

            return `
                <div class="activity-card" data-pick-id="${item.id}">
                    <div class="activity-header">
                        <div class="activity-avatar">${avatarHtml}</div>
                        <div class="activity-meta">
                            <div class="activity-user">
                                <a href="profile.html?user=${username}">${username}</a>
                                ${item.verification_status === 'verified' ? '<i class="fas fa-check-circle" style="color:var(--primary);margin-left:4px;font-size:12px;" title="Verified"></i>' : ''}
                            </div>
                            <div class="activity-action">${getStatusLabel(item.status)}</div>
                            <div class="activity-time">${timeAgo(item.created_at)}</div>
                        </div>
                        <div class="activity-icon ${cls}">
                            <i class="fas ${icon}"></i>
                        </div>
                    </div>
                    <div class="bet-content">
                        <div class="bet-teams">
                            <div class="bet-team">
                                <div class="team-logo">${item.away_team ? item.away_team[0] : (item.selection ? item.selection[0] : '?')}</div>
                                <span>${item.away_team || item.selection || 'TBD'}</span>
                            </div>
                            <span class="vs">VS</span>
                            <div class="bet-team">
                                <div class="team-logo">${item.home_team ? item.home_team[0] : '?'}</div>
                                <span>${item.home_team || 'TBD'}</span>
                            </div>
                        </div>
                        <div class="bet-details">
                            <div class="bet-detail">
                                <i class="fas fa-crosshairs"></i>
                                <span>${item.market_type || item.pick_type || 'Pick'}: ${item.selection || item.team_picked || 'N/A'} ${item.line_snapshot ? '(' + (item.line_snapshot > 0 ? '+' : '') + item.line_snapshot + ')' : (item.spread ? '(' + item.spread + ')' : '')}</span>
                            </div>
                            <div class="bet-detail">
                                <i class="fas fa-chart-line"></i>
                                <span>${item.odds_snapshot ? (item.odds_snapshot > 0 ? '+' + item.odds_snapshot : '' + item.odds_snapshot) : oddsStr}</span>
                            </div>
                            ${(item.units || item.units === 0) ? `<div class="bet-detail"><i class="fas fa-coins"></i><span>${item.units} units</span></div>` : ''}
                        </div>
                        ${outcomeHtml}
                    </div>
                    <div class="activity-actions">
                        <button class="activity-action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(${item.id}, this)">
                            <i class="fas fa-heart"></i>
                            <span class="like-count">${likesCount}</span>
                        </button>
                        <button class="activity-action-btn" onclick="toggleComments(${item.id})">
                            <i class="fas fa-comment"></i>
                            <span>${commentsCount}</span>
                        </button>
                        <button class="activity-action-btn" onclick="shareActivity(${item.id})">
                            <i class="fas fa-share"></i>
                            Share
                        </button>
                    </div>
                    <div class="comments-section" id="comments-${item.id}">
                        <div class="comment-input-wrapper">
                            <input type="text" class="comment-input" id="comment-input-${item.id}" placeholder="Add a comment..." onkeypress="if(event.key==='Enter')addComment(${item.id})">
                            <button class="comment-submit" onclick="addComment(${item.id})">Post</button>
                        </div>
                        <div class="comments-list" id="comments-list-${item.id}"></div>
                    </div>
                </div>
            `;
        }

        function renderFeed() {
            const container = document.getElementById('activityFeed');

            let filtered = feedItems;
            if (currentFilter === 'bets') {
                filtered = feedItems.filter(i => i.status === 'pending');
            } else if (currentFilter === 'wins') {
                filtered = feedItems.filter(i => i.status === 'won');
            }

            if (filtered.length === 0) {
                const isLoggedIn = api.isLoggedIn();
                container.innerHTML = `
                    <div class="empty-state" style="text-align: center; padding: 60px; color: var(--text-muted);">
                        <i class="fas fa-stream" style="font-size: 3rem; margin-bottom: 20px; display: block;"></i>
                        <h3>No Activity Yet</h3>
                        <p>${isLoggedIn ? 'Follow more users to see their picks here' : 'Log in and follow users to see their picks'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(item => renderPickCard(item)).join('');
        }

        async function loadFeed(reset) {
            if (reset) {
                feedOffset = 0;
                feedItems = [];
                noMoreItems = false;
            }

            const container = document.getElementById('activityFeed');
            if (feedOffset === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-spinner fa-spin" style="font-size:2rem;"></i><p style="margin-top:10px;">Loading feed...</p></div>';
            }

            try {
                await api.ready;
                if (!api.backendAvailable) {
                    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:10px;display:block;"></i><p>Backend unavailable. Please try again later.</p></div>';
                    return;
                }

                let data;
                if (api.isLoggedIn()) {
                    data = await api.request(`/social/feed?limit=${FEED_LIMIT}&offset=${feedOffset}`);
                    // If personal feed is empty, fall back to discover
                    if (data.feed && data.feed.length === 0 && feedOffset === 0) {
                        data = await api.request(`/social/discover?limit=${FEED_LIMIT}&offset=${feedOffset}`);
                        const items = data.picks || [];
                        feedItems = feedItems.concat(items);
                        if (items.length < FEED_LIMIT) noMoreItems = true;
                    } else {
                        const items = data.feed || [];
                        feedItems = feedItems.concat(items);
                        if (items.length < FEED_LIMIT) noMoreItems = true;
                    }
                } else {
                    data = await api.request(`/social/discover?limit=${FEED_LIMIT}&offset=${feedOffset}`);
                    const items = data.picks || [];
                    feedItems = feedItems.concat(items);
                    if (items.length < FEED_LIMIT) noMoreItems = true;
                }

                feedOffset += FEED_LIMIT;
                renderFeed();
                updateLoadMoreBtn();
            } catch (err) {
                console.error('Failed to load feed:', err);
                if (feedItems.length === 0) {
                    container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:10px;display:block;"></i><p>Failed to load feed. ${err.message || ''}</p></div>`;
                }
            }
        }

        function updateLoadMoreBtn() {
            const btn = document.querySelector('.load-more-btn');
            if (noMoreItems || feedItems.length === 0) {
                btn.style.display = 'none';
            } else {
                btn.style.display = 'inline-block';
                btn.textContent = 'Load More';
                btn.disabled = false;
            }
        }

        function filterFeed(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderFeed();
        }

        async function toggleLike(pickId, btnEl) {
            if (!api.isLoggedIn()) {
                alert('Please log in to like picks.');
                return;
            }
            try {
                const isLiked = btnEl.classList.contains('liked');
                let data;
                if (isLiked) {
                    data = await api.request(`/picks/${pickId}/like`, { method: 'DELETE' });
                    btnEl.classList.remove('liked');
                } else {
                    data = await api.request(`/picks/${pickId}/like`, { method: 'POST' });
                    btnEl.classList.add('liked');
                }
                const countSpan = btnEl.querySelector('.like-count');
                if (countSpan && data.likeCount !== undefined) {
                    countSpan.textContent = data.likeCount;
                }
                // Update local state
                const item = feedItems.find(i => i.id === pickId);
                if (item) {
                    item.is_liked = !isLiked;
                    item.likes_count = data.likeCount ?? item.likes_count;
                }
            } catch (err) {
                console.error('Like error:', err);
            }
        }

        function toggleComments(pickId) {
            const section = document.getElementById(`comments-${pickId}`);
            section.classList.toggle('show');
        }

        async function addComment(pickId) {
            const input = document.getElementById(`comment-input-${pickId}`);
            const text = input.value.trim();
            if (!text || !api.isLoggedIn()) return;

            try {
                await api.request(`/picks/${pickId}/comments`, {
                    method: 'POST',
                    body: { content: text }
                });
                input.value = '';
                // Reload just that comments section
                const listEl = document.getElementById(`comments-list-${pickId}`);
                const data = await api.request(`/picks/${pickId}/comments`);
                const comments = data.comments || [];
                listEl.innerHTML = comments.map(c => `
                    <div class="comment">
                        <div class="comment-avatar">${(c.username || '?')[0]}</div>
                        <div class="comment-content">
                            <div class="comment-author">${c.username || 'User'}</div>
                            <div class="comment-text">${c.content}</div>
                            <div class="comment-time">${timeAgo(c.created_at)}</div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Comment error:', err);
            }
        }

        function shareActivity(pickId) {
            const url = `${window.location.origin}/activity.html?pick=${pickId}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('Link copied to clipboard!');
            });
        }

        async function loadMore() {
            if (loadingMore || noMoreItems) return;
            loadingMore = true;
            const btn = document.querySelector('.load-more-btn');
            btn.textContent = 'Loading...';
            btn.disabled = true;
            await loadFeed(false);
            loadingMore = false;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadFeed(true);
        });
    </script>
</body>
</html>
