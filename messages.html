<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Trust My Record</title>
    <meta name="description" content="Private messaging with other bettors on Trust My Record.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #ff00ff;
            --neon-green: #39ff14;
            --neon-gold: #ffd700;
            --neon-red: #ff073a;
            --neon-orange: #ff6b35;
            --dark-bg: #0a0a0f;
            --darker-bg: #050508;
            --card-bg: rgba(20, 20, 35, 0.8);
            --glass-border: rgba(0, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #b0b0c0;
            --text-muted: #808090;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--dark-bg);
            background-image:
                radial-gradient(circle at 25% 75%, rgba(0, 255, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 75% 25%, rgba(255, 215, 0, 0.06) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--neon-cyan);
        }

        /* Main Layout */
        .messages-wrapper {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 100px);
        }

        /* Sidebar */
        .conversations-sidebar {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
        }

        .new-message-btn {
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 5px;
        }

        .conversation-item:hover {
            background: rgba(0, 255, 255, 0.1);
        }

        .conversation-item.active {
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
        }

        .conversation-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }

        .conversation-info {
            flex: 1;
            min-width: 0;
        }

        .conversation-name {
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-preview {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-meta {
            text-align: right;
        }

        .conversation-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .unread-badge {
            background: var(--neon-cyan);
            color: black;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 4px;
            display: inline-block;
        }

        /* Chat Area */
        .chat-area {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }

        .chat-header-info h3 {
            margin-bottom: 4px;
        }

        .chat-header-info p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            position: relative;
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .message-content {
            line-height: 1.5;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            resize: none;
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--neon-cyan);
        }

        .send-btn {
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.3);
        }

        /* Empty States */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* New Message Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }

        .modal h3 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-family: inherit;
            margin-bottom: 20px;
            outline: none;
        }

        .modal-input:focus {
            border-color: var(--neon-cyan);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .modal-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .modal-btn.primary {
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .messages-wrapper {
                grid-template-columns: 1fr;
                height: calc(100vh - 80px);
            }

            .conversations-sidebar {
                display: none;
            }

            .conversations-sidebar.active {
                display: flex;
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 50;
            }
        }
    </style>
</head>
<body>
        <header>
        <div class="header-content">
            <a href="index.html" class="logo">TRUST<span>MY</span>RECORD</a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="challenges.html" class="nav-link">Arena</a>
                <a href="forum.html" class="nav-link">Forum</a>
                <a href="activity.html" class="nav-link">Activity</a>
                <a href="profile.html" class="nav-link">My Profile</a>
            </nav>
        </div>
    </header>

    <div class="messages-wrapper">
        <!-- Conversations Sidebar -->
        <div class="conversations-sidebar">
            <div class="sidebar-header">
                <h2>💬 Messages</h2>
                <button class="new-message-btn" onclick="openNewMessageModal()">+ New</button>
            </div>
            <div class="conversations-list" id="conversationsList">
                <!-- Conversations loaded here -->
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-avatar" id="chatAvatar">👤</div>
                <div class="chat-header-info">
                    <h3 id="chatUserName">Select a conversation</h3>
                    <p id="chatUserStatus">Online</p>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <h3>Select a conversation</h3>
                    <p>Choose from your conversations or start a new one</p>
                </div>
            </div>

            <div class="chat-input-area" id="chatInputArea" style="display: none;">
                <textarea class="chat-input" id="messageInput" placeholder="Type a message..." rows="1"></textarea>
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- New Message Modal -->
    <div class="modal-overlay" id="newMessageModal">
        <div class="modal">
            <h3>💬 New Message</h3>
            <input type="text" class="modal-input" id="newMessageUsername" placeholder="Search for a user..." oninput="onUserSearchInput()">
            <div id="userSearchResults" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeNewMessageModal()">Cancel</button>
                <button class="modal-btn primary" onclick="startNewConversation()">Start Chat</button>
            </div>
        </div>
    </div>

    <script src="static/js/config.js?v=20260317"></script>
    <script src="static/js/analytics.js?v=20260405"></script>
    <script src="static/js/backend-api.js?v=20260317"></script>
    <script src="static/js/notifications.js?v=20260318"></script>
    <script src="static/js/auth-persistent.js?v=20260317"></script>
    <script>
        // Message System - Backend API powered
        let currentUser = null;
        let activeConversationUserId = null;
        let activeConversationUsername = null;
        let conversations = [];
        let refreshInterval = null;

        async function init() {
            // Wait for backend API to be ready
            await api.ready;

            // Check login - try backend first, then localStorage
            if (api.isLoggedIn()) {
                try {
                    const userData = await api.getCurrentUser();
                    currentUser = userData.user || userData;
                } catch (e) {
                    currentUser = null;
                }
            }
            // Fallback to localStorage auth
            if (!currentUser && typeof auth !== 'undefined' && auth.isLoggedIn()) {
                currentUser = auth.getCurrentUser();
            }
            if (!currentUser) {
                try {
                    const stored = localStorage.getItem('tmr_current_user') || localStorage.getItem('trustmyrecord_session');
                    if (stored) {
                        const parsed = JSON.parse(stored);
                        currentUser = parsed.user || parsed;
                    }
                } catch(e) {}
            }
            if (!currentUser) {
                window.location.href = 'index.html?section=login';
                return;
            }

            await loadConversations();

            // Check for ?to=username parameter
            const urlParams = new URLSearchParams(window.location.search);
            const toUser = urlParams.get('to');
            if (toUser) {
                await startConversationWithUser(toUser);
            }

            // Auto-resize textarea
            const textarea = document.getElementById('messageInput');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            // Enter to send
            textarea.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Auto-refresh conversations every 30 seconds
            refreshInterval = setInterval(async () => {
                await loadConversations();
                // If viewing a conversation, refresh its messages too
                if (activeConversationUserId) {
                    await loadChatMessages(activeConversationUserId, false);
                }
            }, 30000);
        }

        async function loadConversations() {
            try {
                if (api.backendAvailable === true) {
                    const data = await api.getConversations();
                    conversations = data.conversations || [];
                } else {
                    // localStorage fallback
                    conversations = loadLocalConversations();
                }
                renderConversationsList();
            } catch (e) {
                console.error('Failed to load conversations:', e);
                // Try localStorage fallback
                conversations = loadLocalConversations();
                renderConversationsList();
            }
        }

        function loadLocalConversations() {
            const messages = JSON.parse(localStorage.getItem('trustmyrecord_messages') || '[]');
            const convMap = {};
            const users = JSON.parse(localStorage.getItem('trustmyrecord_users') || '[]');
            const myId = currentUser.id || currentUser.username;

            messages.forEach(m => {
                const otherId = m.senderId === myId ? m.recipientId : (m.recipientId === myId ? m.senderId : null);
                if (!otherId) return;
                if (!convMap[otherId]) {
                    const otherUser = users.find(u => u.id === otherId || u.username === otherId);
                    convMap[otherId] = {
                        other_user_id: otherId,
                        other_username: otherUser ? otherUser.username : otherId,
                        last_message: m.content,
                        last_message_at: m.timestamp,
                        unread_count: 0
                    };
                }
                if (new Date(m.timestamp) > new Date(convMap[otherId].last_message_at || 0)) {
                    convMap[otherId].last_message = m.content;
                    convMap[otherId].last_message_at = m.timestamp;
                }
                if (m.recipientId === myId && !m.read) convMap[otherId].unread_count++;
            });
            return Object.values(convMap).sort((a, b) => new Date(b.last_message_at || 0) - new Date(a.last_message_at || 0));
        }

        function renderConversationsList() {
            const list = document.getElementById('conversationsList');

            if (conversations.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="padding: 40px 20px;">
                        <div style="font-size: 48px; margin-bottom: 15px;">📬</div>
                        <p style="color: var(--text-muted);">No conversations yet</p>
                        <p style="font-size: 13px; color: var(--text-muted); opacity: 0.7;">Start a conversation!</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = conversations.map(conv => {
                const isActive = activeConversationUserId === conv.other_user_id;
                const initial = (conv.other_username || '?').charAt(0).toUpperCase();
                const preview = conv.last_message ? conv.last_message.substring(0, 30) + (conv.last_message.length > 30 ? '...' : '') : 'No messages yet';
                const time = conv.last_message_at ? formatTime(conv.last_message_at) : '';

                return `
                    <div class="conversation-item ${isActive ? 'active' : ''}"
                         onclick="selectConversation(${conv.other_user_id}, '${escapeAttr(conv.other_username)}')">
                        <div class="conversation-avatar">${initial}</div>
                        <div class="conversation-info">
                            <div class="conversation-name">${escapeHtml(conv.other_username)}</div>
                            <div class="conversation-preview">${escapeHtml(preview)}</div>
                        </div>
                        <div class="conversation-meta">
                            <div class="conversation-time">${time}</div>
                            ${conv.unread_count > 0 ? `<span class="unread-badge">${conv.unread_count}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function selectConversation(userId, username) {
            activeConversationUserId = userId;
            activeConversationUsername = username;

            // Mark as read
            try {
                await api.markAsRead(userId);
            } catch (e) {
                console.error('Failed to mark as read:', e);
            }

            // Update sidebar to reflect active + cleared unread
            const conv = conversations.find(c => c.other_user_id === userId);
            if (conv) conv.unread_count = 0;
            renderConversationsList();

            // Show chat header
            renderChatHeader(username);
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('chatInputArea').style.display = 'flex';

            // Load messages
            await loadChatMessages(userId, true);
        }

        async function loadChatMessages(userId, scrollToBottom) {
            try {
                let messages;
                if (api.backendAvailable === true) {
                    const data = await api.getMessages(userId);
                    messages = data.messages || [];
                } else {
                    // localStorage fallback
                    const allMsgs = JSON.parse(localStorage.getItem('trustmyrecord_messages') || '[]');
                    const myId = currentUser.id || currentUser.username;
                    messages = allMsgs.filter(m =>
                        (m.senderId === myId && m.recipientId === userId) ||
                        (m.senderId === userId && m.recipientId === myId)
                    ).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
                    .map(m => ({ ...m, sender_id: m.senderId, created_at: m.timestamp }));
                }
                renderMessages(messages);
                if (scrollToBottom) {
                    const container = document.getElementById('chatMessages');
                    container.scrollTop = container.scrollHeight;
                }
            } catch (e) {
                console.error('Failed to load messages:', e);
                document.getElementById('chatMessages').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>Failed to load messages</p>
                    </div>
                `;
            }
        }

        function renderChatHeader(username) {
            document.getElementById('chatAvatar').textContent = (username || '?').charAt(0).toUpperCase();
            document.getElementById('chatUserName').textContent = username || 'Unknown';
        }

        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');

            if (!messages || messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <p>No messages yet. Say hello!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(msg => {
                const isSent = msg.sender_id === currentUser.id;
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-content">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${formatTime(msg.created_at)}</div>
                    </div>
                `;
            }).join('');
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !activeConversationUserId) return;

            // Disable send button while sending
            const sendBtn = document.querySelector('.send-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = '...';

            try {
                if (api.backendAvailable === true) {
                    await api.sendMessage(activeConversationUserId, content);
                } else {
                    // localStorage fallback
                    const allMsgs = JSON.parse(localStorage.getItem('trustmyrecord_messages') || '[]');
                    allMsgs.push({
                        id: 'msg_' + Date.now(),
                        senderId: currentUser.id || currentUser.username,
                        senderUsername: currentUser.username,
                        recipientId: activeConversationUserId,
                        content: content,
                        timestamp: new Date().toISOString(),
                        read: false
                    });
                    localStorage.setItem('trustmyrecord_messages', JSON.stringify(allMsgs));
                }
                input.value = '';
                input.style.height = 'auto';

                // Reload messages and conversations
                await loadChatMessages(activeConversationUserId, true);
                await loadConversations();
            } catch (e) {
                console.error('Failed to send message:', e);
                alert('Failed to send message. Please try again.');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }
        }

        async function startConversationWithUser(username) {
            // Check if conversation already exists in sidebar
            const existing = conversations.find(c => c.other_username === username);
            if (existing) {
                await selectConversation(existing.other_user_id, existing.other_username);
                return;
            }

            // Look up user by username to get their ID
            try {
                const data = await api.searchUsers(username);
                const users = data.users || [];
                const target = users.find(u => u.username.toLowerCase() === username.toLowerCase());
                if (!target) {
                    alert('User not found: ' + username);
                    return;
                }

                activeConversationUserId = target.id;
                activeConversationUsername = target.username;

                renderChatHeader(target.username);
                document.getElementById('chatHeader').style.display = 'flex';
                document.getElementById('chatInputArea').style.display = 'flex';

                // Load any existing messages (may be empty)
                await loadChatMessages(target.id, true);
            } catch (e) {
                console.error('Failed to find user:', e);
                alert('Could not find user: ' + username);
            }
        }

        function openNewMessageModal() {
            document.getElementById('newMessageModal').classList.add('active');
            document.getElementById('newMessageUsername').value = '';
            document.getElementById('userSearchResults').innerHTML = '';
            document.getElementById('newMessageUsername').focus();
        }

        function closeNewMessageModal() {
            document.getElementById('newMessageModal').classList.remove('active');
            document.getElementById('newMessageUsername').value = '';
            document.getElementById('userSearchResults').innerHTML = '';
        }

        let searchTimeout = null;
        async function onUserSearchInput() {
            const query = document.getElementById('newMessageUsername').value.trim();
            const resultsDiv = document.getElementById('userSearchResults');

            if (query.length < 2) {
                resultsDiv.innerHTML = '';
                return;
            }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                try {
                    const data = await api.searchUsers(query, { limit: 5 });
                    const users = (data.users || []).filter(u => u.id !== currentUser.id);
                    if (users.length === 0) {
                        resultsDiv.innerHTML = '<p style="color: var(--text-muted); padding: 8px;">No users found</p>';
                        return;
                    }
                    resultsDiv.innerHTML = users.map(u => `
                        <div class="search-result-item" onclick="selectUserFromSearch(${u.id}, '${escapeAttr(u.username)}')"
                             style="display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-radius: 8px; transition: background 0.2s;"
                             onmouseover="this.style.background='rgba(0,255,255,0.1)'" onmouseout="this.style.background='transparent'">
                            <div style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px;">${u.username.charAt(0).toUpperCase()}</div>
                            <span style="font-weight: 600;">${escapeHtml(u.username)}</span>
                        </div>
                    `).join('');
                } catch (e) {
                    console.error('User search failed:', e);
                    resultsDiv.innerHTML = '<p style="color: var(--text-muted); padding: 8px;">Search failed</p>';
                }
            }, 300);
        }

        async function selectUserFromSearch(userId, username) {
            closeNewMessageModal();
            activeConversationUserId = userId;
            activeConversationUsername = username;

            renderChatHeader(username);
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('chatInputArea').style.display = 'flex';

            await loadChatMessages(userId, true);
            await loadConversations();
        }

        async function startNewConversation() {
            const username = document.getElementById('newMessageUsername').value.trim();
            if (!username) return;

            if (username.toLowerCase() === (currentUser.username || '').toLowerCase()) {
                alert('You cannot message yourself!');
                return;
            }

            closeNewMessageModal();
            await startConversationWithUser(username);
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            if (!text) return '';
            return text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        // Initialize
        init();
    </script>
</body>
</html>
