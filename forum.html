<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum - TrustMyRecord</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link href="static/css/professional.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gold: #fbbf24;
            --dark-bg: #0f172a;
            --darker-bg: #0a0f1c;
            --card-bg: rgba(51, 65, 85, 0.9);
            --glass-border: rgba(148, 163, 184, 0.2);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--dark-bg);
            background-image: linear-gradient(180deg, var(--darker-bg) 0%, var(--dark-bg) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ========== NAV BAR ========== */
        .forum-nav {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        .forum-nav .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .forum-nav .logo span { color: var(--text-primary); }
        .forum-nav .nav-links { display: flex; gap: 20px; align-items: center; }
        .forum-nav .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .forum-nav .nav-links a:hover { color: var(--primary); }
        .forum-nav .nav-user {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
        }

        /* ========== CONTAINER ========== */
        .forum-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        /* ========== BREADCRUMB ========== */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb .sep { color: var(--text-muted); }

        /* ========== PAGE HEADER / BANNER ========== */
        .forum-banner {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.12) 0%, rgba(245, 158, 11, 0.08) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 28px 32px;
            margin-bottom: 24px;
        }
        .forum-banner h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .forum-banner h1 span { color: var(--primary); }
        .forum-banner p { color: var(--text-muted); font-size: 0.95rem; }

        /* ========== STATS BAR ========== */
        .stats-bar {
            display: flex;
            gap: 28px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .stats-bar strong { color: var(--primary); }

        /* ========== SEARCH BAR ========== */
        .search-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .search-row input {
            flex: 1;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-row input:focus { border-color: var(--primary); }
        .search-row input::placeholder { color: var(--text-muted); }

        /* ========== GROUP HEADER ========== */
        .group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.15), rgba(14, 165, 233, 0.03));
            border: 1px solid var(--glass-border);
            border-radius: 8px 8px 0 0;
            margin-top: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
        }

        /* ========== CATEGORY TABLE ========== */
        .cat-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 4px;
        }
        .cat-table thead th {
            text-align: left;
            padding: 10px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: rgba(30, 41, 59, 0.5);
            border-bottom: 1px solid var(--glass-border);
        }
        .cat-table thead th.col-num { text-align: center; width: 80px; }
        .cat-table thead th.col-last { width: 200px; }

        .cat-table tbody tr {
            border-bottom: 1px solid rgba(148, 163, 184, 0.08);
            cursor: pointer;
            transition: background 0.15s;
        }
        .cat-table tbody tr:hover { background: rgba(14, 165, 233, 0.06); }

        .cat-table td { padding: 14px 16px; vertical-align: middle; }
        .cat-table td.col-num { text-align: center; color: var(--text-muted); font-size: 0.9rem; }

        .cat-info { display: flex; align-items: center; gap: 14px; }
        .cat-icon {
            font-size: 1.6rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(14, 165, 233, 0.1);
            border-radius: 10px;
            flex-shrink: 0;
        }
        .cat-name { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); }
        .cat-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .last-post-info { font-size: 0.8rem; }
        .last-post-title { color: var(--text-secondary); margin-bottom: 2px; }
        .last-post-meta { color: var(--text-muted); font-size: 0.75rem; }
        .no-posts { color: var(--text-muted); font-style: italic; font-size: 0.8rem; }

        /* ========== TOOLBAR ========== */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .toolbar select {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 8px 12px;
            font-size: 0.85rem;
            outline: none;
        }

        /* ========== BUTTONS ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
        }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

        /* ========== THREAD TABLE ========== */
        .thread-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            overflow: hidden;
        }
        .thread-table thead th {
            text-align: left;
            padding: 12px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: rgba(30, 41, 59, 0.6);
            border-bottom: 1px solid var(--glass-border);
        }
        .thread-table thead th.col-num { text-align: center; width: 70px; }
        .thread-table thead th.col-last { width: 180px; }

        .thread-table tbody tr {
            border-bottom: 1px solid rgba(148, 163, 184, 0.06);
            cursor: pointer;
            transition: background 0.15s;
        }
        .thread-table tbody tr:hover { background: rgba(14, 165, 233, 0.06); }
        .thread-table tbody tr.pinned { background: rgba(245, 158, 11, 0.05); }

        .thread-table td { padding: 12px 16px; vertical-align: middle; }
        .thread-table td.col-num { text-align: center; color: var(--text-muted); font-size: 0.85rem; }

        .thread-title-link { font-weight: 600; font-size: 0.93rem; color: var(--text-primary); }
        .thread-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
        .pin-badge {
            display: inline-block;
            font-size: 0.7rem;
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            padding: 2px 7px;
            border-radius: 4px;
            margin-right: 6px;
            font-weight: 600;
        }
        .tag-pill {
            display: inline-block;
            font-size: 0.68rem;
            padding: 1px 7px;
            border-radius: 10px;
            margin-right: 4px;
            background: rgba(14, 165, 233, 0.1);
            color: var(--primary);
            border: 1px solid rgba(14, 165, 233, 0.2);
        }

        /* ========== THREAD DETAIL (posts) ========== */
        .post-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .post-card.op-card { border-color: rgba(14, 165, 233, 0.3); }

        .post-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(30, 41, 59, 0.5);
            border-bottom: 1px solid rgba(148, 163, 184, 0.08);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .post-author-name { font-weight: 600; color: var(--primary); }
        .post-number { color: var(--text-muted); font-size: 0.78rem; }

        .post-body {
            padding: 16px 20px;
            line-height: 1.7;
            font-size: 0.93rem;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .post-body h2 {
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .post-footer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            border-top: 1px solid rgba(148, 163, 184, 0.06);
        }
        .vote-btns { display: flex; gap: 8px; }
        .vote-btn {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.78rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .vote-btn:hover { border-color: var(--primary); color: var(--primary); }
        .vote-btn.voted-up { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .vote-btn.voted-down { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        /* ========== QUICK REPLY ========== */
        .reply-box {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 20px;
            margin-top: 16px;
        }
        .reply-box h3 {
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .reply-box textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            outline: none;
            transition: border-color 0.2s;
        }
        .reply-box textarea:focus { border-color: var(--primary); }
        .reply-box textarea::placeholder { color: var(--text-muted); }
        .reply-box .btn { margin-top: 10px; }

        /* ========== MODAL ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 28px 32px;
            width: 90%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box h2 {
            font-size: 1.15rem;
            margin-bottom: 18px;
            color: var(--text-primary);
        }
        .modal-box .close-btn {
            float: right;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-box .close-btn:hover { color: var(--danger); }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
        }
        .form-group input:focus,
        .form-group textarea:focus { border-color: var(--primary); }
        .form-group input::placeholder,
        .form-group textarea::placeholder { color: var(--text-muted); }

        /* ========== LOGIN PROMPT ========== */
        .login-prompt {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .login-prompt a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .login-prompt a:hover { text-decoration: underline; }

        /* ========== EMPTY STATE ========== */
        .empty-msg {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .empty-msg .icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.5; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .cat-table thead th.col-num,
            .cat-table td.col-num,
            .cat-table thead th.col-last,
            .cat-table td.col-last,
            .thread-table thead th.col-num,
            .thread-table td.col-num,
            .thread-table thead th.col-last,
            .thread-table td.col-last { display: none; }

            .forum-banner { padding: 20px; }
            .forum-banner h1 { font-size: 1.3rem; }
            .stats-bar { flex-wrap: wrap; gap: 14px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .post-top-bar { flex-wrap: wrap; gap: 4px; }
        }
    </style>
</head>
<body>

<!-- NAV BAR -->
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">TRUST<span>MY</span>RECORD</a>
            <nav class="nav-links">

                <a href="messages.html" class="nav-link nav-icon">

<!-- MAIN WRAP -->
<div class="forum-wrap">

    <!-- BREADCRUMB -->

    <!-- ================= CATEGORIES VIEW ================= -->

    <!-- ================= THREAD DETAIL VIEW ================= -->

</div><!-- /forum-wrap -->

<!-- NEW THREAD MODAL -->
<div class="modal-overlay" id="newThreadModal">
    <div class="modal-box">
        <button class="close-btn" onclick="closeNewThread()">&times;</button>
        <h2>Create New Thread</h2>
        <form id="newThreadForm" onsubmit="submitThread(event)">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="ntTitle" placeholder="Thread title..." required minlength="5">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="ntContent" rows="8" placeholder="Write your post..." required minlength="10"></textarea>
            </div>
            <div class="form-group">
                <label>Tags (comma-separated, optional)</label>
                <input type="text" id="ntTags" placeholder="e.g. nfl, strategy, picks">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;">Post Thread</button>
        </form>
    </div>
</div>

<script>
// ================================================================
// AUTH HELPERS (localStorage only, no API calls)
// ================================================================
function isLoggedIn() {
    if (localStorage.getItem('tmr_is_logged_in') === 'true') return true;
    if (localStorage.getItem('trustmyrecord_session') !== null) return true;
    return false;
}

function getCurrentUsername() {
    try {
        var u = JSON.parse(localStorage.getItem('tmr_current_user') || 'null');
        if (u && u.username) return u.username;
    } catch(e) {}
    try {
        var sess = JSON.parse(localStorage.getItem('trustmyrecord_session') || 'null');
        if (sess && sess.userId) {
            var users = JSON.parse(localStorage.getItem('trustmyrecord_users') || '[]');
            var user = users.find(function(u) { return u.id === sess.userId; });
            if (user) return user.username;
        }
    } catch(e) {}
    return null;
}

function getCurrentUserId() {
    try {
        var u = JSON.parse(localStorage.getItem('tmr_current_user') || 'null');
        if (u && u.id) return u.id;
    } catch(e) {}
    try {
        var sess = JSON.parse(localStorage.getItem('trustmyrecord_session') || 'null');
        if (sess && sess.userId) return sess.userId;
    } catch(e) {}
    return null;
}

// ================================================================
// CATEGORIES (static, matching ForumsSystem)
// ================================================================
var CATEGORIES = [
    { id: 'nfl',      name: 'NFL',     description: 'National Football League discussion',    icon: '🏈', group: 'sports' },
    { id: 'nhl',      name: 'NHL',     description: 'National Hockey League discussion',      icon: '🏒', group: 'sports' },
    { id: 'nba',      name: 'NBA',     description: 'National Basketball Association discussion', icon: '🏀', group: 'sports' },
    { id: 'mlb',      name: 'MLB',     description: 'Major League Baseball discussion',       icon: '⚾', group: 'sports' },
    { id: 'soccer',   name: 'Soccer',  description: 'Soccer and football worldwide',          icon: '⚽', group: 'sports' },
    { id: 'tennis',   name: 'Tennis',  description: 'ATP, WTA, and Grand Slam discussion',    icon: '🎾', group: 'sports' },
    { id: 'travel',   name: 'Travel',  description: 'Travel tips, destinations, and stories', icon: '✈️', group: 'other' },
    { id: 'food',     name: 'Food',    description: 'Restaurants, recipes, and food culture', icon: '🍔', group: 'other' },
    { id: 'history',  name: 'History', description: 'Historical events and discussion',       icon: '📜', group: 'other' },
    { id: 'worldnews', name: 'World News', description: 'Current events and global news',     icon: '🌍', group: 'other' }
];

var GROUPS = [
    { id: 'sports', name: 'SPORTS', icon: '🏆' },
    { id: 'other',  name: 'OTHER TOPICS', icon: '💬' }
];

// ================================================================
// DATA LAYER (localStorage)
// ================================================================
var KEY_THREADS = 'trustmyrecord_threads';
var KEY_REPLIES = 'trustmyrecord_replies';
var KEY_VOTES   = 'trustmyrecord_forum_votes';

function loadThreads() {
    var raw = localStorage.getItem(KEY_THREADS);
    if (raw) { try { return JSON.parse(raw); } catch(e) {} }
    return [];
}

function saveThreads(threads) {
    localStorage.setItem(KEY_THREADS, JSON.stringify(threads));
}

function loadReplies() {
    var raw = localStorage.getItem(KEY_REPLIES);
    if (raw) { try { return JSON.parse(raw); } catch(e) {} }
    return [];
}

function saveReplies(replies) {
    localStorage.setItem(KEY_REPLIES, JSON.stringify(replies));
}

function loadVotes() {
    var raw = localStorage.getItem(KEY_VOTES);
    if (raw) { try { return JSON.parse(raw); } catch(e) {} }
    return {};
}

function saveVotes(votes) {
    localStorage.setItem(KEY_VOTES, JSON.stringify(votes));
}

// No sample data - forum starts empty until real users post

// ================================================================
// STATE
// ================================================================
var threads = loadThreads();
var replies = loadReplies();
var votes   = loadVotes();

var currentCategory = null;
var currentThread   = null;

// ================================================================
// UTILITY
// ================================================================
function genId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
}

function timeAgo(iso) {
    if (!iso) return '';
    var diff = Date.now() - new Date(iso).getTime();
    var s = Math.floor(diff / 1000);
    if (s < 60) return 'just now';
    var m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    var d = Math.floor(h / 24);
    if (d < 30) return d + 'd ago';
    return new Date(iso).toLocaleDateString();
}

function escHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ================================================================
// NAVIGATION
// ================================================================
function showCategories() {
    currentCategory = null;
    currentThread = null;
    document.getElementById('viewCategories').style.display = '';
    document.getElementById('viewThreads').style.display = 'none';
    document.getElementById('viewThread').style.display = 'none';
    updateBreadcrumb();
    renderCategories();
}

function showThreadsList(catId) {
    currentCategory = catId;
    currentThread = null;
    document.getElementById('viewCategories').style.display = 'none';
    document.getElementById('viewThreads').style.display = '';
    document.getElementById('viewThread').style.display = 'none';
    updateBreadcrumb();
    renderThreads();
}

function showThreadDetail(threadId) {
    currentThread = threadId;
    // Increment views
    var t = threads.find(function(x) { return x.id === threadId; });
    if (t) { t.views++; saveThreads(threads); }

    document.getElementById('viewCategories').style.display = 'none';
    document.getElementById('viewThreads').style.display = 'none';
    document.getElementById('viewThread').style.display = '';
    updateBreadcrumb();
    renderThread();
}

function goBackToThreads() {
    if (currentCategory) {
        showThreadsList(currentCategory);
    } else {
        showCategories();
    }
}

function scrollToReply() {
    var el = document.getElementById('replyBox');
    if (el) el.scrollIntoView({ behavior: 'smooth' });
}

function updateBreadcrumb() {
    var bc = document.getElementById('breadcrumb');
    var html = '<a onclick="showCategories()">Forums</a>';

    if (currentCategory) {
        var cat = CATEGORIES.find(function(c) { return c.id === currentCategory; });
        html += '<span class="sep">&raquo;</span>';
        if (currentThread) {
            html += '<a onclick="showThreadsList(\'' + currentCategory + '\')">' + escHtml(cat ? cat.name : currentCategory) + '</a>';
        } else {
            html += '<span>' + escHtml(cat ? cat.name : currentCategory) + '</span>';
        }
    }

    if (currentThread) {
        var th = threads.find(function(x) { return x.id === currentThread; });
        html += '<span class="sep">&raquo;</span>';
        html += '<span>' + escHtml(th ? (th.title.length > 40 ? th.title.substring(0, 40) + '...' : th.title) : '') + '</span>';
    }

    bc.innerHTML = html;
}

// ================================================================
// RENDER CATEGORIES
// ================================================================
function renderCategories() {
    var container = document.getElementById('categoriesContainer');
    var totalThreads = 0;
    var totalPosts = 0;
    var html = '';

    GROUPS.forEach(function(group) {
        var groupCats = CATEGORIES.filter(function(c) { return c.group === group.id; });
        if (groupCats.length === 0) return;

        html += '<div class="group-header"><span>' + group.icon + '</span> ' + group.name + '</div>';
        html += '<table class="cat-table"><thead><tr><th>Forum</th><th class="col-num">Threads</th><th class="col-num">Posts</th><th class="col-last">Last Post</th></tr></thead><tbody>';

        groupCats.forEach(function(cat) {
            var catThreads = threads.filter(function(t) { return t.categoryId === cat.id; });
            var catReplies = 0;
            catThreads.forEach(function(t) { catReplies += (t.replyCount || 0); });
            totalThreads += catThreads.length;
            totalPosts += catReplies + catThreads.length;

            // Find last active thread
            var sorted = catThreads.slice().sort(function(a, b) { return new Date(b.lastActivityTime || b.createdAt) - new Date(a.lastActivityTime || a.createdAt); });
            var last = sorted[0];

            var lastHtml = '<span class="no-posts">No posts yet</span>';
            if (last) {
                var title = last.title.length > 30 ? last.title.substring(0, 30) + '...' : last.title;
                lastHtml = '<div class="last-post-info"><div class="last-post-title">' + escHtml(title) + '</div><div class="last-post-meta">by <strong>' + escHtml(last.author) + '</strong> ' + timeAgo(last.lastActivityTime || last.createdAt) + '</div></div>';
            }

            html += '<tr onclick="showThreadsList(\'' + cat.id + '\')">';
            html += '<td><div class="cat-info"><div class="cat-icon">' + cat.icon + '</div><div><div class="cat-name">' + escHtml(cat.name) + '</div><div class="cat-desc">' + escHtml(cat.description) + '</div></div></div></td>';
            html += '<td class="col-num">' + catThreads.length + '</td>';
            html += '<td class="col-num">' + catReplies + '</td>';
            html += '<td class="col-last">' + lastHtml + '</td>';
            html += '</tr>';
        });

        html += '</tbody></table>';
    });

    container.innerHTML = html;

    // Stats
    document.getElementById('statThreads').textContent = totalThreads;
    document.getElementById('statPosts').textContent = totalPosts;
}

// ================================================================
// RENDER THREADS LIST
// ================================================================
function renderThreads() {
    var sortBy = document.getElementById('sortSelect').value;
    var catThreads = threads.filter(function(t) { return t.categoryId === currentCategory; });

    // Sort
    switch (sortBy) {
        case 'activity':
            catThreads.sort(function(a, b) { return new Date(b.lastActivityTime || b.createdAt) - new Date(a.lastActivityTime || a.createdAt); });
            break;
        case 'newest':
            catThreads.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
            break;
        case 'popular':
            catThreads.sort(function(a, b) { return ((b.upvotes||0) - (b.downvotes||0)) - ((a.upvotes||0) - (a.downvotes||0)); });
            break;
        case 'replies':
            catThreads.sort(function(a, b) { return (b.replyCount||0) - (a.replyCount||0); });
            break;
    }

    // Pinned first
    catThreads.sort(function(a, b) {
        if (a.isPinned && !b.isPinned) return -1;
        if (!a.isPinned && b.isPinned) return 1;
        return 0;
    });

    var body = document.getElementById('threadsBody');
    if (catThreads.length === 0) {
        body.innerHTML = '<tr><td colspan="4" class="empty-msg"><div class="icon">💬</div><div>No threads yet. Be the first to start a discussion!</div></td></tr>';
        return;
    }

    body.innerHTML = catThreads.map(function(t) {
        // Find last reply for this thread
        var tReplies = replies.filter(function(r) { return r.threadId === t.id; });
        var lastReply = tReplies.length > 0 ? tReplies.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); })[0] : null;
        var lastUser = lastReply ? lastReply.author : t.author;
        var lastTime = lastReply ? lastReply.createdAt : t.createdAt;

        var pinHtml = t.isPinned ? '<span class="pin-badge">PINNED</span>' : '';
        var tagsHtml = (t.tags || []).map(function(tag) { return '<span class="tag-pill">' + escHtml(tag) + '</span>'; }).join('');

        return '<tr class="' + (t.isPinned ? 'pinned' : '') + '" onclick="showThreadDetail(\'' + t.id + '\')">' +
            '<td><div>' + pinHtml + '<span class="thread-title-link">' + escHtml(t.title) + '</span></div>' + tagsHtml + '<div class="thread-meta">by <strong>' + escHtml(t.author) + '</strong> ' + timeAgo(t.createdAt) + '</div></td>' +
            '<td class="col-num">' + (t.replyCount || 0) + '</td>' +
            '<td class="col-num">' + (t.views || 0) + '</td>' +
            '<td class="col-last"><div class="last-post-info"><div class="last-post-meta">by <strong>' + escHtml(lastUser) + '</strong><br>' + timeAgo(lastTime) + '</div></div></td>' +
            '</tr>';
    }).join('');
}

// ================================================================
// RENDER THREAD DETAIL
// ================================================================
function renderThread() {
    var t = threads.find(function(x) { return x.id === currentThread; });
    if (!t) return;

    var tReplies = replies.filter(function(r) { return r.threadId === currentThread && !r.parentId; });
    tReplies.sort(function(a, b) { return new Date(a.createdAt) - new Date(b.createdAt); });

    var allPosts = [{ id: t.id, author: t.author, content: t.content, createdAt: t.createdAt, upvotes: t.upvotes || 0, downvotes: t.downvotes || 0, isOP: true, title: t.title }];
    tReplies.forEach(function(r) { allPosts.push(r); });

    var userId = getCurrentUserId();
    var container = document.getElementById('postsContainer');
    container.innerHTML = allPosts.map(function(post, idx) {
        var itemType = post.isOP ? 'thread' : 'reply';
        var voteKey = userId ? (userId + '_' + itemType + '_' + post.id) : null;
        var userVote = voteKey ? (votes[voteKey] || null) : null;

        var upClass = userVote === 'up' ? ' voted-up' : '';
        var downClass = userVote === 'down' ? ' voted-down' : '';

        var bodyHtml = post.isOP ? '<h2>' + escHtml(post.title) + '</h2>' + escHtml(post.content) : escHtml(post.content);

        // Nested replies
        var nested = replies.filter(function(r) { return r.parentId === post.id; });
        nested.sort(function(a, b) { return new Date(a.createdAt) - new Date(b.createdAt); });
        var nestedHtml = nested.map(function(nr) {
            return '<div class="post-card" style="margin-left:24px;margin-top:8px;border-left:3px solid rgba(14,165,233,0.3);">' +
                '<div class="post-top-bar"><span><span class="post-author-name">' + escHtml(nr.author) + '</span></span><span>' + timeAgo(nr.createdAt) + '</span></div>' +
                '<div class="post-body">' + escHtml(nr.content) + '</div></div>';
        }).join('');

        return '<div class="post-card' + (post.isOP ? ' op-card' : '') + '">' +
            '<div class="post-top-bar"><span><span class="post-author-name">' + escHtml(post.author) + '</span></span><span class="post-number">#' + (idx + 1) + ' &middot; ' + new Date(post.createdAt).toLocaleString() + '</span></div>' +
            '<div class="post-body">' + bodyHtml + '</div>' +
            '<div class="post-footer-bar"><div class="vote-btns">' +
            '<button class="vote-btn' + upClass + '" onclick="doVote(\'' + itemType + '\',\'' + post.id + '\',\'up\')">&#x1F44D; ' + (post.upvotes || 0) + '</button>' +
            '<button class="vote-btn' + downClass + '" onclick="doVote(\'' + itemType + '\',\'' + post.id + '\',\'down\')">&#x1F44E; ' + (post.downvotes || 0) + '</button>' +
            '</div><div></div></div>' +
            '</div>' + nestedHtml;
    }).join('');

    // Render reply area
    var replyAreaEl = document.getElementById('replyArea');
    if (isLoggedIn()) {
        replyAreaEl.innerHTML = '<textarea id="replyText" rows="5" placeholder="Type your reply..."></textarea>' +
            '<button class="btn btn-primary" style="margin-top:10px;" onclick="submitReply()">Post Reply</button>';
    } else {
        replyAreaEl.innerHTML = '<div class="login-prompt">You must <a href="index.html">log in</a> to reply.</div>';
    }
}

// ================================================================
// VOTING
// ================================================================
function doVote(itemType, itemId, voteType) {
    if (!isLoggedIn()) {
        alert('Please log in to vote.');
        return;
    }
    var userId = getCurrentUserId();
    if (!userId) return;

    var voteKey = userId + '_' + itemType + '_' + itemId;
    var existing = votes[voteKey] || null;

    // Find the item
    var item;
    if (itemType === 'thread') {
        item = threads.find(function(t) { return t.id === itemId; });
    } else {
        item = replies.find(function(r) { return r.id === itemId; });
    }
    if (!item) return;

    if (existing === voteType) {
        // Remove vote
        delete votes[voteKey];
        if (voteType === 'up') item.upvotes = (item.upvotes || 1) - 1;
        else item.downvotes = (item.downvotes || 1) - 1;
    } else if (existing) {
        // Switch vote
        votes[voteKey] = voteType;
        if (existing === 'up') { item.upvotes = (item.upvotes || 1) - 1; item.downvotes = (item.downvotes || 0) + 1; }
        else { item.downvotes = (item.downvotes || 1) - 1; item.upvotes = (item.upvotes || 0) + 1; }
    } else {
        // New vote
        votes[voteKey] = voteType;
        if (voteType === 'up') item.upvotes = (item.upvotes || 0) + 1;
        else item.downvotes = (item.downvotes || 0) + 1;
    }

    saveVotes(votes);
    if (itemType === 'thread') saveThreads(threads);
    else saveReplies(replies);

    renderThread();
}

// ================================================================
// CREATE THREAD
// ================================================================
function openNewThread() {
    if (!isLoggedIn()) {
        alert('Please log in to create a thread.');
        return;
    }
    document.getElementById('newThreadModal').classList.add('active');
}

function closeNewThread() {
    document.getElementById('newThreadModal').classList.remove('active');
    document.getElementById('newThreadForm').reset();
}

function submitThread(e) {
    e.preventDefault();
    if (!isLoggedIn()) { alert('Please log in first.'); return; }

    var title = document.getElementById('ntTitle').value.trim();
    var content = document.getElementById('ntContent').value.trim();
    var tagsRaw = document.getElementById('ntTags').value.trim();
    var tags = tagsRaw ? tagsRaw.split(',').map(function(t) { return t.trim(); }).filter(Boolean) : [];

    if (title.length < 5) { alert('Title must be at least 5 characters.'); return; }
    if (content.length < 10) { alert('Content must be at least 10 characters.'); return; }

    var now = new Date().toISOString();
    var thread = {
        id: genId(),
        categoryId: currentCategory,
        title: title,
        content: content,
        author: getCurrentUsername() || 'Anonymous',
        createdAt: now,
        views: 0,
        tags: tags,
        replyCount: 0,
        lastActivityTime: now,
        isPinned: false,
        upvotes: 0,
        downvotes: 0
    };

    threads.push(thread);
    saveThreads(threads);
    closeNewThread();
    renderThreads();
}

// ================================================================
// SUBMIT REPLY
// ================================================================
function submitReply() {
    if (!isLoggedIn()) { alert('Please log in to reply.'); return; }

    var textarea = document.getElementById('replyText');
    if (!textarea) return;
    var content = textarea.value.trim();
    if (content.length < 5) { alert('Reply must be at least 5 characters.'); return; }

    var now = new Date().toISOString();
    var reply = {
        id: genId(),
        threadId: currentThread,
        content: content,
        author: getCurrentUsername() || 'Anonymous',
        createdAt: now,
        parentId: null,
        upvotes: 0,
        downvotes: 0
    };

    replies.push(reply);
    saveReplies(replies);

    // Update thread reply count and activity time
    var t = threads.find(function(x) { return x.id === currentThread; });
    if (t) {
        t.replyCount = (t.replyCount || 0) + 1;
        t.lastActivityTime = now;
        saveThreads(threads);
    }

    renderThread();
    // Scroll to the new reply
    var posts = document.getElementById('postsContainer');
    if (posts && posts.lastElementChild) {
        posts.lastElementChild.scrollIntoView({ behavior: 'smooth' });
    }
}

// ================================================================
// SEARCH
// ================================================================
function handleSearch(query) {
    if (!query || query.length < 2) {
        // If clearing search and we're in threads view with no category, go back
        return;
    }
    var q = query.toLowerCase();
    var results = threads.filter(function(t) {
        return t.title.toLowerCase().indexOf(q) !== -1 ||
               t.content.toLowerCase().indexOf(q) !== -1 ||
               (t.tags || []).some(function(tag) { return tag.toLowerCase().indexOf(q) !== -1; });
    });

    // Show results in threads view
    currentCategory = null;
    document.getElementById('viewCategories').style.display = 'none';
    document.getElementById('viewThreads').style.display = '';
    document.getElementById('viewThread').style.display = 'none';

    var bc = document.getElementById('breadcrumb');
    bc.innerHTML = '<a onclick="showCategories()">Forums</a><span class="sep">&raquo;</span><span>Search: "' + escHtml(query) + '"</span>';

    var body = document.getElementById('threadsBody');
    if (results.length === 0) {
        body.innerHTML = '<tr><td colspan="4" class="empty-msg"><div>No threads match your search.</div></td></tr>';
        return;
    }

    body.innerHTML = results.map(function(t) {
        var cat = CATEGORIES.find(function(c) { return c.id === t.categoryId; });
        var catName = cat ? cat.name : '';
        return '<tr onclick="currentCategory=\'' + t.categoryId + '\';showThreadDetail(\'' + t.id + '\')">' +
            '<td><span class="tag-pill">' + escHtml(catName) + '</span><div class="thread-title-link">' + escHtml(t.title) + '</div><div class="thread-meta">by <strong>' + escHtml(t.author) + '</strong> ' + timeAgo(t.createdAt) + '</div></td>' +
            '<td class="col-num">' + (t.replyCount || 0) + '</td>' +
            '<td class="col-num">' + (t.views || 0) + '</td>' +
            '<td class="col-last"><div class="last-post-meta">' + timeAgo(t.lastActivityTime || t.createdAt) + '</div></td>' +
            '</tr>';
    }).join('');
}

// ================================================================
// INIT
// ================================================================
(function init() {
    // Show username in nav if logged in
    var navUser = document.getElementById('navUser');
    if (isLoggedIn()) {
        var name = getCurrentUsername();
        if (name && navUser) navUser.textContent = name;
    }

    // Close modal on outside click
    document.getElementById('newThreadModal').addEventListener('click', function(e) {
        if (e.target === this) closeNewThread();
    });

    // Check URL hash for deep link
    var hash = window.location.hash;
    if (hash && hash.indexOf('#thread-') === 0) {
        var tid = hash.substring(8);
        var t = threads.find(function(x) { return x.id === tid; });
        if (t) {
            currentCategory = t.categoryId;
            showThreadDetail(tid);
            return;
        }
    }
    if (hash && hash.indexOf('#cat-') === 0) {
        var cid = hash.substring(5);
        var c = CATEGORIES.find(function(x) { return x.id === cid; });
        if (c) {
            showThreadsList(cid);
            return;
        }
    }

    // Default: show categories
    showCategories();
})();
</script>
