<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum - TrustMyRecord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #ff00ff;
            --neon-green: #39ff14;
            --neon-gold: #ffd700;
            --neon-red: #ff073a;
            --neon-orange: #ff6b35;
            --primary: #00ffff;
            --primary-dark: #00cccc;
            --success: #39ff14;
            --danger: #ff073a;
            --warning: #ffd700;
            --gold: #ffd700;
            --dark-bg: #0a0a0f;
            --darker-bg: #050508;
            --card-bg: rgba(20, 20, 35, 0.8);
            --glass-border: rgba(0, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #b0b0c0;
            --text-muted: #808090;
            --gradient-neon: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            --gradient-gold: linear-gradient(45deg, var(--neon-gold), var(--neon-cyan));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--dark-bg);
            background-image:
                radial-gradient(circle at 25% 75%, rgba(0, 255, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 75% 25%, rgba(255, 215, 0, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, var(--darker-bg) 0%, var(--dark-bg) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 20s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* ========== HEADER / NAV BAR ========== */
        header {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--neon-gold);
            text-decoration: none;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            cursor: pointer;
            transition: all 0.3s;
        }

        .logo:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            transform: scale(1.02);
        }

        .logo span {
            color: var(--neon-cyan);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .nav-link:hover {
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.1);
        }

        .nav-link.active {
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
        }

        /* ========== CONTAINER ========== */
        .forum-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        /* ========== BREADCRUMB ========== */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb .sep { color: var(--text-muted); }

        /* ========== PAGE HEADER / BANNER ========== */
        .forum-banner {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.12) 0%, rgba(255, 215, 0, 0.08) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 28px 32px;
            margin-bottom: 24px;
        }
        .forum-banner h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .forum-banner h1 span { color: var(--primary); }
        .forum-banner p { color: var(--text-muted); font-size: 0.95rem; }

        /* ========== STATS BAR ========== */
        .stats-bar {
            display: flex;
            gap: 28px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: rgba(20, 20, 35, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .stats-bar strong { color: var(--primary); }

        /* ========== SEARCH BAR ========== */
        .search-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .search-row input {
            flex: 1;
            background: rgba(20, 20, 35, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-row input:focus { border-color: var(--primary); }
        .search-row input::placeholder { color: var(--text-muted); }

        /* ========== GROUP HEADER ========== */
        .group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.15), rgba(0, 255, 255, 0.03));
            border: 1px solid var(--glass-border);
            border-radius: 8px 8px 0 0;
            margin-top: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
        }

        /* ========== CATEGORY TABLE ========== */
        .cat-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 4px;
        }
        .cat-table thead th {
            text-align: left;
            padding: 10px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: rgba(20, 20, 35, 0.5);
            border-bottom: 1px solid var(--glass-border);
        }
        .cat-table thead th.col-num { text-align: center; width: 80px; }
        .cat-table thead th.col-last { width: 200px; }

        .cat-table tbody tr {
            border-bottom: 1px solid rgba(0, 255, 255, 0.08);
            cursor: pointer;
            transition: background 0.15s;
        }
        .cat-table tbody tr:hover { background: rgba(0, 255, 255, 0.06); }

        .cat-table td { padding: 14px 16px; vertical-align: middle; }
        .cat-table td.col-num { text-align: center; color: var(--text-muted); font-size: 0.9rem; }

        .cat-info { display: flex; align-items: center; gap: 14px; }
        .cat-icon {
            font-size: 1.6rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 10px;
            flex-shrink: 0;
        }
        .cat-name { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); }
        .cat-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .last-post-info { font-size: 0.8rem; }
        .last-post-title { color: var(--text-secondary); margin-bottom: 2px; }
        .last-post-meta { color: var(--text-muted); font-size: 0.75rem; }
        .no-posts { color: var(--text-muted); font-style: italic; font-size: 0.8rem; }

        /* ========== TOOLBAR ========== */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .toolbar select {
            background: rgba(20, 20, 35, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 8px 12px;
            font-size: 0.85rem;
            outline: none;
        }

        /* ========== BUTTONS ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
        }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

        /* ========== THREAD TABLE ========== */
        .thread-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(20, 20, 35, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            overflow: hidden;
        }
        .thread-table thead th {
            text-align: left;
            padding: 12px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: rgba(20, 20, 35, 0.6);
            border-bottom: 1px solid var(--glass-border);
        }
        .thread-table thead th.col-num { text-align: center; width: 70px; }
        .thread-table thead th.col-last { width: 180px; }

        .thread-table tbody tr {
            border-bottom: 1px solid rgba(0, 255, 255, 0.06);
            cursor: pointer;
            transition: background 0.15s;
        }
        .thread-table tbody tr:hover { background: rgba(0, 255, 255, 0.06); }
        .thread-table tbody tr.pinned { background: rgba(255, 215, 0, 0.05); }

        .thread-table td { padding: 12px 16px; vertical-align: middle; }
        .thread-table td.col-num { text-align: center; color: var(--text-muted); font-size: 0.85rem; }

        .thread-title-link { font-weight: 600; font-size: 0.93rem; color: var(--text-primary); }
        .thread-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
        .pin-badge {
            display: inline-block;
            font-size: 0.7rem;
            background: rgba(255, 215, 0, 0.15);
            color: var(--warning);
            padding: 2px 7px;
            border-radius: 4px;
            margin-right: 6px;
            font-weight: 600;
        }
        .tag-pill {
            display: inline-block;
            font-size: 0.68rem;
            padding: 1px 7px;
            border-radius: 10px;
            margin-right: 4px;
            background: rgba(0, 255, 255, 0.1);
            color: var(--primary);
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        /* ========== THREAD DETAIL (posts) ========== */
        .post-card {
            background: rgba(20, 20, 35, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .post-card.op-card { border-color: rgba(0, 255, 255, 0.3); }

        .post-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(20, 20, 35, 0.5);
            border-bottom: 1px solid rgba(0, 255, 255, 0.08);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .post-author-name { font-weight: 600; color: var(--primary); }
        .post-number { color: var(--text-muted); font-size: 0.78rem; }

        .post-body {
            padding: 16px 20px;
            line-height: 1.7;
            font-size: 0.93rem;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .post-body h2 {
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .post-footer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            border-top: 1px solid rgba(0, 255, 255, 0.06);
        }
        .vote-btns { display: flex; gap: 8px; }
        .vote-btn {
            background: rgba(20, 20, 35, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.78rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .vote-btn:hover { border-color: var(--primary); color: var(--primary); }
        .vote-btn.voted-up { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .vote-btn.voted-down { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        /* ========== QUICK REPLY ========== */
        .reply-box {
            background: rgba(20, 20, 35, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 20px;
            margin-top: 16px;
        }
        .reply-box h3 {
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .reply-box textarea {
            width: 100%;
            background: rgba(10, 10, 15, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            outline: none;
            transition: border-color 0.2s;
        }
        .reply-box textarea:focus { border-color: var(--primary); }
        .reply-box textarea::placeholder { color: var(--text-muted); }
        .reply-box .btn { margin-top: 10px; }

        /* ========== MODAL ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: rgba(20, 20, 35, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 28px 32px;
            width: 90%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box h2 {
            font-size: 1.15rem;
            margin-bottom: 18px;
            color: var(--text-primary);
        }
        .modal-box .close-btn {
            float: right;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-box .close-btn:hover { color: var(--danger); }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            background: rgba(10, 10, 15, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
        }
        .form-group input:focus,
        .form-group textarea:focus { border-color: var(--primary); }
        .form-group input::placeholder,
        .form-group textarea::placeholder { color: var(--text-muted); }

        /* ========== LOGIN PROMPT ========== */
        .login-prompt {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .login-prompt a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .login-prompt a:hover { text-decoration: underline; }

        /* ========== EMPTY STATE ========== */
        .empty-msg {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .empty-msg .icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.5; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .cat-table thead th.col-num,
            .cat-table td.col-num,
            .cat-table thead th.col-last,
            .cat-table td.col-last,
            .thread-table thead th.col-num,
            .thread-table td.col-num,
            .thread-table thead th.col-last,
            .thread-table td.col-last { display: none; }

            .forum-banner { padding: 20px; }
            .forum-banner h1 { font-size: 1.3rem; }
            .stats-bar { flex-wrap: wrap; gap: 14px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .post-top-bar { flex-wrap: wrap; gap: 4px; }
        }
    </style>
</head>

<!-- NAV BAR -->
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">TRUST<span>MY</span>RECORD</a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="challenges.html" class="nav-link">Arena</a>
                <a href="forum.html" class="nav-link active">Forum</a>
                <a href="activity.html" class="nav-link">Activity</a>
                <a href="profile.html" class="nav-link">My Profile</a>
            </nav>
        </div>
    </header>

<!-- MAIN WRAP -->
<div class="forum-wrap">

    <!-- BREADCRUMB -->
    <div class="breadcrumb" id="breadcrumb">
        <a onclick="showCategories()">Forums</a>
    </div>

    <!-- ================= CATEGORIES VIEW ================= -->
    <div id="viewCategories">
        <div class="forum-banner">
            <h1>Community <span>Forums</span></h1>
            <p>Join the conversation. Your record speaks for you.</p>
        </div>

        <div class="stats-bar">
            <div><strong id="statThreads">0</strong> Threads</div>
            <div><strong id="statPosts">0</strong> Posts</div>
        </div>

        <div class="search-row">
            <input type="text" id="searchInput" placeholder="Search all forums..." onkeyup="handleSearch(this.value)">
        </div>

        <div id="categoriesContainer"></div>
    </div>

    <!-- ================= THREADS VIEW ================= -->
    <div id="viewThreads" style="display:none;">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="openNewThread()">+ New Thread</button>
            <select id="sortSelect" onchange="renderThreads()">
                <option value="activity">Last Activity</option>
                <option value="newest">Newest First</option>
                <option value="popular">Most Popular</option>
                <option value="replies">Most Replies</option>
            </select>
        </div>
        <table class="thread-table">
            <thead>
                <tr>
                    <th>Thread / Starter</th>
                    <th class="col-num">Replies</th>
                    <th class="col-num">Views</th>
                    <th class="col-last">Last Post</th>
                </tr>
            </thead>
            <tbody id="threadsBody"></tbody>
        </table>
    </div>

    <!-- ================= THREAD DETAIL VIEW ================= -->
    <div id="viewThread" style="display:none;">
        <div class="toolbar">
            <button class="btn btn-outline btn-sm" onclick="goBackToThreads()">Back to Threads</button>
            <button class="btn btn-primary btn-sm" onclick="scrollToReply()">Reply</button>
        </div>
        <div id="postsContainer"></div>

        <!-- Quick Reply -->
        <div class="reply-box" id="replyBox">
            <h3>Quick Reply</h3>
            <div id="replyArea"></div>
        </div>
    </div>

</div><!-- /forum-wrap -->

<!-- NEW THREAD MODAL -->
<div class="modal-overlay" id="newThreadModal">
    <div class="modal-box">
        <button class="close-btn" onclick="closeNewThread()">&times;</button>
        <h2>Create New Thread</h2>
        <form id="newThreadForm" onsubmit="submitThread(event)">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="ntTitle" placeholder="Thread title..." required minlength="5">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="ntContent" rows="8" placeholder="Write your post..." required minlength="10"></textarea>
            </div>
            <div class="form-group">
                <label>Tags (comma-separated, optional)</label>
                <input type="text" id="ntTags" placeholder="e.g. nfl, strategy, picks">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;">Post Thread</button>
        </form>
    </div>
</div>

<script src="static/js/config.js"></script>
<script src="static/js/backend-api.js"></script>
<script src="static/js/notifications.js?v=20260318"></script>
<script>
// ================================================================
// FORUM - Backend API Integration
// ================================================================

// STATE
var categories = [];       // loaded from backend
var currentCategorySlug = null;
var currentCategoryId = null;
var currentCategoryName = null;
var currentThreadId = null;
var currentThreadTitle = null;
var cachedThreads = [];    // threads for current category view
var cachedThread = null;   // current thread detail
var cachedPosts = [];      // posts for current thread
var searchDebounceTimer = null;

// ================================================================
// UTILITY
// ================================================================
function timeAgo(iso) {
    if (!iso) return '';
    var diff = Date.now() - new Date(iso).getTime();
    var s = Math.floor(diff / 1000);
    if (s < 60) return 'just now';
    var m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    var d = Math.floor(h / 24);
    if (d < 30) return d + 'd ago';
    return new Date(iso).toLocaleDateString();
}

function escHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function showLoading(container) {
    if (typeof container === 'string') container = document.getElementById(container);
    if (container) container.innerHTML = '<div class="empty-msg" style="padding:40px;"><div style="color:var(--primary);">Loading...</div></div>';
}

function showError(container, msg) {
    if (typeof container === 'string') container = document.getElementById(container);
    if (container) container.innerHTML = '<div class="empty-msg" style="padding:40px;"><div style="color:var(--danger);">' + escHtml(msg) + '</div></div>';
}

// ================================================================
// NAVIGATION
// ================================================================
function showCategories() {
    currentCategorySlug = null;
    currentCategoryId = null;
    currentCategoryName = null;
    currentThreadId = null;
    currentThreadTitle = null;
    document.getElementById('viewCategories').style.display = '';
    document.getElementById('viewThreads').style.display = 'none';
    document.getElementById('viewThread').style.display = 'none';
    updateBreadcrumb();
    loadCategories();
}

async function showThreadsList(slug, categoryName, categoryId) {
    currentCategorySlug = slug;
    currentCategoryName = categoryName || slug;
    currentCategoryId = categoryId || null;
    currentThreadId = null;
    currentThreadTitle = null;
    document.getElementById('viewCategories').style.display = 'none';
    document.getElementById('viewThreads').style.display = '';
    document.getElementById('viewThread').style.display = 'none';
    updateBreadcrumb();
    await loadThreads();
}

async function showThreadDetail(threadId) {
    currentThreadId = threadId;
    document.getElementById('viewCategories').style.display = 'none';
    document.getElementById('viewThreads').style.display = 'none';
    document.getElementById('viewThread').style.display = '';
    await loadThread(threadId);
    updateBreadcrumb();
}

function goBackToThreads() {
    if (currentCategorySlug) {
        showThreadsList(currentCategorySlug, currentCategoryName, currentCategoryId);
    } else {
        showCategories();
    }
}

function scrollToReply() {
    var el = document.getElementById('replyBox');
    if (el) el.scrollIntoView({ behavior: 'smooth' });
}

function updateBreadcrumb() {
    var bc = document.getElementById('breadcrumb');
    var html = '<a onclick="showCategories()">Forums</a>';

    if (currentCategorySlug) {
        html += '<span class="sep">&raquo;</span>';
        if (currentThreadId) {
            html += '<a onclick="showThreadsList(\'' + escHtml(currentCategorySlug) + '\',\'' + escHtml(currentCategoryName) + '\',' + (currentCategoryId || 'null') + ')">' + escHtml(currentCategoryName) + '</a>';
        } else {
            html += '<span>' + escHtml(currentCategoryName) + '</span>';
        }
    }

    if (currentThreadId && currentThreadTitle) {
        var title = currentThreadTitle.length > 40 ? currentThreadTitle.substring(0, 40) + '...' : currentThreadTitle;
        html += '<span class="sep">&raquo;</span>';
        html += '<span>' + escHtml(title) + '</span>';
    }

    bc.innerHTML = html;
}

// ================================================================
// LOAD & RENDER CATEGORIES (from backend)
// ================================================================
async function loadCategories() {
    var container = document.getElementById('categoriesContainer');
    showLoading(container);

    try {
        var data = await api.request('/forum/categories');
        categories = data.categories || [];
        renderCategories();

        // Also load stats
        try {
            var stats = await api.request('/forum/stats');
            document.getElementById('statThreads').textContent = stats.total_threads || 0;
            document.getElementById('statPosts').textContent = stats.total_posts || 0;
        } catch (e) {
            // Stats are optional, don't break the page
        }
    } catch (err) {
        showError(container, 'Failed to load categories. Please try again later.');
        console.error('Load categories error:', err);
    }
}

function renderCategories() {
    var container = document.getElementById('categoriesContainer');
    if (categories.length === 0) {
        container.innerHTML = '<div class="empty-msg"><div class="icon">💬</div><div>No forum categories available.</div></div>';
        return;
    }

    // Group categories by group_name
    var groups = {};
    var groupOrder = [];
    categories.forEach(function(cat) {
        var g = cat.group_name || 'General';
        if (!groups[g]) {
            groups[g] = [];
            groupOrder.push(g);
        }
        groups[g].push(cat);
    });

    var html = '';
    groupOrder.forEach(function(groupName) {
        var groupIcon = groupName.toUpperCase().indexOf('SPORT') !== -1 ? '&#x1F3C6;' : '&#x1F4AC;';
        html += '<div class="group-header"><span>' + groupIcon + '</span> ' + escHtml(groupName.toUpperCase()) + '</div>';
        html += '<table class="cat-table"><thead><tr><th>Forum</th><th class="col-num">Threads</th><th class="col-num">Posts</th><th class="col-last">Last Post</th></tr></thead><tbody>';

        groups[groupName].forEach(function(cat) {
            var threadCount = parseInt(cat.thread_count) || 0;
            var postCount = parseInt(cat.post_count) || 0;
            var icon = cat.icon || '&#x1F4AC;';

            var lastHtml = '<span class="no-posts">No posts yet</span>';
            if (cat.latest_thread) {
                var lt = cat.latest_thread;
                var ltTitle = (lt.title || '').length > 30 ? lt.title.substring(0, 30) + '...' : (lt.title || '');
                lastHtml = '<div class="last-post-info"><div class="last-post-title">' + escHtml(ltTitle) + '</div><div class="last-post-meta">by <strong>' + escHtml(lt.username || '') + '</strong> ' + timeAgo(lt.created_at) + '</div></div>';
            }

            html += '<tr onclick="showThreadsList(\'' + escHtml(cat.slug) + '\',\'' + escHtml(cat.name) + '\',' + cat.id + ')">';
            html += '<td><div class="cat-info"><div class="cat-icon">' + icon + '</div><div><div class="cat-name">' + escHtml(cat.name) + '</div><div class="cat-desc">' + escHtml(cat.description || '') + '</div></div></div></td>';
            html += '<td class="col-num">' + threadCount + '</td>';
            html += '<td class="col-num">' + postCount + '</td>';
            html += '<td class="col-last">' + lastHtml + '</td>';
            html += '</tr>';
        });

        html += '</tbody></table>';
    });

    container.innerHTML = html;
}

// ================================================================
// LOAD & RENDER THREADS
// ================================================================
async function loadThreads() {
    var body = document.getElementById('threadsBody');
    body.innerHTML = '<tr><td colspan="4" class="empty-msg">Loading threads...</td></tr>';

    try {
        var data = await api.request('/forum/categories/' + encodeURIComponent(currentCategorySlug));
        cachedThreads = data.threads || [];
        // Update category id from response if we didn't have it
        if (data.category) {
            currentCategoryId = data.category.id;
            currentCategoryName = data.category.name;
        }
        renderThreads();
    } catch (err) {
        body.innerHTML = '<tr><td colspan="4" class="empty-msg"><div style="color:var(--danger);">Failed to load threads.</div></td></tr>';
        console.error('Load threads error:', err);
    }
}

function renderThreads() {
    var body = document.getElementById('threadsBody');

    if (cachedThreads.length === 0) {
        body.innerHTML = '<tr><td colspan="4" class="empty-msg"><div class="icon">&#x1F4AC;</div><div>No threads yet. Be the first to start a discussion!</div></td></tr>';
        return;
    }

    body.innerHTML = cachedThreads.map(function(t) {
        var lastUser = t.last_post_username || t.username || '';
        var lastTime = t.last_post_at || t.created_at;
        var pinHtml = t.is_pinned ? '<span class="pin-badge">PINNED</span>' : '';
        var replyCount = parseInt(t.post_count) || parseInt(t.reply_count) || 0;
        var viewCount = parseInt(t.view_count) || 0;

        return '<tr class="' + (t.is_pinned ? 'pinned' : '') + '" onclick="showThreadDetail(' + t.id + ')">' +
            '<td><div>' + pinHtml + '<span class="thread-title-link">' + escHtml(t.title) + '</span></div><div class="thread-meta">by <strong>' + escHtml(t.username || '') + '</strong> ' + timeAgo(t.created_at) + '</div></td>' +
            '<td class="col-num">' + replyCount + '</td>' +
            '<td class="col-num">' + viewCount + '</td>' +
            '<td class="col-last"><div class="last-post-info"><div class="last-post-meta">by <strong>' + escHtml(lastUser) + '</strong><br>' + timeAgo(lastTime) + '</div></div></td>' +
            '</tr>';
    }).join('');
}

// ================================================================
// LOAD & RENDER THREAD DETAIL
// ================================================================
async function loadThread(threadId) {
    var container = document.getElementById('postsContainer');
    showLoading(container);

    try {
        var data = await api.request('/forum/threads/' + threadId);
        cachedThread = data.thread;
        cachedPosts = data.posts || [];
        currentThreadTitle = cachedThread.title;
        // Set category info from thread if not already set
        if (cachedThread.category_slug) {
            currentCategorySlug = cachedThread.category_slug;
            currentCategoryName = cachedThread.category_name || cachedThread.category_slug;
            currentCategoryId = cachedThread.category_id;
        }
        renderThread();
    } catch (err) {
        showError(container, 'Failed to load thread.');
        console.error('Load thread error:', err);
    }
}

function renderThread() {
    if (!cachedThread) return;
    var t = cachedThread;

    // Build all posts: OP first, then replies
    var allPosts = [{
        id: 'op',
        username: t.username,
        content: t.content,
        created_at: t.created_at,
        like_count: t.like_count || 0,
        isOP: true,
        title: t.title,
        avatar_url: t.avatar_url,
        user_picks: t.user_picks || 0,
        user_joined: t.user_joined
    }];
    cachedPosts.forEach(function(p) {
        allPosts.push({
            id: p.id,
            username: p.username,
            content: p.content,
            created_at: p.created_at,
            like_count: p.like_count || 0,
            isOP: false,
            avatar_url: p.avatar_url,
            user_post_count: p.user_post_count || 0,
            user_picks: p.user_picks || 0,
            user_joined: p.user_joined,
            is_edited: p.is_edited,
            parent_post_id: p.parent_post_id
        });
    });

    var container = document.getElementById('postsContainer');
    container.innerHTML = allPosts.map(function(post, idx) {
        var bodyHtml = post.isOP ? '<h2>' + escHtml(post.title) + '</h2>' + escHtml(post.content) : escHtml(post.content);
        var editedNote = post.is_edited ? ' <span style="color:var(--text-muted);font-size:0.75rem;">(edited)</span>' : '';

        var likeBtn = '';
        if (!post.isOP) {
            likeBtn = '<button class="vote-btn" onclick="likePost(' + post.id + ')">&#x1F44D; ' + (post.like_count || 0) + '</button>';
        }

        return '<div class="post-card' + (post.isOP ? ' op-card' : '') + '">' +
            '<div class="post-top-bar"><span><span class="post-author-name">' + escHtml(post.username) + '</span>' + editedNote + '</span><span class="post-number">#' + (idx + 1) + ' &middot; ' + new Date(post.created_at).toLocaleString() + '</span></div>' +
            '<div class="post-body">' + bodyHtml + '</div>' +
            '<div class="post-footer-bar"><div class="vote-btns">' + likeBtn + '</div><div></div></div>' +
            '</div>';
    }).join('');

    // Render reply area
    var replyAreaEl = document.getElementById('replyArea');
    if (api.isLoggedIn()) {
        replyAreaEl.innerHTML = '<textarea id="replyText" rows="5" placeholder="Type your reply..."></textarea>' +
            '<button class="btn btn-primary" style="margin-top:10px;" onclick="submitReply()">Post Reply</button>';
    } else {
        replyAreaEl.innerHTML = '<div class="login-prompt">You must <a href="index.html">log in</a> to reply.</div>';
    }
}

// ================================================================
// LIKE POST
// ================================================================
async function likePost(postId) {
    if (!api.isLoggedIn()) {
        alert('Please log in to like posts.');
        return;
    }
    try {
        await api.request('/forum/posts/' + postId + '/like', { method: 'POST' });
        // Reload thread to get updated like counts
        await loadThread(currentThreadId);
    } catch (err) {
        console.error('Like error:', err);
        alert(err.message || 'Failed to like post.');
    }
}

// ================================================================
// CREATE THREAD
// ================================================================
function openNewThread() {
    if (!api.isLoggedIn()) {
        alert('Please log in to create a thread.');
        return;
    }
    document.getElementById('newThreadModal').classList.add('active');
}

function closeNewThread() {
    document.getElementById('newThreadModal').classList.remove('active');
    document.getElementById('newThreadForm').reset();
}

async function submitThread(e) {
    e.preventDefault();
    if (!api.isLoggedIn()) { alert('Please log in first.'); return; }

    var title = document.getElementById('ntTitle').value.trim();
    var content = document.getElementById('ntContent').value.trim();

    if (title.length < 5) { alert('Title must be at least 5 characters.'); return; }
    if (content.length < 10) { alert('Content must be at least 10 characters.'); return; }

    if (!currentCategoryId) {
        alert('No category selected. Please go back and select a category.');
        return;
    }

    var submitBtn = e.target.querySelector('button[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Posting...'; }

    try {
        var data = await api.request('/forum/threads', {
            method: 'POST',
            body: { category_id: currentCategoryId, title: title, content: content }
        });
        closeNewThread();
        // Reload threads list
        await loadThreads();
    } catch (err) {
        console.error('Create thread error:', err);
        alert(err.message || 'Failed to create thread. Please try again.');
    } finally {
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Post Thread'; }
    }
}

// ================================================================
// SUBMIT REPLY
// ================================================================
async function submitReply() {
    if (!api.isLoggedIn()) { alert('Please log in to reply.'); return; }

    var textarea = document.getElementById('replyText');
    if (!textarea) return;
    var content = textarea.value.trim();
    if (content.length < 5) { alert('Reply must be at least 5 characters.'); return; }

    // Disable button while posting
    var btns = textarea.parentElement.querySelectorAll('.btn');
    btns.forEach(function(b) { b.disabled = true; b.textContent = 'Posting...'; });

    try {
        await api.request('/forum/threads/' + currentThreadId + '/posts', {
            method: 'POST',
            body: { content: content }
        });
        // Reload thread to show new reply
        await loadThread(currentThreadId);
        // Scroll to bottom
        var posts = document.getElementById('postsContainer');
        if (posts && posts.lastElementChild) {
            posts.lastElementChild.scrollIntoView({ behavior: 'smooth' });
        }
    } catch (err) {
        console.error('Reply error:', err);
        alert(err.message || 'Failed to post reply. Please try again.');
        btns.forEach(function(b) { b.disabled = false; b.textContent = 'Post Reply'; });
    }
}

// ================================================================
// SEARCH
// ================================================================
function handleSearch(query) {
    clearTimeout(searchDebounceTimer);
    if (!query || query.length < 3) {
        return;
    }
    searchDebounceTimer = setTimeout(function() {
        performSearch(query);
    }, 400);
}

async function performSearch(query) {
    // Switch to threads view for results
    currentCategorySlug = null;
    currentCategoryId = null;
    document.getElementById('viewCategories').style.display = 'none';
    document.getElementById('viewThreads').style.display = '';
    document.getElementById('viewThread').style.display = 'none';

    var bc = document.getElementById('breadcrumb');
    bc.innerHTML = '<a onclick="showCategories()">Forums</a><span class="sep">&raquo;</span><span>Search: "' + escHtml(query) + '"</span>';

    var body = document.getElementById('threadsBody');
    body.innerHTML = '<tr><td colspan="4" class="empty-msg">Searching...</td></tr>';

    try {
        var data = await api.request('/forum/search?q=' + encodeURIComponent(query));
        var results = data.results || [];

        if (results.length === 0) {
            body.innerHTML = '<tr><td colspan="4" class="empty-msg"><div>No threads match your search.</div></td></tr>';
            return;
        }

        body.innerHTML = results.map(function(t) {
            var catName = t.category_name || '';
            var catSlug = t.category_slug || '';
            return '<tr onclick="currentCategorySlug=\'' + escHtml(catSlug) + '\';currentCategoryName=\'' + escHtml(catName) + '\';showThreadDetail(' + t.id + ')">' +
                '<td><span class="tag-pill">' + escHtml(catName) + '</span><div class="thread-title-link">' + escHtml(t.title) + '</div><div class="thread-meta">by <strong>' + escHtml(t.username || '') + '</strong> ' + timeAgo(t.created_at) + '</div></td>' +
                '<td class="col-num">' + (t.reply_count || 0) + '</td>' +
                '<td class="col-num">' + (t.view_count || 0) + '</td>' +
                '<td class="col-last"><div class="last-post-meta">' + timeAgo(t.created_at) + '</div></td>' +
                '</tr>';
        }).join('');
    } catch (err) {
        body.innerHTML = '<tr><td colspan="4" class="empty-msg"><div style="color:var(--danger);">Search failed. Please try again.</div></td></tr>';
        console.error('Search error:', err);
    }
}

// ================================================================
// INIT
// ================================================================
document.addEventListener('DOMContentLoaded', async function() {
    // Close modal on outside click
    document.getElementById('newThreadModal').addEventListener('click', function(e) {
        if (e.target === this) closeNewThread();
    });

    // Wait for backend detection
    await api.ready;

    if (!api.backendAvailable) {
        // Show fallback message
        document.getElementById('categoriesContainer').innerHTML =
            '<div class="empty-msg" style="padding:48px 20px;">' +
            '<div class="icon" style="font-size:2.5rem;margin-bottom:10px;opacity:0.5;">&#x1F50C;</div>' +
            '<div style="color:var(--text-muted);font-size:0.95rem;">The forum backend is currently unavailable.<br>Please try again later.</div>' +
            '</div>';
        return;
    }

    // Check URL hash for deep link
    var hash = window.location.hash;
    if (hash && hash.indexOf('#thread-') === 0) {
        var tid = parseInt(hash.substring(8));
        if (tid) {
            await showThreadDetail(tid);
            return;
        }
    }
    if (hash && hash.indexOf('#cat-') === 0) {
        var slug = hash.substring(5);
        if (slug) {
            await showThreadsList(slug, slug);
            return;
        }
    }

    // Default: show categories
    showCategories();
});
</script>
