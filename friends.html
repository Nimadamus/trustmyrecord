<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends | TrustMyRecord</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="static/css/professional.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #ff00ff;
            --neon-green: #39ff14;
            --neon-gold: #ffd700;
            --neon-red: #ff073a;
            --neon-orange: #ff8c00;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-hover: #1a1a25;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        /* Main Navigation - LARGER, CLEARER, BETTER SPACED */
        header {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            cursor: pointer;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .logo:hover {
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            transform: scale(1.02);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .main-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
            margin: 0 20px;
        }

        .main-nav .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            padding: 14px 22px;
            border-radius: 10px;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .main-nav .nav-link:hover {
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 255, 255, 0.2);
        }

        .main-nav .nav-link.active {
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .main-nav .nav-link.profile-link {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(0, 255, 255, 0.05));
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            border-radius: 25px;
            padding: 12px 26px;
        }

        .main-nav .nav-link.profile-link:hover {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.25), rgba(0, 255, 255, 0.1));
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .main-nav .nav-link.premium-link {
            color: var(--neon-gold);
            font-weight: 700;
        }

        .main-nav .nav-link.premium-link:hover {
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.2);
        }

        /* Arena Dropdown - LARGER */
        .nav-dropdown {
            position: relative;
            display: flex;
            align-items: center;
        }

        .nav-dropdown-toggle {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            padding: 14px 22px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-dropdown-toggle::after {
            content: '▼';
            font-size: 10px;
            transition: transform 0.3s;
            opacity: 0.7;
        }

        .nav-dropdown:hover .nav-dropdown-toggle::after {
            transform: rotate(180deg);
        }

        .nav-dropdown:hover .nav-dropdown-toggle {
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.1);
        }

        .nav-dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            min-width: 240px;
            background: rgba(15, 15, 25, 0.98);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 255, 255, 0.1);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1001;
            padding: 10px 0;
            overflow: hidden;
        }

        .nav-dropdown:hover .nav-dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .nav-dropdown-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 22px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-dropdown-item:hover {
            background: rgba(0, 255, 255, 0.08);
            color: var(--neon-cyan);
            border-left-color: var(--neon-cyan);
            padding-left: 26px;
        }

        .dropdown-icon {
            font-size: 1.3rem;
            width: 26px;
            text-align: center;
        }

        /* Header Icon Buttons - LARGER */
        .header-icon-btn {
            position: relative;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 1.2rem;
        }

        .header-icon-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .header-icon-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--neon-red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .main-nav {
                order: 3;
                width: 100%;
                justify-content: center;
                margin: 10px 0 0 0;
                gap: 4px;
            }

            .main-nav .nav-link {
                font-size: 0.95rem;
                padding: 12px 18px;
            }

            .header-content {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 768px) {
            .main-nav {
                gap: 3px;
            }

            .main-nav .nav-link {
                font-size: 0.85rem;
                padding: 10px 14px;
            }

            .logo {
                font-size: 1.4rem;
            }

            .nav-dropdown-toggle {
                font-size: 0.9rem;
                padding: 10px 14px;
            }
        }

        /* Profile Tab Content Styles */
        .profile-tab-content { display: none; }
        .profile-tab-content.active { display: block; }
        

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-title {
            font-family: 'Inter', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Search Section */
        .search-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .search-btn {
            padding: 15px 30px;
            background: linear-gradient(45deg, var(--primary), var(--primary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .search-btn:hover {
            transform: translateY(-2px);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .tab {
            padding: 10px 25px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
        }

        .tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .tab.active {
            background: linear-gradient(45deg, var(--primary), var(--primary));
            border-color: transparent;
            color: white;
        }

        .tab-badge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 8px;
        }

        /* Friends Grid */
        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .friend-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            position: relative;
        }

        .friend-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .friend-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            flex-shrink: 0;
            position: relative;
        }

        .friend-avatar.online::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: var(--success);
            border: 2px solid var(--bg-card);
            border-radius: 50%;
        }

        .friend-info {
            flex: 1;
            min-width: 0;
        }

        .friend-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .friend-status {
            font-size: 13px;
            color: var(--success);
        }

        .friend-status.offline {
            color: var(--text-muted);
        }

        .friend-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .friend-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .action-btn.danger:hover {
            background: rgba(255, 7, 58, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        .action-btn.success:hover {
            background: rgba(57, 255, 20, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        /* Request Card Variant */
        .request-card {
            border-left: 3px solid var(--warning);
        }

        .request-actions {
            display: flex;
            gap: 8px;
        }

        .btn-accept, .btn-decline {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .btn-accept {
            background: var(--success);
            color: black;
        }

        .btn-accept:hover {
            background: #2dd112;
        }

        .btn-decline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-decline:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-family: 'Inter', sans-serif;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        /* Search Results */
        .search-results {
            margin-top: 20px;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .add-friend-btn {
            margin-left: auto;
            padding: 8px 20px;
            background: linear-gradient(45deg, var(--primary), var(--primary));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-friend-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.3);
        }

        .add-friend-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'Inter', sans-serif;
            font-size: 1.8rem;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .page-title {
                font-size: 1.8rem;
            }

            .friends-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
        <header>
        <div class="header-content">
            <a href="index.html" class="logo">TRUST<span>MY</span>RECORD</a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="challenges.html" class="nav-link">Arena</a>
                <a href="forum.html" class="nav-link">Forum</a>
                <a href="polls.html" class="nav-link">Polls</a>
                <a href="trivia.html" class="nav-link">Trivia</a>
                <a href="activity.html" class="nav-link">Activity</a>
                
                <a href="messages.html" class="nav-link nav-icon">
                    <i class="fas fa-envelope"></i>
                    <span class="nav-badge" id="messageBadge" style="display: none;">0</span>
                </a>
                <a href="#" class="nav-link nav-icon" id="notificationsBtn">
                    <i class="fas fa-bell"></i>
                    <span class="nav-badge" id="notifBadge" style="display: none;">0</span>
                </a>
                <a href="profile.html" class="nav-link" id="profileLink">My Profile</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-users"></i> Friends</h1>
            <p class="page-subtitle">Connect with other bettors, challenge friends, and build your network</p>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalFriends">0</div>
                <div class="stat-label">Following</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="onlineFriends">0</div>
                <div class="stat-label">Followers</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pendingRequests">0</div>
                <div class="stat-label">Mutual</div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <h3 style="margin-bottom: 15px; font-family: 'Inter', sans-serif;"><i class="fas fa-search"></i> Find Friends</h3>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search by username...">
                <button class="search-btn" onclick="searchUsers()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('following')" id="tab-following">
                <i class="fas fa-user-friends"></i> Following
            </button>
            <button class="tab" onclick="showTab('followers')" id="tab-followers">
                <i class="fas fa-users"></i> Followers
            </button>
            <button class="tab" onclick="showTab('discover')" id="tab-discover">
                <i class="fas fa-lightbulb"></i> Discover
            </button>
        </div>

        <!-- Following List -->
        <div id="followingList" class="friends-grid"></div>

        <!-- Followers List -->
        <div id="followersList" class="friends-grid" style="display: none;"></div>

        <!-- Discover List -->
        <div id="discoverList" class="friends-grid" style="display: none;"></div>
    </main>

    <script src="static/js/config.js"></script>
    <script src="static/js/backend-api.js"></script>
    <script src="static/js/auth.js"></script>
    <script src="static/js/notifications.js"></script>
    <script>
        let myUserId = null;
        let followingList = [];
        let followersList = [];
        // Track which user IDs the current user follows (for follow-back buttons)
        let followingIds = new Set();

        function timeAgo(timestamp) {
            const d = typeof timestamp === 'string' ? new Date(timestamp) : new Date(timestamp);
            const seconds = Math.floor((Date.now() - d.getTime()) / 1000);
            if (seconds < 60) return 'just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return `${Math.floor(hours / 24)}d ago`;
        }

        function renderUserCard(user, actions) {
            const username = user.username || user.display_name || 'Unknown';
            const avatarLetter = username[0]?.toUpperCase() || '?';
            const avatarHtml = user.avatar_url
                ? `<img src="${user.avatar_url}" alt="${username}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`
                : avatarLetter;

            const statsHtml = user.total_picks != null
                ? `<div class="friend-meta">${user.total_picks} picks${user.roi != null ? ' | ROI: ' + (parseFloat(user.roi) || 0).toFixed(1) + '%' : ''}${user.net_units != null ? ' | ' + parseFloat(user.net_units).toFixed(1) + 'u' : ''}</div>`
                : '';

            const verifiedBadge = user.verification_status === 'verified'
                ? ' <i class="fas fa-check-circle" style="color:var(--primary);font-size:11px;" title="Verified"></i>'
                : '';

            return `
                <div class="friend-card" data-user-id="${user.id}">
                    <div class="friend-avatar">${avatarHtml}</div>
                    <div class="friend-info">
                        <div class="friend-name"><a href="profile.html?user=${username}" style="color:inherit;text-decoration:none;">${username}${verifiedBadge}</a></div>
                        ${user.display_name && user.display_name !== username ? `<div class="friend-meta" style="color:var(--text-muted);font-size:12px;">${user.display_name}</div>` : ''}
                        ${statsHtml}
                    </div>
                    <div class="friend-actions">
                        ${actions}
                    </div>
                </div>
            `;
        }

        async function loadFollowing() {
            const container = document.getElementById('followingList');
            container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

            try {
                const data = await api.getFollowing(myUserId);
                followingList = data.following || [];
                followingIds = new Set(followingList.map(u => u.id));

                if (followingList.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <i class="fas fa-user-friends"></i>
                            <h3>Not Following Anyone</h3>
                            <p>Search for users above or check Discover to find people to follow</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = followingList.map(u => renderUserCard(u, `
                    <button class="action-btn" onclick="viewProfile('${u.username}')" title="View Profile">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button class="action-btn danger" onclick="unfollowUser(${u.id}, '${u.username}')" title="Unfollow">
                        <i class="fas fa-user-minus"></i>
                    </button>
                `)).join('');
            } catch (err) {
                console.error('Load following error:', err);
                container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">Failed to load. Please try again.</div>';
            }
        }

        async function loadFollowers() {
            const container = document.getElementById('followersList');
            container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

            try {
                const data = await api.getFollowers(myUserId);
                followersList = data.followers || [];

                if (followersList.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <i class="fas fa-users"></i>
                            <h3>No Followers Yet</h3>
                            <p>Share your picks to attract followers</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = followersList.map(u => {
                    const isFollowing = followingIds.has(u.id);
                    const followBackBtn = isFollowing
                        ? `<button class="action-btn" disabled title="Already following" style="opacity:0.4;"><i class="fas fa-check"></i></button>`
                        : `<button class="action-btn success" onclick="followUser(${u.id}, '${u.username}')" title="Follow Back"><i class="fas fa-user-plus"></i></button>`;
                    return renderUserCard(u, `
                        ${followBackBtn}
                        <button class="action-btn" onclick="viewProfile('${u.username}')" title="View Profile">
                            <i class="fas fa-eye"></i>
                        </button>
                    `);
                }).join('');
            } catch (err) {
                console.error('Load followers error:', err);
                container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">Failed to load. Please try again.</div>';
            }
        }

        async function loadDiscover() {
            const container = document.getElementById('discoverList');
            container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

            try {
                const data = await api.searchUsers('', { limit: 20 });
                const users = (data.users || []).filter(u => u.id !== myUserId && !followingIds.has(u.id));

                if (users.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <i class="fas fa-lightbulb"></i>
                            <h3>No Suggestions</h3>
                            <p>Check back later for new users to follow</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = users.map(u => renderUserCard(u, `
                    <button class="action-btn success" onclick="followUser(${u.id}, '${u.username}')" title="Follow">
                        <i class="fas fa-user-plus"></i>
                    </button>
                    <button class="action-btn" onclick="viewProfile('${u.username}')" title="View Profile">
                        <i class="fas fa-eye"></i>
                    </button>
                `)).join('');
            } catch (err) {
                console.error('Load discover error:', err);
                container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">Failed to load suggestions.</div>';
            }
        }

        async function followUser(userId, username) {
            try {
                await api.followUser(userId);
                followingIds.add(userId);
                updateStats();
                // Refresh current tab
                const activeTab = document.querySelector('.tab.active');
                if (activeTab) {
                    const tabId = activeTab.id.replace('tab-', '');
                    if (tabId === 'following') await loadFollowing();
                    else if (tabId === 'followers') await loadFollowers();
                    else if (tabId === 'discover') await loadDiscover();
                }
            } catch (err) {
                console.error('Follow error:', err);
                alert('Failed to follow user: ' + (err.message || 'Unknown error'));
            }
        }

        async function unfollowUser(userId, username) {
            if (!confirm(`Unfollow ${username}?`)) return;
            try {
                await api.unfollowUser(userId);
                followingIds.delete(userId);
                updateStats();
                await loadFollowing();
            } catch (err) {
                console.error('Unfollow error:', err);
                alert('Failed to unfollow user: ' + (err.message || 'Unknown error'));
            }
        }

        async function searchUsers() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('searchResults');

            if (!query) {
                resultsDiv.innerHTML = '';
                return;
            }

            resultsDiv.innerHTML = '<p style="color:var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Searching...</p>';

            try {
                const data = await api.searchUsers(query, { limit: 10 });
                const results = (data.users || []).filter(u => u.id !== myUserId);

                if (results.length === 0) {
                    resultsDiv.innerHTML = '<p style="color: var(--text-muted);">No users found</p>';
                    return;
                }

                resultsDiv.innerHTML = results.map(u => {
                    const isFollowing = followingIds.has(u.id);
                    const avatarLetter = (u.username || '?')[0].toUpperCase();
                    const avatarHtml = u.avatar_url
                        ? `<img src="${u.avatar_url}" alt="${u.username}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`
                        : avatarLetter;

                    const statsStr = u.total_picks != null ? `${u.total_picks} picks` : '';
                    const roiStr = u.roi != null ? `ROI: ${(parseFloat(u.roi) || 0).toFixed(1)}%` : '';
                    const metaParts = [statsStr, roiStr].filter(Boolean).join(' | ');

                    return `
                        <div class="search-result-item">
                            <div class="friend-avatar">${avatarHtml}</div>
                            <div class="friend-info">
                                <div class="friend-name"><a href="profile.html?user=${u.username}" style="color:inherit;text-decoration:none;">${u.username}</a></div>
                                ${metaParts ? `<div class="friend-meta">${metaParts}</div>` : ''}
                            </div>
                            <button class="add-friend-btn" onclick="${isFollowing ? '' : `followUser(${u.id}, '${u.username}')`}" ${isFollowing ? 'disabled' : ''}>
                                ${isFollowing ? '<i class="fas fa-check"></i> Following' : '<i class="fas fa-user-plus"></i> Follow'}
                            </button>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Search error:', err);
                resultsDiv.innerHTML = '<p style="color:var(--text-muted);">Search failed. Please try again.</p>';
            }
        }

        async function updateStats() {
            document.getElementById('totalFriends').textContent = followingIds.size;
            document.getElementById('onlineFriends').textContent = followersList.length;

            // Mutual = followers who you also follow
            const mutualCount = followersList.filter(f => followingIds.has(f.id)).length;
            document.getElementById('pendingRequests').textContent = mutualCount;
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            document.getElementById('followingList').style.display = tab === 'following' ? 'grid' : 'none';
            document.getElementById('followersList').style.display = tab === 'followers' ? 'grid' : 'none';
            document.getElementById('discoverList').style.display = tab === 'discover' ? 'grid' : 'none';

            // Lazy load tab content
            if (tab === 'followers') loadFollowers();
            if (tab === 'discover') loadDiscover();
        }

        function viewProfile(username) {
            window.location.href = `profile.html?user=${username}`;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async function() {
            await api.ready;

            if (!api.backendAvailable) {
                document.getElementById('followingList').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:10px;display:block;"></i><p>Backend unavailable. Please try again later.</p></div>';
                return;
            }

            if (!api.isLoggedIn()) {
                window.location.href = 'index.html?login=1';
                return;
            }

            // Get current user's ID from backend
            try {
                const me = await api.getCurrentUser();
                myUserId = me.user?.id || me.id;
            } catch (err) {
                console.error('Auth error:', err);
                window.location.href = 'index.html?login=1';
                return;
            }

            // Load following first (default tab), then update stats
            await loadFollowing();
            updateStats();

            // Search on enter
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchUsers();
            });
        });
    </script>
</body>
</html>
