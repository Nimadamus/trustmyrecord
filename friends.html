<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends | TrustMyRecord</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="static/css/professional.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #ff00ff;
            --neon-green: #39ff14;
            --neon-gold: #ffd700;
            --neon-red: #ff073a;
            --neon-orange: #ff8c00;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-hover: #1a1a25;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        /* Main Navigation - LARGER, CLEARER, BETTER SPACED */
        header {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            cursor: pointer;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .logo:hover {
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            transform: scale(1.02);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .main-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
            margin: 0 20px;
        }

        .main-nav .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            padding: 14px 22px;
            border-radius: 10px;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .main-nav .nav-link:hover {
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 255, 255, 0.2);
        }

        .main-nav .nav-link.active {
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .main-nav .nav-link.profile-link {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(0, 255, 255, 0.05));
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            border-radius: 25px;
            padding: 12px 26px;
        }

        .main-nav .nav-link.profile-link:hover {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.25), rgba(0, 255, 255, 0.1));
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .main-nav .nav-link.premium-link {
            color: var(--neon-gold);
            font-weight: 700;
        }

        .main-nav .nav-link.premium-link:hover {
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.2);
        }

        /* Arena Dropdown - LARGER */
        .nav-dropdown {
            position: relative;
            display: flex;
            align-items: center;
        }

        .nav-dropdown-toggle {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            padding: 14px 22px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-dropdown-toggle::after {
            content: '▼';
            font-size: 10px;
            transition: transform 0.3s;
            opacity: 0.7;
        }

        .nav-dropdown:hover .nav-dropdown-toggle::after {
            transform: rotate(180deg);
        }

        .nav-dropdown:hover .nav-dropdown-toggle {
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.1);
        }

        .nav-dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            min-width: 240px;
            background: rgba(15, 15, 25, 0.98);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 255, 255, 0.1);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1001;
            padding: 10px 0;
            overflow: hidden;
        }

        .nav-dropdown:hover .nav-dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .nav-dropdown-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 22px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-dropdown-item:hover {
            background: rgba(0, 255, 255, 0.08);
            color: var(--neon-cyan);
            border-left-color: var(--neon-cyan);
            padding-left: 26px;
        }

        .dropdown-icon {
            font-size: 1.3rem;
            width: 26px;
            text-align: center;
        }

        /* Header Icon Buttons - LARGER */
        .header-icon-btn {
            position: relative;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 1.2rem;
        }

        .header-icon-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .header-icon-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--neon-red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .main-nav {
                order: 3;
                width: 100%;
                justify-content: center;
                margin: 10px 0 0 0;
                gap: 4px;
            }

            .main-nav .nav-link {
                font-size: 0.95rem;
                padding: 12px 18px;
            }

            .header-content {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 768px) {
            .main-nav {
                gap: 3px;
            }

            .main-nav .nav-link {
                font-size: 0.85rem;
                padding: 10px 14px;
            }

            .logo {
                font-size: 1.4rem;
            }

            .nav-dropdown-toggle {
                font-size: 0.9rem;
                padding: 10px 14px;
            }
        }

        /* Profile Tab Content Styles */
        .profile-tab-content { display: none; }
        .profile-tab-content.active { display: block; }
        

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-title {
            font-family: 'Inter', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Search Section */
        .search-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .search-btn {
            padding: 15px 30px;
            background: linear-gradient(45deg, var(--primary), var(--primary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .search-btn:hover {
            transform: translateY(-2px);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .tab {
            padding: 10px 25px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
        }

        .tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .tab.active {
            background: linear-gradient(45deg, var(--primary), var(--primary));
            border-color: transparent;
            color: white;
        }

        .tab-badge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 8px;
        }

        /* Friends Grid */
        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .friend-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            position: relative;
        }

        .friend-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .friend-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            flex-shrink: 0;
            position: relative;
        }

        .friend-avatar.online::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: var(--success);
            border: 2px solid var(--bg-card);
            border-radius: 50%;
        }

        .friend-info {
            flex: 1;
            min-width: 0;
        }

        .friend-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .friend-status {
            font-size: 13px;
            color: var(--success);
        }

        .friend-status.offline {
            color: var(--text-muted);
        }

        .friend-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .friend-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .action-btn.danger:hover {
            background: rgba(255, 7, 58, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        .action-btn.success:hover {
            background: rgba(57, 255, 20, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        /* Request Card Variant */
        .request-card {
            border-left: 3px solid var(--warning);
        }

        .request-actions {
            display: flex;
            gap: 8px;
        }

        .btn-accept, .btn-decline {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .btn-accept {
            background: var(--success);
            color: black;
        }

        .btn-accept:hover {
            background: #2dd112;
        }

        .btn-decline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-decline:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-family: 'Inter', sans-serif;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        /* Search Results */
        .search-results {
            margin-top: 20px;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .add-friend-btn {
            margin-left: auto;
            padding: 8px 20px;
            background: linear-gradient(45deg, var(--primary), var(--primary));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-friend-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.3);
        }

        .add-friend-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'Inter', sans-serif;
            font-size: 1.8rem;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .page-title {
                font-size: 1.8rem;
            }

            .friends-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
        <header>
        <div class="header-content">
            <a href="index.html" class="logo">TRUST<span>MY</span>RECORD</a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="challenges.html" class="nav-link">Arena</a>
                <a href="forum.html" class="nav-link">Forum</a>
                <a href="polls.html" class="nav-link">Polls</a>
                <a href="trivia.html" class="nav-link">Trivia</a>
                <a href="activity.html" class="nav-link">Activity</a>
                
                <a href="messages.html" class="nav-link nav-icon">

                    <span class="nav-badge" id="messageBadge" style="display: none;">0</span>
                </a>
                <a href="#" class="nav-link nav-icon" id="notificationsBtn">
                    <i class="fas fa-bell"></i>
                    <span class="nav-badge" id="notifBadge" style="display: none;">0</span>
                </a>
                <a href="profile.html" class="nav-link" id="profileLink">My Profile</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-users"></i> Friends</h1>
            <p class="page-subtitle">Connect with other bettors, challenge friends, and build your network</p>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalFriends">0</div>
                <div class="stat-label">Friends</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="onlineFriends">0</div>
                <div class="stat-label">Online</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pendingRequests">0</div>
                <div class="stat-label">Requests</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="triviaRank">-</div>
                <div class="stat-label">Trivia Rank</div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <h3 style="margin-bottom: 15px; font-family: 'Inter', sans-serif;"><i class="fas fa-search"></i> Find Friends</h3>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search by username...">
                <button class="search-btn" onclick="searchUsers()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('friends')" id="tab-friends">
                <i class="fas fa-user-friends"></i> My Friends
            </button>
            <button class="tab" onclick="showTab('requests')" id="tab-requests">
                <i class="fas fa-user-plus"></i> Requests
                <span class="tab-badge" id="requestBadge" style="display: none;">0</span>
            </button>
            <button class="tab" onclick="showTab('suggestions')" id="tab-suggestions">
                <i class="fas fa-lightbulb"></i> Suggestions
            </button>
        </div>

        <!-- Friends List -->
        <div id="friendsList" class="friends-grid"></div>

        <!-- Requests List -->
        <div id="requestsList" class="friends-grid" style="display: none;"></div>

        <!-- Suggestions List -->
        <div id="suggestionsList" class="friends-grid" style="display: none;"></div>
    </main>

    <script src="static/js/auth.js"></script>
    <script>
        const FRIENDS_KEY = 'tmr_friends';
        const REQUESTS_KEY = 'tmr_requests';
        const BLOCKED_KEY = 'tmr_blocked';

        // No mock users - all data comes from real user activity
        const mockUsers = [];

        function getFriends() {
            return JSON.parse(localStorage.getItem(FRIENDS_KEY) || '[]');
        }

        function getRequests() {
            return JSON.parse(localStorage.getItem(REQUESTS_KEY) || '[]');
        }

        function getBlocked() {
            return JSON.parse(localStorage.getItem(BLOCKED_KEY) || '[]');
        }

        function saveFriends(friends) {
            localStorage.setItem(FRIENDS_KEY, JSON.stringify(friends));
        }

        function saveRequests(requests) {
            localStorage.setItem(REQUESTS_KEY, JSON.stringify(requests));
        }

        function sendFriendRequest(username) {
            const requests = getRequests();
            if (requests.find(r => r.from === currentUser?.username && r.to === username)) {
                alert('Friend request already sent!');
                return;
            }
            if (requests.find(r => r.from === username && r.to === currentUser?.username)) {
                alert('This user already sent you a request!');
                return;
            }

            requests.push({
                from: currentUser?.username,
                to: username,
                timestamp: Date.now()
            });
            saveRequests(requests);

            // Create notification
            addNotification(username, `${currentUser?.username} sent you a friend request`, 'friend_request');

            alert(`Friend request sent to ${username}!`);
            renderAll();
        }

        function acceptRequest(username) {
            const requests = getRequests();
            const filtered = requests.filter(r => !(r.from === username && r.to === currentUser?.username));
            saveRequests(filtered);

            const friends = getFriends();
            friends.push({ username, addedAt: Date.now() });
            saveFriends(friends);

            addNotification(username, `${currentUser?.username} accepted your friend request`, 'friend_accept');

            renderAll();
        }

        function declineRequest(username) {
            const requests = getRequests();
            const filtered = requests.filter(r => !(r.from === username && r.to === currentUser?.username));
            saveRequests(filtered);
            renderAll();
        }

        function removeFriend(username) {
            if (!confirm(`Remove ${username} from friends?`)) return;

            const friends = getFriends();
            const filtered = friends.filter(f => f.username !== username);
            saveFriends(filtered);
            renderAll();
        }

        function searchUsers() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('searchResults');

            if (!query) {
                resultsDiv.innerHTML = '';
                return;
            }

            const friends = getFriends();
            const requests = getRequests();

            const results = mockUsers.filter(u =>
                u.username.toLowerCase().includes(query) &&
                u.username !== currentUser?.username &&
                !friends.find(f => f.username === u.username)
            );

            if (results.length === 0) {
                resultsDiv.innerHTML = '<p style="color: var(--text-muted);">No users found</p>';
                return;
            }

            resultsDiv.innerHTML = results.map(u => {
                const isPending = requests.find(r =>
                    (r.from === currentUser?.username && r.to === u.username) ||
                    (r.from === u.username && r.to === currentUser?.username)
                );

                return `
                    <div class="search-result-item">
                        <div class="friend-avatar">${u.username[0]}</div>
                        <div class="friend-info">
                            <div class="friend-name">${u.username}</div>
                            <div class="friend-meta">${u.record} • ${u.units} units</div>
                        </div>
                        <button class="add-friend-btn" onclick="sendFriendRequest('${u.username}')" ${isPending ? 'disabled' : ''}>
                            ${isPending ? 'Pending' : '<i class="fas fa-user-plus"></i> Add'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function renderAll() {
            renderFriends();
            renderRequests();
            renderSuggestions();
            updateStats();
        }

        function renderFriends() {
            const container = document.getElementById('friendsList');
            const friends = getFriends();

            if (friends.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-user-friends"></i>
                        <h3>No Friends Yet</h3>
                        <p>Search for users above or check suggestions to start building your network</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = friends.map(f => `
                <div class="friend-card">
                    <div class="friend-avatar ${f.status || 'offline'}">${f.username[0]}</div>
                    <div class="friend-info">
                        <div class="friend-name">${f.username}</div>
                        <div class="friend-status ${f.status === 'online' ? '' : 'offline'}">
                            <i class="fas fa-circle" style="font-size: 8px; margin-right: 5px;"></i>
                            ${f.status === 'online' ? 'Online' : 'Offline'}
                        </div>
                        ${f.record ? `<div class="friend-meta">${f.record} • ${f.units} units</div>` : ''}
                    </div>
                    <div class="friend-actions">
                        <button class="action-btn" onclick="messageUser('${f.username}')" title="Message">
                            <i class="fas fa-comment"></i>
                        </button>
                        <button class="action-btn" onclick="challengeUser('${f.username}')" title="Challenge">
                            <i class="fas fa-trophy"></i>
                        </button>
                        <button class="action-btn danger" onclick="removeFriend('${f.username}')" title="Remove">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderRequests() {
            const container = document.getElementById('requestsList');
            const requests = getRequests().filter(r => r.to === currentUser?.username);

            if (requests.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-inbox"></i>
                        <h3>No Pending Requests</h3>
                        <p>Friend requests from other users will appear here</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = requests.map(r => {
                const mock = mockUsers.find(u => u.username === r.from);
                return `
                    <div class="friend-card request-card">
                        <div class="friend-avatar">${r.from[0]}</div>
                        <div class="friend-info">
                            <div class="friend-name">${r.from}</div>
                            <div class="friend-meta">${mock ? `${mock.record} • ${mock.units} units` : 'New user'}</div>
                            <div class="friend-meta">Sent ${timeAgo(r.timestamp)}</div>
                        </div>
                        <div class="request-actions">
                            <button class="btn-accept" onclick="acceptRequest('${r.from}')">
                                <i class="fas fa-check"></i> Accept
                            </button>
                            <button class="btn-decline" onclick="declineRequest('${r.from}')">
                                <i class="fas fa-times"></i> Decline
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSuggestions() {
            const container = document.getElementById('suggestionsList');
            const friends = getFriends();
            const requests = getRequests();

            // Filter out friends and pending requests
            const suggestions = mockUsers.filter(u =>
                u.username !== currentUser?.username &&
                !friends.find(f => f.username === u.username) &&
                !requests.find(r =>
                    (r.from === currentUser?.username && r.to === u.username) ||
                    (r.from === u.username && r.to === currentUser?.username)
                )
            ).slice(0, 6);

            if (suggestions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-lightbulb"></i>
                        <h3>No Suggestions</h3>
                        <p>We\'ll suggest users based on your betting activity</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = suggestions.map(u => `
                <div class="friend-card">
                    <div class="friend-avatar ${u.status}">${u.username[0]}</div>
                    <div class="friend-info">
                        <div class="friend-name">${u.username}</div>
                        <div class="friend-status ${u.status === 'online' ? '' : 'offline'}">
                            <i class="fas fa-circle" style="font-size: 8px; margin-right: 5px;"></i>
                            ${u.status === 'online' ? 'Online' : 'Offline'}
                        </div>
                        <div class="friend-meta">${u.record} • ${u.units} units</div>
                    </div>
                    <div class="friend-actions">
                        <button class="action-btn success" onclick="sendFriendRequest('${u.username}')" title="Add Friend">
                            <i class="fas fa-user-plus"></i>
                        </button>
                        <button class="action-btn" onclick="viewProfile('${u.username}')" title="View Profile">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const friends = getFriends();
            const requests = getRequests().filter(r => r.to === currentUser?.username);
            const online = friends.filter(f => f.status === 'online').length;

            document.getElementById('totalFriends').textContent = friends.length;
            document.getElementById('onlineFriends').textContent = online;
            document.getElementById('pendingRequests').textContent = requests.length;

            // Update badges
            const requestBadge = document.getElementById('requestBadge');
            if (requests.length > 0) {
                requestBadge.textContent = requests.length;
                requestBadge.style.display = 'inline';
            } else {
                requestBadge.style.display = 'none';
            }

            // Trivia rank
            const allPoints = JSON.parse(localStorage.getItem('tmr_trivia_points') || '{}');
            const sorted = Object.entries(allPoints).sort((a, b) => (b[1].total || 0) - (a[1].total || 0));
            const myRank = sorted.findIndex(([user]) => user === currentUser?.username);
            document.getElementById('triviaRank').textContent = myRank >= 0 ? `#${myRank + 1}` : '-';
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            document.getElementById('friendsList').style.display = tab === 'friends' ? 'grid' : 'none';
            document.getElementById('requestsList').style.display = tab === 'requests' ? 'grid' : 'none';
            document.getElementById('suggestionsList').style.display = tab === 'suggestions' ? 'grid' : 'none';
        }

        function messageUser(username) {
            window.location.href = `messages.html?to=${username}`;
        }

        function challengeUser(username) {
            window.location.href = `challenges.html?challenge=${username}`;
        }

        function viewProfile(username) {
            window.location.href = `profile.html?user=${username}`;
        }

        function timeAgo(timestamp) {
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if (seconds < 60) return 'just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return `${Math.floor(hours / 24)}d ago`;
        }

        function addNotification(to, message, type) {
            // This will be handled by notifications system
            const notifs = JSON.parse(localStorage.getItem('tmr_notifications') || '[]');
            notifs.push({
                to,
                message,
                type,
                timestamp: Date.now(),
                read: false
            });
            localStorage.setItem('tmr_notifications', JSON.stringify(notifs));
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            if (!currentUser) {
                window.location.href = 'index.html?login=1';
                return;
            }
            renderAll();

            // Search on enter
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchUsers();
            });
        });
    </script>
    <script src="static/js/notifications.js"></script>
</body>
</html>
