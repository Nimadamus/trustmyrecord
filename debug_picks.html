<!DOCTYPE html>
<html>
<head>
    <title>Debug Picks</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
        .section { margin: 20px 0; padding: 15px; background: #16213e; border-radius: 8px; }
        .pick { margin: 10px 0; padding: 10px; background: #0f3460; border-radius: 4px; }
        .error { color: #e94560; }
        .success { color: #4ecca3; }
        pre { overflow-x: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>TrustMyRecord - Picks Debug</h1>
    
    <div class="section">
        <h2>Current User</h2>
        <div id="userInfo">Loading...</div>
    </div>
    
    <div class="section">
        <h2>All Picks in localStorage</h2>
        <div id="allPicks">Loading...</div>
    </div>
    
    <div class="section">
        <h2>Filtered Picks (for current user)</h2>
        <div id="filteredPicks">Loading...</div>
    </div>
    
    <div class="section">
        <h2>Actions</h2>
        <button onclick="runMigration()">Run Migration</button>
        <button onclick="clearPicks()">Clear All Picks</button>
        <button onclick="addTestPick()">Add Test Pick</button>
        <div id="actionResult"></div>
    </div>

    <script>
        function loadData() {
            // Get current user
            const currentUser = JSON.parse(localStorage.getItem('tmr_current_user') || '{}');
            const username = currentUser.username || currentUser.id || 'anonymous';
            document.getElementById('userInfo').innerHTML = `
                <p>Username: <strong>${username}</strong></p>
                <pre>${JSON.stringify(currentUser, null, 2)}</pre>
            `;
            
            // Get all picks
            const allPicks = JSON.parse(localStorage.getItem('tmr_picks') || '[]');
            document.getElementById('allPicks').innerHTML = `
                <p>Total picks: <strong>${allPicks.length}</strong></p>
                ${allPicks.map((p, i) => `
                    <div class="pick">
                        <strong>#${i+1}</strong> - ${p.sport_title || 'Unknown'}<br>
                        ID: ${p.id}<br>
                        user_id: <span class="${p.user_id ? 'success' : 'error'}">${p.user_id || 'MISSING'}</span><br>
                        status: ${p.status}<br>
                        result: ${p.result}<br>
                        <pre>${JSON.stringify(p, null, 2)}</pre>
                    </div>
                `).join('')}
            `;
            
            // Filter for current user
            const filtered = allPicks.filter(p => p.user_id == username || p.user_id == currentUser.id);
            
            // Show detailed comparison
            let comparisonHTML = '<h3>Pick-by-pick comparison:</h3>';
            allPicks.forEach((p, i) => {
                const match = p.user_id == username || p.user_id == currentUser.id;
                comparisonHTML += `<div class="pick" style="border-left: 4px solid ${match ? '#4ecca3' : '#e94560'};">
                    Pick #${i+1}: user_id="${p.user_id}" (type: ${typeof p.user_id})<br>
                    vs username="${username}" (type: ${typeof username})<br>
                    vs currentUser.id="${currentUser.id}" (type: ${typeof currentUser.id})<br>
                    Match: <strong>${match ? 'YES' : 'NO'}</strong>
                </div>`;
            });
            
            document.getElementById('filteredPicks').innerHTML = `
                <p>Filtered picks for "${username}": <strong class="${filtered.length >= 2 ? 'success' : 'error'}">${filtered.length}</strong></p>
                ${comparisonHTML}
                <h3>Matching Picks:</h3>
                ${filtered.length === 0 ? '<p class="error">No picks matched!</p>' : filtered.map((p, i) => `
                    <div class="pick">
                        <strong>#${i+1}</strong> - ${p.sport_title || 'Unknown'}<br>
                        Teams: ${p.away_team} @ ${p.home_team}<br>
                        Pick: ${p.selection}<br>
                        Status: ${p.status} / ${p.result}
                    </div>
                `).join('')}
            `;
        }
        
        function runMigration() {
            let picks = JSON.parse(localStorage.getItem('tmr_picks') || '[]');
            const currentUser = JSON.parse(localStorage.getItem('tmr_current_user') || '{}');
            const userId = currentUser.username || currentUser.id || 'anonymous';
            let count = 0;
            
            picks = picks.map(p => {
                if (!p.user_id) {
                    p.user_id = userId;
                    count++;
                }
                if (!p.result && p.status) {
                    p.result = p.status;
                }
                return p;
            });
            
            localStorage.setItem('tmr_picks', JSON.stringify(picks));
            document.getElementById('actionResult').innerHTML = `<p class="success">Migration complete: ${count} picks updated with user_id "${userId}"</p>`;
            loadData();
        }
        
        function clearPicks() {
            if (confirm('Clear ALL picks?')) {
                localStorage.removeItem('tmr_picks');
                document.getElementById('actionResult').innerHTML = '<p class="error">All picks cleared</p>';
                loadData();
            }
        }
        
        function addTestPick() {
            const currentUser = JSON.parse(localStorage.getItem('tmr_current_user') || '{}');
            const userId = currentUser.username || currentUser.id || 'anonymous';
            
            const pick = {
                id: Date.now().toString(),
                user_id: userId,
                sport_key: 'basketball_nba',
                sport_title: 'NBA',
                home_team: 'Test Home',
                away_team: 'Test Away',
                market_type: 'spread',
                selection: 'Test Away',
                line_snapshot: -5.5,
                odds_snapshot: -110,
                units: 1,
                commence_time: new Date().toISOString(),
                status: 'pending',
                result: 'pending',
                created_at: new Date().toISOString()
            };
            
            const picks = JSON.parse(localStorage.getItem('tmr_picks') || '[]');
            picks.unshift(pick);
            localStorage.setItem('tmr_picks', JSON.stringify(picks));
            document.getElementById('actionResult').innerHTML = '<p class="success">Test pick added</p>';
            loadData();
        }
        
        loadData();
    </script>
</body>
</html>
