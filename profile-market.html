<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Breakdown | TrustMyRecord</title>
  <meta name="robots" content="noindex, follow">
  <meta name="description" content="Market-specific public settled pick ledger and analytics on TrustMyRecord.">
  <link rel="canonical" href="https://trustmyrecord.com/profile-market.html">
  <link rel="stylesheet" href="/static/css/tmr-sitewide.css?v=20260712footer1">
  <script src="/static/js/config.js"></script>
  <script src="/static/js/backend-api.js"></script>
  <script src="/static/js/tmr-sitewide.js" defer></script>
  <style>
    :root{--bg:#050a14;--panel:#0a1322;--panel2:#101b30;--line:rgba(148,163,184,.16);--ink:#f8fbff;--muted:#91a0b5;--green:#22c55e;--red:#ff3333}
    body{margin:0;background:radial-gradient(900px 520px at 85% -10%,rgba(31,184,217,.09),transparent 58%),var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .page{width:min(100% - 32px,1260px);margin:0 auto;padding:28px 0 48px}.back{display:inline-flex;color:#b8d7ff;text-decoration:none;font-weight:800;margin-bottom:18px}
    .hero,.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 34px rgba(0,0,0,.24)}.hero,.card{padding:18px}.hero{padding:24px}
    .eyebrow{color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-size:11px;font-weight:900}h1{margin:6px 0 4px;font-size:clamp(32px,4vw,48px);line-height:1;letter-spacing:0}h2{margin:0 0 12px;font-size:18px;letter-spacing:0}.sub,.empty,.error{color:var(--muted)}
    .kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:20px}.kpi{background:#08111f;border:1px solid var(--line);border-radius:10px;padding:12px;min-height:64px}.kpi span{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-size:10px;font-weight:900}.kpi strong{display:block;margin-top:5px;font-size:20px}
    .grid{display:grid;gap:18px;margin-top:18px}.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:980px}th,td{padding:10px 9px;border-bottom:1px solid rgba(148,163,184,.12);text-align:left;font-size:13px;vertical-align:top}th{color:var(--muted);text-transform:uppercase;letter-spacing:.09em;font-size:10px;font-weight:900;background:rgba(2,6,23,.28)}td{color:#dce7f5}.summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.split-list{display:grid;gap:8px}.split-row{display:flex;justify-content:space-between;gap:12px;padding:10px 12px;border:1px solid rgba(148,163,184,.12);border-radius:10px;background:#08111f}.split-row span{color:var(--muted)}.pos{color:var(--green)}.neg{color:var(--red)}.neutral{color:var(--ink)}.error{color:#ffd0d6}
    @media(max-width:900px){.kpis,.summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:620px){.page{width:min(100% - 20px,1260px);padding-top:18px}.hero,.card{padding:14px;border-radius:12px}.kpis,.summary-grid{grid-template-columns:1fr}}
  </style>
</head>
<body class="tmr-site-shell" data-tmr-route="profile-market">
  <main class="page">
    <a class="back" id="backLink" href="/profile/">Back to profile</a>
    <section class="hero" id="hero"><div class="empty">Loading market breakdown...</div></section>
    <section class="grid" id="content"></section>
  </main>
  <script>
    const params=new URLSearchParams(location.search),username=params.get('user')||'',market=params.get('market')||'';
    const apiClient=window.api&&typeof window.api.request==='function'?window.api:new TrustMyRecordAPI();
    function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
    function marketLabel(v){const k=String(v||'').toLowerCase();return{h2h:'Moneyline',moneyline:'Moneyline',spreads:'Spreads',spread:'Spreads',totals:'Totals',total:'Totals',team_totals:'Team Totals',run_line:'Run Line',puck_line:'Puck Line',first_five:'First Five',halves:'Halves',periods:'Periods',alts:'Alts',props:'Player Props'}[k]||String(v||'Market').replace(/[-_]+/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}
    function sportLabel(v){return{baseball_mlb:'MLB',basketball_nba:'NBA',icehockey_nhl:'NHL',americanfootball_nfl:'NFL',basketball_ncaab:'NCAAB',americanfootball_ncaaf:'NCAAF'}[String(v||'').toLowerCase()]||String(v||'').replace(/_/g,' ').toUpperCase()}
    function fmtUnits(v){const n=Number(v||0);return'<span class="'+(n>0?'pos':n<0?'neg':'neutral')+'">'+(n>0?'+':'')+n.toFixed(2)+'u</span>'}
    function fmtPct(v){const n=Number(v||0);return'<span class="'+(n>0?'pos':n<0?'neg':'neutral')+'">'+(n>0?'+':'')+n.toFixed(2)+'%</span>'}
    function fmtOdds(v){const n=Number(v);return !Number.isFinite(n)||n===0?'N/A':(n>0?'+'+n:String(n))}
    function fmtDate(v,withTime){if(!v)return'';const d=new Date(v);if(Number.isNaN(d.getTime()))return'';return d.toLocaleString([],withTime?{dateStyle:'medium',timeStyle:'short'}:{dateStyle:'medium'})}
    function record(s){return[(s&&s.wins)||0,(s&&s.losses)||0,(s&&s.pushes)||0].join('-')}
    function splitCard(title,rows,labeler){const body=(rows||[]).length?rows.map(r=>'<div class="split-row"><div><strong>'+esc(labeler(r))+'</strong><br><span>'+record(r)+' / '+(r.total_picks||0)+' picks</span></div><div>'+fmtUnits(r.net_units)+'<br>'+fmtPct(r.roi)+'</div></div>').join(''):'<div class="empty">No split data.</div>';return'<section class="card"><h2>'+esc(title)+'</h2><div class="split-list">'+body+'</div></section>'}
    function render(data){const summary=data.summary||{},selected=data.market&&(data.market.market_type||data.market.normalized||data.market.requested),adv=data.advanced||{};document.title=marketLabel(selected)+' Breakdown | '+username+' | TrustMyRecord';document.getElementById('backLink').href='/profile/?user='+encodeURIComponent(username);
      document.getElementById('hero').innerHTML='<div class="eyebrow">'+esc(username)+'</div><h1>Market Breakdown: '+esc(marketLabel(selected))+'</h1><p class="sub">Public settled graded picks only. Reconciled to the profile market row.</p><div class="kpis"><div class="kpi"><span>Record</span><strong>'+record(summary)+'</strong></div><div class="kpi"><span>Total Picks</span><strong>'+(summary.total_picks||0)+'</strong></div><div class="kpi"><span>Risked</span><strong>'+Number(summary.total_units_risked||0).toFixed(2)+'u</strong></div><div class="kpi"><span>Net Units</span><strong>'+fmtUnits(summary.net_units)+'</strong></div><div class="kpi"><span>ROI</span><strong>'+fmtPct(summary.roi)+'</strong></div><div class="kpi"><span>Win Percentage</span><strong>'+Number(summary.win_rate||0).toFixed(2)+'%</strong></div><div class="kpi"><span>Average Odds</span><strong>'+esc(fmtOdds(summary.avg_odds))+'</strong></div><div class="kpi"><span>Peak / Drawdown</span><strong>'+fmtUnits(adv.peak_market_units)+' / '+fmtUnits(adv.max_market_drawdown)+'</strong></div></div>';
      const pickRows=(data.picks||[]).map(p=>'<tr><td>'+esc(fmtDate(p.date,false))+'</td><td>'+esc(fmtDate(p.time,true).split(', ').slice(-1)[0]||'')+'</td><td>'+esc(sportLabel(p.sport))+'</td><td>'+esc(sportLabel(p.league))+'</td><td>'+esc(p.game||'')+'</td><td>'+esc(p.pick||'')+'</td><td>'+esc(marketLabel(p.market))+'</td><td>'+esc(p.line==null?'':p.line)+'</td><td>'+esc(fmtOdds(p.odds))+'</td><td>'+esc(p.stake_mode||'')+'</td><td>'+Number(p.risk_units||0).toFixed(2)+'u</td><td>'+(p.to_win_units==null?'':Number(p.to_win_units).toFixed(2)+'u')+'</td><td>'+esc(String(p.result||'').toUpperCase())+'</td><td>'+fmtUnits(p.net_units)+'</td><td>'+fmtUnits(p.running_market_net)+'</td><td>'+esc(fmtDate(p.settled_at||p.graded_at,true))+'</td></tr>').join('');
      document.getElementById('content').innerHTML='<section class="card"><h2>Pick Ledger</h2><div class="table-wrap"><table><thead><tr><th>Date</th><th>Time</th><th>Sport</th><th>League</th><th>Game</th><th>Pick</th><th>Market</th><th>Line</th><th>Odds</th><th>Stake Mode</th><th>Risk</th><th>To Win</th><th>Result</th><th>Net</th><th>Running Market Net</th><th>Settled / Graded</th></tr></thead><tbody>'+(pickRows||'<tr><td colspan="16">No settled graded public picks for this market.</td></tr>')+'</tbody></table></div></section><section class="summary-grid">'+splitCard('Sport Split',adv.sport_split||[],r=>sportLabel(r.sport_key||r.key))+splitCard('League Split',adv.league_split||[],r=>sportLabel(r.league||r.key))+splitCard('Monthly Split',adv.monthly_split||[],r=>r.key)+'</section><section class="card"><h2>Advanced Summary</h2><div class="summary-grid"><div class="split-row"><span>Total Risked</span><strong>'+Number(adv.total_risked||0).toFixed(2)+'u</strong></div><div class="split-row"><span>Best Win</span><strong>'+fmtUnits(adv.best_win)+'</strong></div><div class="split-row"><span>Worst Loss</span><strong>'+fmtUnits(adv.worst_loss)+'</strong></div><div class="split-row"><span>Current Streak</span><strong>'+(adv.current_streak||0)+'</strong></div><div class="split-row"><span>Worst Streak</span><strong>'+(adv.worst_streak||0)+'</strong></div><div class="split-row"><span>Last 5</span><strong>'+record((adv.recent_form&&adv.recent_form.last_5)||{})+'</strong></div><div class="split-row"><span>Last 10</span><strong>'+record((adv.recent_form&&adv.recent_form.last_10)||{})+'</strong></div><div class="split-row"><span>Reconciles to parent</span><strong>'+(data.reconciliation&&data.reconciliation.matches_parent?'Yes':'No')+'</strong></div><div class="split-row"><span>Rows sum to summary</span><strong>'+(data.reconciliation&&data.reconciliation.matches_pick_sum?'Yes':'No')+'</strong></div></div></section>';
    }
    async function init(){if(!username||!market){document.getElementById('hero').innerHTML='<div class="error">Missing user or market.</div>';return}try{if(apiClient.ready)await apiClient.ready.catch(()=>null);render(await apiClient.request('/users/'+encodeURIComponent(username)+'/stats/markets/'+encodeURIComponent(market)))}catch(e){document.getElementById('hero').innerHTML='<div class="error">Unable to load this market breakdown.</div>'}}init();
  </script>
</body>
</html>
