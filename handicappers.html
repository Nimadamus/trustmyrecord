    <style>
        :root {

        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            background:

                radial-gradient(circle at 100% 0%, rgba(96,165,250,0.08), transparent 24%),

        }

        a { color: inherit; text-decoration: none; }

        .page {
            width: min(1320px, calc(100% - 40px));
            margin: 0 auto;
            padding: 22px 0 44px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1.24fr) 340px;
            gap: 16px;
            align-items: stretch;
            margin-bottom: 16px;
        }

        .hero-panel,
        .hero-side,
        .filters-card,
        .table-card,
        .rail-card {
            border: 1px solid var(--line);
            border-radius: 20px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.015)),
                var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .hero-panel {
            display: grid;
            gap: 14px;
            padding: 24px 26px 22px;
            background:
                radial-gradient(circle at 8% 0%, rgba(45,212,191,0.16), transparent 32%),
                linear-gradient(155deg, rgba(15, 27, 42, 0.97), rgba(8, 15, 26, 0.99));
        }

        .hero-kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid var(--line-strong);
            background: var(--teal-soft);
            color: #d7fffb;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

            font-family: 'Barlow', sans-serif;
            letter-spacing: -0.03em;

            max-width: 11ch;
            font-size: clamp(2.25rem, 4.5vw, 3.55rem);
            line-height: 0.97;
            text-transform: none;
        }

        .hero-panel p {
            max-width: 58ch;
            margin: 0;
            color: #c3d0dd;
            font-size: 0.94rem;
            line-height: 1.62;
        }

        .hero-metrics {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-top: 2px;
            padding-top: 16px;
            border-top: 1px solid rgba(148, 163, 184, 0.14);
        }

        .hero-metric {
            padding: 12px 13px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.07);
            background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);

            display: block;
            font-size: 1.16rem;
            line-height: 1;
        }

        .hero-metric span {
            display: block;
            margin-top: 7px;
            color: var(--muted);
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .filters-card,
        .table-card,

            padding: 18px;

            display: grid;
            gap: 12px;
            align-content: start;
            background:

                linear-gradient(160deg, rgba(10, 18, 30, 0.95), rgba(8, 15, 25, 0.98));
        }

        .side-title,
        .filters-head,
        .table-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 12px;

            line-height: 1.05;
        }

            color: var(--muted);
            font-size: 0.78rem;
            line-height: 1.52;

            gap: 5px;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.07);
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.025));
            box-shadow: var(--shadow-soft);
        }

        .rail-item strong {

        .rail-item span {

            line-height: 1.45;
        }

            width: fit-content;

            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid rgba(148,163,184,0.18);
            background: rgba(255,255,255,0.045);
            color: var(--text);

            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;

            background: rgba(212,167,44,0.12);

            color: #ffe8a3;

            grid-template-columns: minmax(0, 1fr) 300px;
            gap: 16px;
            align-items: start;

            border: 1px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.04);

            display: block;

            font-size: 0.66rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;

        .preview-stat strong {

            margin-top: 7px;
            font-size: 0.96rem;
            line-height: 1.1;

        .pick-list {
            display: grid;
            gap: 9px;
        }

        .pick-item {
            padding: 11px 12px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.04);
        }

        .split-item strong,
        .pick-item strong {
            display: block;
            font-size: 0.84rem;
            line-height: 1.4;
        }

        .split-item span,
        .pick-item span {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 0.74rem;
            line-height: 1.45;
        }

        .pick-result {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
            margin-top: 8px;
            padding: 5px 8px;
            border-radius: 999px;
            font-size: 0.64rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .pick-result.won { background: rgba(34,197,94,0.12); color: #b5f7ca; }
        .pick-result.lost { background: rgba(239,68,68,0.12); color: #fecaca; }
        .pick-result.push { background: rgba(148,163,184,0.14); color: #e2e8f0; }
        .pick-result.pending { background: rgba(96,165,250,0.14); color: #bfdbfe; }

        .filters-grid {
            display: grid;
            grid-template-columns: 1.45fr repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-top: 12px;
        }

        .field {
            display: grid;
            gap: 6px;
        }
