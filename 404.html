<head>

    <title>Page Not Found | TrustMyRecord</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            background:
                radial-gradient(circle at 10% 0%, rgba(45, 212, 191, 0.12), transparent 30%),
                linear-gradient(180deg, #08111d, #0d1726);
            color: #eef4fb;
            font-family: 'Inter', sans-serif;
        }

        .redirect-shell {
            width: min(560px, 100%);
            padding: 28px;
            border-radius: 22px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.015)),
                rgba(11, 20, 34, 0.94);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
            text-align: center;
        }

        .redirect-kicker {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid rgba(45, 212, 191, 0.24);
            background: rgba(45, 212, 191, 0.1);
            color: #d7fffb;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        h1 {
            margin: 18px 0 10px;
            font-family: 'Barlow', sans-serif;
            font-size: clamp(2rem, 6vw, 2.8rem);
            line-height: 0.96;
            letter-spacing: -0.03em;
        }

        p {
            margin: 0;
            color: #97a8bc;
            font-size: 0.96rem;
            line-height: 1.65;
        }
    </style>
    <script>
        // Route known legacy SPA-style paths directly to the real multipage site.
        var path = window.location.pathname.replace(/^\/+|\/+$/g, '');
        var query = window.location.search;
        var hash = window.location.hash;
        var legacyRouteMap = {
            '': '',
            'home': '',
            'picks': 'picks/',
            'mypicks': 'mypicks/',
            'my-record': 'my-record/',
            'promos': 'promos/',
            'consensus': 'consensus/',
            'leaderboards': 'leaderboards/',
            'live': 'live/',
            'marketplace': 'marketplace/',
            'groups': 'groups/',
            'messages': 'messages/',
            'profile': 'profile/',
            'premium': 'premium/',
            'forums': 'forums/',
            'notifications': 'notifications/',
            'polls-trivia': 'polls-trivia/',
            'polls': 'polls/',
            'predictions': 'predictions/'
        };

        var mappedRoute = legacyRouteMap[path];
        if (mappedRoute) {
            window.location.replace(window.location.origin + '/' + mappedRoute);
        } else {
            // Preserve unknown paths for index-level recovery when needed.
            window.location.replace(
                window.location.origin + '/?p=' + encodeURIComponent(path) +
                (query ? '&q=' + encodeURIComponent(query.slice(1)) : '') +
                hash
            );
        }
    </script>
</head>
<body>
    <div class="redirect-shell">
        <div class="redirect-kicker">Page redirect</div>
        <h1>Taking you back into TrustMyRecord.</h1>
        <p>If the automatic redirect stalls, go to <a href="/">the homepage</a>.</p>
    </div>
</body>
</html>
