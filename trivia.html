<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Trivia - TrustMyRecord</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-card: rgba(15, 23, 42, 0.8);
            --bg-card-solid: #1e293b;
            --glass-border: rgba(14, 165, 233, 0.15);
            --primary: #0ea5e9;
            --primary-dim: rgba(14, 165, 233, 0.15);
            --primary-glow: rgba(14, 165, 233, 0.4);
            --warning: #fbbf24;
            --success: #00c853;
            --danger: #ff4444;
            --text-primary: #e2e8f0;
            --text-muted: #64748b;
            --text-dim: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background effects */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(14, 165, 233, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== NAV BAR ===== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 18px;
        }
        .navbar-brand .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 900;
            color: #000;
        }
        .navbar-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .navbar-links a:hover, .navbar-links a.active {
            color: var(--primary);
            background: var(--primary-dim);
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* ===== PAGE HEADER ===== */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .page-header p {
            color: var(--text-muted);
            font-size: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 24px 0 40px;
            flex-wrap: wrap;
        }
        .stat-box {
            text-align: center;
        }
        .stat-box .stat-value {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-box .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* ===== VIEW TABS ===== */
        .view-tabs {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 32px;
            background: var(--bg-card-solid);
            border-radius: 12px;
            padding: 4px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .view-tab {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .view-tab:hover { color: var(--text-primary); }
        .view-tab.active {
            background: var(--primary);
            color: #000;
        }

        /* ===== VIEW PANELS ===== */
        .view-panel { display: none; }
        .view-panel.active { display: block; }

        /* ===== CATEGORY CARDS ===== */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .category-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .category-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), #a78bfa);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .category-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(14, 165, 233, 0.15);
        }
        .category-card:hover::before { opacity: 1; }
        .category-card .card-icon {
            font-size: 40px;
            margin-bottom: 16px;
        }
        .category-card h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .category-card .card-desc {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .category-card .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-card .q-count {
            font-size: 13px;
            color: var(--text-dim);
        }
        .category-card .q-count strong {
            color: var(--primary);
        }
        .category-card .play-btn {
            background: var(--primary-dim);
            color: var(--primary);
            border: 1px solid rgba(14, 165, 233, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* ===== QUIZ MODAL ===== */
        .quiz-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .quiz-overlay.active { display: flex; }

        .quiz-container {
            background: var(--bg-card-solid);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 100%;
            max-width: 640px;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Quiz header */
        .quiz-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--glass-border);
        }
        .quiz-timer {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            min-width: 60px;
            text-align: center;
        }
        .quiz-timer.warning { color: #ff9800; }
        .quiz-timer.danger { color: var(--danger); animation: pulse 0.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        .quiz-progress-wrap { flex: 1; margin: 0 20px; }
        .quiz-progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .quiz-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a78bfa);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .quiz-progress-text {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }
        .quiz-close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }
        .quiz-close-btn:hover { color: var(--danger); }

        /* Cheat warning */
        .cheat-banner {
            background: rgba(255, 68, 68, 0.12);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: var(--danger);
            text-align: center;
            padding: 10px;
            font-weight: 700;
            font-size: 13px;
            display: none;
        }
        .cheat-banner.visible { display: block; }

        /* Quiz body */
        .quiz-body { padding: 28px 24px; }
        .quiz-question-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
            line-height: 1.4;
            text-align: center;
        }

        /* Answer options */
        .quiz-options { display: flex; flex-direction: column; gap: 10px; }
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .quiz-option:hover {
            border-color: rgba(14, 165, 233, 0.4);
            background: rgba(14, 165, 233, 0.05);
        }
        .quiz-option.selected {
            border-color: var(--primary);
            background: rgba(14, 165, 233, 0.1);
        }
        .quiz-option.correct {
            background: rgba(0, 200, 83, 0.15) !important;
            border-color: var(--success) !important;
        }
        .quiz-option.wrong {
            background: rgba(255, 68, 68, 0.15) !important;
            border-color: var(--danger) !important;
        }
        .quiz-option.disabled { pointer-events: none; opacity: 0.7; }
        .quiz-option.disabled.correct { opacity: 1; }
        .option-letter {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            font-weight: 700;
            font-size: 14px;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .quiz-option.selected .option-letter {
            background: var(--primary);
            color: #000;
        }
        .option-text { font-size: 15px; color: var(--text-primary); }

        /* Submit button */
        .quiz-submit-btn {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #0284c7);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .quiz-submit-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .quiz-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Quiz live stats */
        .quiz-live-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .quiz-live-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ===== RESULTS SCREEN (inside quiz modal) ===== */
        .results-screen { text-align: center; padding: 40px 24px; }
        .results-screen .result-emoji { font-size: 64px; margin-bottom: 16px; }
        .results-screen h2 { font-size: 24px; margin-bottom: 8px; color: var(--text-primary); }
        .results-screen .result-big-score {
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .results-screen .result-pct {
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        .results-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .results-detail-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
        }
        .results-detail-box .rdl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .results-detail-box .rdv { font-size: 20px; font-weight: 700; color: var(--warning); }
        .cheat-penalty-box {
            background: rgba(255, 68, 68, 0.08);
            border: 1px solid rgba(255, 68, 68, 0.25);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: var(--danger);
            font-weight: 600;
            font-size: 14px;
        }
        .results-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .results-actions button {
            padding: 12px 32px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary-action {
            background: linear-gradient(135deg, var(--primary), #0284c7);
            color: #000;
        }
        .btn-secondary-action {
            background: var(--bg-card-solid);
            color: var(--text-primary);
            border: 1px solid var(--glass-border) !important;
        }

        /* ===== LEADERBOARD & HISTORY PANELS ===== */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .glass-card h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .history-row, .lb-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .history-row:last-child, .lb-row:last-child { border-bottom: none; }
        .row-left { display: flex; align-items: center; gap: 12px; }
        .row-left .icon { font-size: 20px; }
        .row-left .info-primary { font-weight: 600; color: var(--text-primary); font-size: 14px; }
        .row-left .info-secondary { color: var(--text-muted); font-size: 12px; }
        .row-right { text-align: right; }
        .row-right .score { font-weight: 700; font-size: 15px; }
        .row-right .pts { color: var(--warning); font-size: 12px; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state .big-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }

        /* ===== CREATE QUESTION PANEL ===== */
        .create-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 28px;
        }
        .create-card h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .create-card .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-textarea { min-height: 80px; resize: vertical; }
        .form-select option { background: var(--bg-card-solid); color: var(--text-primary); }

        .answer-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .answer-row .form-input { flex: 1; }
        .correct-radio-btn {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            border: 2px solid var(--glass-border);
            background: transparent;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .correct-radio-btn:hover { border-color: var(--success); color: var(--success); }
        .correct-radio-btn.selected {
            background: var(--success);
            border-color: var(--success);
            color: #000;
        }
        .form-error {
            color: var(--danger);
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
            display: none;
        }
        .form-submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #0284c7);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .form-submit-btn:hover { filter: brightness(1.1); }
        .form-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .login-prompt {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
        }
        .login-prompt a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* Custom questions list */
        .custom-q-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }
        .custom-q-item .cq-question { font-weight: 600; color: var(--text-primary); margin-bottom: 6px; font-size: 14px; }
        .custom-q-item .cq-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; flex-wrap: wrap; }
        .custom-q-item .cq-delete {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            padding: 0;
            margin-left: auto;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .page-header h1 { font-size: 1.8rem; }
            .stats-bar { gap: 20px; }
            .categories-grid { grid-template-columns: 1fr; }
            .quiz-container { border-radius: 16px; }
            .quiz-body { padding: 20px 16px; }
            .quiz-question-text { font-size: 17px; }
            .navbar-links a { padding: 8px 10px; font-size: 13px; }
            .results-detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ===== NAV BAR ===== -->
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">TRUST<span>MY</span>RECORD</a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="challenges.html" class="nav-link active">Arena</a>
                <a href="forum.html" class="nav-link">Forum</a>
                <a href="activity.html" class="nav-link">Activity</a>
                <a href="profile.html" class="nav-link">My Profile</a>
            </nav>
        </div>
    </header>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-container">

    <!-- Page Header -->
    <div class="page-header">
        <h1>SPORTS TRIVIA</h1>
        <p>Test your knowledge across NFL, NBA, MLB, NHL, and Soccer. Climb the leaderboard.</p>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-box">
            <div class="stat-value" id="statTotalPlayed">0</div>
            <div class="stat-label">Quizzes Taken</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="statBestScore">--</div>
            <div class="stat-label">Best Score</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="statTotalPoints">0</div>
            <div class="stat-label">Total Points</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="statAccuracy">--</div>
            <div class="stat-label">Avg Accuracy</div>
        </div>
    </div>

    <!-- View Tabs -->
    <div class="view-tabs">
        <button class="view-tab active" onclick="switchView('play')">Play</button>
        <button class="view-tab" onclick="switchView('leaderboard')">Leaderboard</button>
        <button class="view-tab" onclick="switchView('history')">History</button>
        <button class="view-tab" onclick="switchView('create')">Create</button>
    </div>

    <!-- ===== PLAY VIEW ===== -->
    <div class="view-panel active" id="view-play">
        <div class="categories-grid" id="categoriesGrid"></div>
    </div>

    <!-- ===== LEADERBOARD VIEW ===== -->
    <div class="view-panel" id="view-leaderboard">
        <div class="glass-card">
            <h2>&#127942; All-Time Leaderboard</h2>
            <div id="leaderboardList"></div>
        </div>
    </div>

    <!-- ===== HISTORY VIEW ===== -->
    <div class="view-panel" id="view-history">
        <div class="glass-card">
            <h2>&#128203; Recent Results</h2>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- ===== CREATE VIEW ===== -->
    <div class="view-panel" id="view-create">
        <div class="create-card" id="createQuestionCard"></div>
        <div class="glass-card" style="margin-top:24px;" id="customQuestionsCard">
            <h2>&#128221; Your Custom Questions</h2>
            <div id="customQuestionsList"></div>
        </div>
    </div>

</div><!-- end main-container -->

<!-- ===== QUIZ OVERLAY ===== -->
<div class="quiz-overlay" id="quizOverlay">
    <div class="quiz-container" id="quizContainer">
        <!-- Dynamically populated -->
    </div>
</div>

<script src="static/js/config.js?v=20260318"></script>
<script src="static/js/backend-api.js?v=20260318"></script>
<script src="static/js/notifications.js?v=20260318"></script>
<script>
// ================================================================
// AUTH HELPERS
// ================================================================
function isLoggedIn() {
    return api && api.isLoggedIn();
}
function getCurrentUsername() {
    try {
        var u = JSON.parse(localStorage.getItem('tmr_current_user') || 'null');
        if (u && u.username) return u.username;
    } catch(e) {}
    return null;
}

// ================================================================
// QUIZ STATE
// ================================================================
var currentSession = null;
var currentQuestion = null;
var currentQuizProgress = 0;
var currentQuizTotal = 10;
var currentQuizScore = 0;
var currentQuizCategory = '';
var currentCategorySlug = '';
var selectedAnswerId = null;
var quizActive = false;
var answerLocked = false;
var cheatCount = 0;
var timerInterval = null;
var timeLeft = 20;
var quizStartTime = null;
var questionTimes = [];
var totalPointsEarned = 0;
var backendCategories = [];

// ================================================================
// UTILITY
// ================================================================
function escapeHtml(str) {
    var d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
}

// ================================================================
// VIEW SWITCHING
// ================================================================
function switchView(view) {
    document.querySelectorAll('.view-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.view-panel').forEach(function(p) { p.classList.remove('active'); });
    event.target.classList.add('active');
    document.getElementById('view-' + view).classList.add('active');

    if (view === 'leaderboard') renderLeaderboard();
    if (view === 'history') renderHistory();
    if (view === 'create') renderCreateView();
}

// ================================================================
// CATEGORY CARDS (from backend API)
// ================================================================
var categoryIcons = {
    'nfl': '\uD83C\uDFC8', 'nba': '\uD83C\uDFC0', 'mlb': '\u26BE',
    'nhl': '\uD83C\uDFD2', 'soccer': '\u26BD', 'mixed': '\uD83C\uDFB2', 'general': '\uD83C\uDFB2'
};

async function loadCategories() {
    var grid = document.getElementById('categoriesGrid');
    grid.innerHTML = '<div class="empty-state"><p>Loading categories...</p></div>';
    try {
        await api.ready;
        var data = await api.request('/trivia/categories');
        backendCategories = data.categories || data || [];
        renderCategories();
    } catch(e) {
        console.error('Failed to load categories:', e);
        grid.innerHTML = '<div class="empty-state"><div class="big-icon">&#9888;</div><p>Could not load trivia categories. Is the backend running?</p></div>';
    }
}

function renderCategories() {
    var grid = document.getElementById('categoriesGrid');
    if (!backendCategories.length) {
        grid.innerHTML = '<div class="empty-state"><div class="big-icon">&#127942;</div><p>No categories available yet.</p></div>';
        return;
    }
    var html = '';
    backendCategories.forEach(function(cat) {
        var slug = cat.slug || cat.name.toLowerCase();
        var icon = categoryIcons[slug] || '\uD83C\uDFB2';
        var qCount = cat.question_count || cat.questionCount || 0;
        var desc = cat.description || 'Test your ' + cat.name + ' knowledge';
        html += '<div class="category-card" onclick="startQuiz(\'' + escapeHtml(slug) + '\')">' +
            '<div class="card-icon">' + icon + '</div>' +
            '<h3>' + escapeHtml(cat.name) + '</h3>' +
            '<div class="card-desc">' + escapeHtml(desc) + '</div>' +
            '<div class="card-meta">' +
            '<span class="q-count"><strong>' + qCount + '</strong> questions</span>' +
            '<span class="play-btn">PLAY</span>' +
            '</div></div>';
    });
    grid.innerHTML = html;
}

// ================================================================
// START QUIZ (session-based via backend)
// ================================================================
async function startQuiz(categorySlug) {
    currentCategorySlug = categorySlug;
    currentQuizCategory = categorySlug.toUpperCase();
    currentQuizProgress = 0;
    currentQuizScore = 0;
    currentQuizTotal = 10;
    selectedAnswerId = null;
    quizActive = true;
    answerLocked = false;
    cheatCount = 0;
    quizStartTime = Date.now();
    questionTimes = [];
    totalPointsEarned = 0;
    currentSession = null;
    currentQuestion = null;

    var overlay = document.getElementById('quizOverlay');
    overlay.classList.add('active');

    var container = document.getElementById('quizContainer');
    container.innerHTML = '<div class="quiz-body" style="text-align:center;padding:60px 24px;">' +
        '<div style="font-size:40px;margin-bottom:16px;">&#9203;</div>' +
        '<p style="color:var(--text-muted);">Starting quiz...</p></div>';

    try {
        await api.ready;
        var sessionData = await api.request('/trivia/sessions', {
            method: 'POST',
            body: { category_slug: categorySlug, question_count: 10 }
        });
        currentSession = sessionData.session || sessionData;
        currentQuizTotal = currentSession.question_count || currentSession.questionCount || 10;
        await loadNextQuestion();
    } catch(e) {
        console.error('Failed to start quiz session:', e);
        container.innerHTML = '<div class="quiz-body" style="text-align:center;padding:60px 24px;">' +
            '<div style="font-size:40px;margin-bottom:16px;">&#9888;</div>' +
            '<h2 style="margin-bottom:8px;">Could Not Start Quiz</h2>' +
            '<p style="color:var(--text-muted);margin-bottom:20px;">' + escapeHtml(e.message || 'Backend error') + '</p>' +
            '<button class="btn-primary-action" onclick="closeQuiz()">Close</button></div>';
    }
}

async function loadNextQuestion() {
    try {
        var sessionId = currentSession.id || currentSession.session_id;
        var data = await api.request('/trivia/sessions/' + sessionId + '/next');

        if (data.complete || data.session_complete) {
            finishQuiz(data);
            return;
        }

        currentQuestion = data.question || data;
        var answers = data.answers || currentQuestion.answers || [];
        var timeLimit = data.time_limit || currentQuestion.time_limit || 20;

        renderQuizQuestion(currentQuestion, answers, timeLimit);
    } catch(e) {
        console.error('Failed to load next question:', e);
        if (e.status === 400 || e.status === 404) {
            finishQuiz({});
        } else {
            var container = document.getElementById('quizContainer');
            container.innerHTML = '<div class="quiz-body" style="text-align:center;padding:60px 24px;">' +
                '<div style="font-size:40px;margin-bottom:16px;">&#9888;</div>' +
                '<p style="color:var(--text-muted);">' + escapeHtml(e.message || 'Error loading question') + '</p>' +
                '<button class="btn-primary-action" onclick="closeQuiz()">Close</button></div>';
        }
    }
}

function closeQuiz() {
    quizActive = false;
    clearInterval(timerInterval);
    timerInterval = null;
    document.getElementById('quizOverlay').classList.remove('active');
}

// ================================================================
// RENDER QUIZ QUESTION
// ================================================================
function renderQuizQuestion(question, answers, timeLimit) {
    answerLocked = false;
    selectedAnswerId = null;
    var total = currentQuizTotal;
    var pct = ((currentQuizProgress / total) * 100).toFixed(0);
    var wrongCount = currentQuizProgress - currentQuizScore;

    var questionText = question.question_text || question.question || question.text || '';

    var letters = ['A', 'B', 'C', 'D'];
    var optionsHtml = '';
    answers.forEach(function(ans, idx) {
        var ansText = ans.answer_text || ans.text || ans;
        var ansId = ans.id || ans.answer_id || idx;
        optionsHtml += '<div class="quiz-option" data-answer-id="' + ansId + '" data-idx="' + idx + '" onclick="selectQuizAnswer(' + idx + ', ' + ansId + ')">' +
            '<span class="option-letter">' + (letters[idx] || String.fromCharCode(65 + idx)) + '</span>' +
            '<span class="option-text">' + escapeHtml(ansText) + '</span></div>';
    });

    var container = document.getElementById('quizContainer');
    container.innerHTML =
        '<div class="quiz-top-bar">' +
            '<div class="quiz-timer" id="quizTimer">' + timeLimit + 's</div>' +
            '<div class="quiz-progress-wrap">' +
                '<div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:' + pct + '%"></div></div>' +
                '<div class="quiz-progress-text">Question ' + (currentQuizProgress + 1) + ' of ' + total + '</div>' +
            '</div>' +
            '<button class="quiz-close-btn" onclick="closeQuiz()">&times;</button>' +
        '</div>' +
        '<div class="cheat-banner" id="cheatBanner"></div>' +
        '<div class="quiz-body">' +
            '<div class="quiz-question-text">' + escapeHtml(questionText) + '</div>' +
            '<div class="quiz-options" id="quizOptions">' + optionsHtml + '</div>' +
            '<button class="quiz-submit-btn" id="submitBtn" onclick="submitQuizAnswer()">SUBMIT ANSWER</button>' +
            '<div class="quiz-live-stats">' +
                '<div class="quiz-live-stat">&#9989; ' + currentQuizScore + ' Correct</div>' +
                '<div class="quiz-live-stat">&#10060; ' + wrongCount + ' Wrong</div>' +
                '<div class="quiz-live-stat">&#127919; ' + totalPointsEarned + ' pts</div>' +
                (cheatCount > 0 ? '<div class="quiz-live-stat" style="color:var(--danger);">&#9888; ' + cheatCount + ' Flags</div>' : '') +
            '</div>' +
        '</div>';

    startTimer(timeLimit);
}

// ================================================================
// TIMER
// ================================================================
function startTimer(limit) {
    clearInterval(timerInterval);
    timeLeft = limit || 20;
    updateTimerDisplay();
    timerInterval = setInterval(function() {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timerInterval = null;
            handleTimeUp();
        }
    }, 1000);
}

function updateTimerDisplay() {
    var el = document.getElementById('quizTimer');
    if (!el) return;
    el.textContent = timeLeft + 's';
    el.className = 'quiz-timer';
    if (timeLeft <= 5) el.classList.add('danger');
    else if (timeLeft <= 10) el.classList.add('warning');
}

async function handleTimeUp() {
    if (answerLocked) return;
    answerLocked = true;

    questionTimes.push({ correct: false, timeRemaining: 0 });

    try {
        var sessionId = currentSession.id || currentSession.session_id;
        var result = await api.request('/trivia/sessions/' + sessionId + '/answer', {
            method: 'POST',
            body: { answer_id: null, timed_out: true }
        });
        showAnswerResult(result, true);
    } catch(e) {
        var btn = document.getElementById('submitBtn');
        if (btn) {
            btn.innerHTML = '&#8987; TIME UP';
            btn.style.background = 'rgba(255,152,0,0.3)';
            btn.style.color = '#ff9800';
            btn.disabled = true;
        }
        currentQuizProgress++;
        setTimeout(function() { loadNextQuestion(); }, 1300);
    }
}

// ================================================================
// ANTI-CHEAT
// ================================================================
document.addEventListener('visibilitychange', function() {
    if (document.hidden && quizActive && !answerLocked) handleCheat();
});
window.addEventListener('blur', function() {
    if (quizActive && !answerLocked && !document.hidden) handleCheat();
});

async function handleCheat() {
    if (!quizActive || answerLocked) return;
    cheatCount++;
    answerLocked = true;
    clearInterval(timerInterval);
    timerInterval = null;

    questionTimes.push({ correct: false, timeRemaining: 0 });

    var banner = document.getElementById('cheatBanner');
    if (banner) {
        banner.innerHTML = '&#9888; TAB SWITCH DETECTED - Answer marked WRONG (Violation #' + cheatCount + ')';
        banner.classList.add('visible');
    }

    var options = document.querySelectorAll('.quiz-option');
    options.forEach(function(opt) { opt.classList.add('disabled'); });

    var btn = document.getElementById('submitBtn');
    if (btn) {
        btn.innerHTML = '&#9888; CHEATING DETECTED';
        btn.style.background = 'rgba(255,68,68,0.3)';
        btn.style.color = '#ff4444';
        btn.disabled = true;
    }

    try {
        var sessionId = currentSession.id || currentSession.session_id;
        await api.request('/trivia/sessions/' + sessionId + '/answer', {
            method: 'POST',
            body: { answer_id: null, timed_out: true }
        });
    } catch(e) { /* ignore */ }

    currentQuizProgress++;
    setTimeout(function() { loadNextQuestion(); }, 1500);
}

// ================================================================
// SELECT & SUBMIT ANSWER
// ================================================================
function selectQuizAnswer(idx, answerId) {
    if (answerLocked) return;
    selectedAnswerId = answerId;
    document.querySelectorAll('.quiz-option').forEach(function(opt) { opt.classList.remove('selected'); });
    document.querySelectorAll('.quiz-option')[idx].classList.add('selected');
}

async function submitQuizAnswer() {
    if (answerLocked || selectedAnswerId === null) {
        if (selectedAnswerId === null) {
            var btn = document.getElementById('submitBtn');
            btn.textContent = 'SELECT AN ANSWER FIRST';
            btn.style.background = 'rgba(255,68,68,0.3)';
            btn.style.color = '#ff4444';
            setTimeout(function() {
                btn.textContent = 'SUBMIT ANSWER';
                btn.style.background = '';
                btn.style.color = '';
            }, 1200);
        }
        return;
    }

    answerLocked = true;
    clearInterval(timerInterval);
    timerInterval = null;

    var btn = document.getElementById('submitBtn');
    btn.textContent = 'SUBMITTING...';
    btn.disabled = true;

    try {
        var sessionId = currentSession.id || currentSession.session_id;
        var result = await api.request('/trivia/sessions/' + sessionId + '/answer', {
            method: 'POST',
            body: { answer_id: selectedAnswerId }
        });
        showAnswerResult(result, false);
    } catch(e) {
        console.error('Failed to submit answer:', e);
        btn.innerHTML = '&#9888; Error submitting answer';
        btn.style.background = 'rgba(255,68,68,0.3)';
        btn.style.color = '#ff4444';
        currentQuizProgress++;
        setTimeout(function() { loadNextQuestion(); }, 1500);
    }
}

function showAnswerResult(result, wasTimeout) {
    var isCorrect = result.correct || false;
    var pointsEarned = result.points_earned || result.pointsEarned || 0;
    var correctAnswer = result.correct_answer || result.correctAnswer || {};
    var correctAnswerText = correctAnswer.answer_text || correctAnswer.text || (typeof correctAnswer === 'string' ? correctAnswer : '');

    questionTimes.push({ correct: isCorrect, timeRemaining: timeLeft, pointsEarned: pointsEarned });

    if (isCorrect) {
        currentQuizScore++;
        totalPointsEarned += pointsEarned;
    }

    var options = document.querySelectorAll('.quiz-option');
    options.forEach(function(opt) {
        opt.classList.add('disabled');
        var ansId = parseInt(opt.getAttribute('data-answer-id'));
        var correctId = correctAnswer.id || correctAnswer.answer_id;
        if (correctId && ansId === correctId) opt.classList.add('correct');
        if (!isCorrect && ansId === selectedAnswerId) opt.classList.add('wrong');
    });

    var btn = document.getElementById('submitBtn');
    if (wasTimeout) {
        btn.innerHTML = '&#8987; TIME UP' + (correctAnswerText ? ' - ' + escapeHtml(correctAnswerText) : '');
        btn.style.background = 'rgba(255,152,0,0.3)';
        btn.style.color = '#ff9800';
    } else if (isCorrect) {
        var speedBonus = pointsEarned > 10 ? ' (+' + (pointsEarned - 10) + ' speed bonus)' : '';
        btn.innerHTML = '&#9989; CORRECT! +' + pointsEarned + ' pts' + speedBonus;
        btn.style.background = 'rgba(0,200,83,0.3)';
        btn.style.color = '#00c853';
    } else {
        btn.innerHTML = '&#10060; Wrong' + (correctAnswerText ? ' - ' + escapeHtml(correctAnswerText) : '');
        btn.style.background = 'rgba(255,68,68,0.3)';
        btn.style.color = '#ff4444';
    }
    btn.disabled = true;

    currentQuizProgress++;
    setTimeout(function() { loadNextQuestion(); }, 1300);
}

// ================================================================
// FINISH QUIZ
// ================================================================
function finishQuiz(sessionResult) {
    quizActive = false;
    clearInterval(timerInterval);
    timerInterval = null;

    var total = currentQuizTotal;
    var percentage = total > 0 ? (currentQuizScore / total) * 100 : 0;
    var elapsed = Math.round((Date.now() - quizStartTime) / 1000);
    var minutes = Math.floor(elapsed / 60);
    var seconds = elapsed % 60;
    var timeStr = (minutes > 0 ? minutes + 'm ' : '') + seconds + 's';

    var points = sessionResult && sessionResult.total_points != null ? sessionResult.total_points : totalPointsEarned;
    if (sessionResult && sessionResult.score != null) {
        currentQuizScore = sessionResult.score;
        percentage = total > 0 ? (currentQuizScore / total) * 100 : 0;
    }

    var cheatPenalty = cheatCount > 0;
    var emoji = cheatPenalty ? '&#9888;' : (percentage >= 80 ? '&#127942;' : percentage >= 60 ? '&#127881;' : percentage >= 40 ? '&#128077;' : '&#128218;');
    var cheatHtml = cheatPenalty
        ? '<div class="cheat-penalty-box">&#9888; ' + cheatCount + ' tab-switch violation' + (cheatCount > 1 ? 's' : '') + ' detected.</div>'
        : '';

    var container = document.getElementById('quizContainer');
    container.innerHTML =
        '<div class="results-screen">' +
            '<div class="result-emoji">' + emoji + '</div>' +
            '<h2>Quiz Complete!</h2>' +
            '<div class="result-big-score">' + currentQuizScore + '/' + total + '</div>' +
            '<div class="result-pct">' + percentage.toFixed(0) + '% correct</div>' +
            cheatHtml +
            '<div class="results-detail-grid">' +
                '<div class="results-detail-box"><div class="rdl">Points Earned</div><div class="rdv">+' + points + '</div></div>' +
                '<div class="results-detail-box"><div class="rdl">Time Taken</div><div class="rdv">' + timeStr + '</div></div>' +
                '<div class="results-detail-box"><div class="rdl">Category</div><div class="rdv" style="font-size:16px;">' + escapeHtml(currentQuizCategory) + '</div></div>' +
                '<div class="results-detail-box"><div class="rdl">Avg Speed</div><div class="rdv" style="font-size:16px;">' + (total > 0 ? (elapsed / total).toFixed(1) : '0') + 's/Q</div></div>' +
            '</div>' +
            '<div class="results-actions">' +
                '<button class="btn-primary-action" onclick="closeQuiz()">Done</button>' +
                '<button class="btn-secondary-action" onclick="closeQuiz(); startQuiz(\'' + escapeHtml(currentCategorySlug) + '\')">Play Again</button>' +
                '<button class="btn-secondary-action" onclick="closeQuiz(); switchViewDirect(\'leaderboard\')">Leaderboard</button>' +
            '</div>' +
        '</div>';

    loadUserStats();
}

function switchViewDirect(view) {
    document.querySelectorAll('.view-tab').forEach(function(t, i) {
        t.classList.remove('active');
        if ((view === 'play' && i === 0) || (view === 'leaderboard' && i === 1) ||
            (view === 'history' && i === 2) || (view === 'create' && i === 3)) {
            t.classList.add('active');
        }
    });
    document.querySelectorAll('.view-panel').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('view-' + view).classList.add('active');
    if (view === 'leaderboard') renderLeaderboard();
    if (view === 'history') renderHistory();
    if (view === 'create') renderCreateView();
}

// ================================================================
// LEADERBOARD (from backend API)
// ================================================================
async function renderLeaderboard() {
    var container = document.getElementById('leaderboardList');
    container.innerHTML = '<div class="empty-state"><p>Loading leaderboard...</p></div>';

    try {
        await api.ready;
        var data = await api.request('/trivia/leaderboard');
        var leaderboard = data.leaderboard || data.rankings || data || [];

        if (!leaderboard.length) {
            container.innerHTML = '<div class="empty-state"><div class="big-icon">&#127942;</div><p>No scores yet. Play a quiz to get on the leaderboard!</p></div>';
            return;
        }

        var medals = ['\uD83E\uDD47', '\uD83E\uDD48', '\uD83E\uDD49'];
        var html = '';
        leaderboard.forEach(function(entry, idx) {
            var username = entry.username || entry.user || 'Unknown';
            var totalPoints = entry.total_points || entry.totalPoints || entry.points || 0;
            var quizzes = entry.quizzes_played || entry.quizzesPlayed || entry.games || 0;
            var accuracy = entry.accuracy || entry.correct_percentage || 0;
            if (typeof accuracy === 'number' && accuracy > 0 && accuracy <= 1) accuracy = Math.round(accuracy * 100);

            html += '<div class="lb-row">' +
                '<div class="row-left">' +
                    '<span class="icon" style="font-size:18px;width:28px;text-align:center;">' + (idx < 3 ? medals[idx] : '#' + (idx + 1)) + '</span>' +
                    '<div><div class="info-primary">@' + escapeHtml(username) + '</div>' +
                    '<div class="info-secondary">' + quizzes + ' quizzes' + (accuracy ? ' &middot; ' + Math.round(accuracy) + '% accuracy' : '') + '</div></div>' +
                '</div>' +
                '<div class="row-right"><div class="pts" style="font-size:15px;font-weight:700;">' + totalPoints + ' pts</div></div>' +
            '</div>';
        });
        container.innerHTML = html;
    } catch(e) {
        console.error('Failed to load leaderboard:', e);
        container.innerHTML = '<div class="empty-state"><div class="big-icon">&#9888;</div><p>Could not load leaderboard.</p></div>';
    }
}

// ================================================================
// HISTORY (from backend user stats)
// ================================================================
async function renderHistory() {
    var container = document.getElementById('historyList');
    var username = getCurrentUsername();

    if (!username) {
        container.innerHTML = '<div class="empty-state"><div class="big-icon">&#128203;</div><p>Log in to see your quiz history.</p></div>';
        return;
    }

    container.innerHTML = '<div class="empty-state"><p>Loading history...</p></div>';

    try {
        await api.ready;
        var data = await api.request('/trivia/users/' + encodeURIComponent(username) + '/stats');
        var sessions = data.recent_sessions || data.recentSessions || data.history || [];

        if (!sessions.length) {
            container.innerHTML = '<div class="empty-state"><div class="big-icon">&#128203;</div><p>No quiz history yet. Play your first quiz!</p></div>';
            return;
        }

        var catIcons = { nfl: '\uD83C\uDFC8', nba: '\uD83C\uDFC0', mlb: '\u26BE', nhl: '\uD83C\uDFD2', soccer: '\u26BD', mixed: '\uD83C\uDFB2', general: '\uD83C\uDFB2' };
        var html = '';
        sessions.forEach(function(s) {
            var catSlug = (s.category_slug || s.category || 'mixed').toLowerCase();
            var icon = catIcons[catSlug] || '\uD83C\uDFB2';
            var score = s.score || s.correct_count || 0;
            var total = s.question_count || s.total || 10;
            var pct = total > 0 ? (score / total) * 100 : 0;
            var pctColor = pct >= 80 ? '#00c853' : pct >= 50 ? '#ff9800' : '#ff4444';
            var pts = s.total_points || s.points || 0;
            var dateStr = s.completed_at || s.created_at || '';
            if (dateStr) { try { dateStr = new Date(dateStr).toLocaleDateString(); } catch(e) {} }
            var timeStr = s.time_taken ? (s.time_taken < 60 ? s.time_taken + 's' : Math.floor(s.time_taken / 60) + 'm ' + (s.time_taken % 60) + 's') : '';

            html += '<div class="history-row">' +
                '<div class="row-left">' +
                    '<span class="icon">' + icon + '</span>' +
                    '<div><div class="info-primary">' + escapeHtml((s.category_name || catSlug).toUpperCase()) + ' Quiz</div>' +
                    '<div class="info-secondary">' + dateStr + (timeStr ? ' &middot; ' + timeStr : '') + '</div></div>' +
                '</div>' +
                '<div class="row-right">' +
                    '<div class="score" style="color:' + pctColor + ';">' + score + '/' + total + '</div>' +
                    '<div class="pts">+' + pts + ' pts</div>' +
                '</div></div>';
        });
        container.innerHTML = html;
    } catch(e) {
        console.error('Failed to load history:', e);
        container.innerHTML = '<div class="empty-state"><div class="big-icon">&#9888;</div><p>Could not load quiz history.</p></div>';
    }
}

// ================================================================
// CREATE QUESTION VIEW (localStorage for user-submitted)
// ================================================================
function renderCreateView() {
    var card = document.getElementById('createQuestionCard');

    if (!isLoggedIn()) {
        card.innerHTML = '<div class="login-prompt">' +
            '<div style="font-size:48px;margin-bottom:16px;opacity:0.4;">&#128274;</div>' +
            '<h2 style="margin-bottom:8px;">Login Required</h2>' +
            '<p>You need to be logged in to create custom trivia questions.</p>' +
            '<p><a href="index.html">Go to homepage to log in</a></p></div>';
        renderCustomQuestionsList();
        return;
    }

    card.innerHTML =
        '<h2>&#9998; Create a Trivia Question</h2>' +
        '<div class="subtitle">Submit a custom question. It will be saved locally for now.</div>' +
        '<form id="createQuestionForm" onsubmit="handleCreateQuestion(event)">' +
            '<div class="form-group">' +
                '<label>Category</label>' +
                '<select class="form-select" id="cqCategory">' +
                    '<option value="NFL">NFL</option>' +
                    '<option value="NBA">NBA</option>' +
                    '<option value="MLB">MLB</option>' +
                    '<option value="NHL">NHL</option>' +
                    '<option value="Soccer">Soccer</option>' +
                    '<option value="Mixed">Mixed / General</option>' +
                '</select>' +
            '</div>' +
            '<div class="form-group">' +
                '<label>Question</label>' +
                '<textarea class="form-textarea" id="cqQuestion" placeholder="Enter your trivia question..." maxlength="300"></textarea>' +
            '</div>' +
            '<div class="form-group">' +
                '<label>Answers (click the letter button to mark the correct one)</label>' +
                '<div class="answer-row">' +
                    '<button type="button" class="correct-radio-btn" id="cqCorrectBtn0" onclick="setCorrectAnswer(0)">A</button>' +
                    '<input type="text" class="form-input" id="cqAnswer0" placeholder="Answer A" maxlength="120">' +
                '</div>' +
                '<div class="answer-row">' +
                    '<button type="button" class="correct-radio-btn" id="cqCorrectBtn1" onclick="setCorrectAnswer(1)">B</button>' +
                    '<input type="text" class="form-input" id="cqAnswer1" placeholder="Answer B" maxlength="120">' +
                '</div>' +
                '<div class="answer-row">' +
                    '<button type="button" class="correct-radio-btn" id="cqCorrectBtn2" onclick="setCorrectAnswer(2)">C</button>' +
                    '<input type="text" class="form-input" id="cqAnswer2" placeholder="Answer C" maxlength="120">' +
                '</div>' +
                '<div class="answer-row">' +
                    '<button type="button" class="correct-radio-btn" id="cqCorrectBtn3" onclick="setCorrectAnswer(3)">D</button>' +
                    '<input type="text" class="form-input" id="cqAnswer3" placeholder="Answer D" maxlength="120">' +
                '</div>' +
            '</div>' +
            '<div class="form-error" id="cqError"></div>' +
            '<button type="submit" class="form-submit-btn">Add Question</button>' +
        '</form>';

    selectedCorrectAnswer = -1;
    renderCustomQuestionsList();
}

var selectedCorrectAnswer = -1;

function setCorrectAnswer(idx) {
    selectedCorrectAnswer = idx;
    for (var i = 0; i < 4; i++) {
        var btn = document.getElementById('cqCorrectBtn' + i);
        if (i === idx) btn.classList.add('selected');
        else btn.classList.remove('selected');
    }
}

function handleCreateQuestion(e) {
    e.preventDefault();
    var errEl = document.getElementById('cqError');
    errEl.style.display = 'none';

    var question = document.getElementById('cqQuestion').value.trim();
    var answers = [];
    for (var i = 0; i < 4; i++) answers.push(document.getElementById('cqAnswer' + i).value.trim());
    var category = document.getElementById('cqCategory').value;

    if (!question) { errEl.textContent = 'Please enter a question.'; errEl.style.display = 'block'; return; }
    if (answers.some(function(a) { return !a; })) { errEl.textContent = 'Please fill in all 4 answers.'; errEl.style.display = 'block'; return; }
    if (selectedCorrectAnswer < 0) { errEl.textContent = 'Click the letter button (A/B/C/D) next to the correct answer.'; errEl.style.display = 'block'; return; }

    var username = getCurrentUsername() || 'Anonymous';
    var newQ = {
        q: question, a: answers, correct: selectedCorrectAnswer,
        createdBy: username, createdAt: new Date().toISOString(),
        category: category, id: 'cq_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4)
    };

    var custom = [];
    try { custom = JSON.parse(localStorage.getItem('trustmyrecord_custom_trivia') || '[]'); } catch(ex) { custom = []; }
    custom.unshift(newQ);
    localStorage.setItem('trustmyrecord_custom_trivia', JSON.stringify(custom));

    document.getElementById('cqQuestion').value = '';
    for (var j = 0; j < 4; j++) {
        document.getElementById('cqAnswer' + j).value = '';
        document.getElementById('cqCorrectBtn' + j).classList.remove('selected');
    }
    selectedCorrectAnswer = -1;
    renderCustomQuestionsList();

    var btn = document.querySelector('.form-submit-btn');
    btn.textContent = 'Question Added!';
    btn.style.background = 'var(--success)';
    setTimeout(function() { btn.textContent = 'Add Question'; btn.style.background = ''; }, 2000);
}

function renderCustomQuestionsList() {
    var container = document.getElementById('customQuestionsList');
    var custom = [];
    try { custom = JSON.parse(localStorage.getItem('trustmyrecord_custom_trivia') || '[]'); } catch(e) {}

    if (custom.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="big-icon">&#128221;</div><p>No custom questions created yet.</p></div>';
        return;
    }

    var html = '';
    custom.forEach(function(cq, idx) {
        var dateStr = cq.createdAt ? new Date(cq.createdAt).toLocaleDateString() : '';
        html += '<div class="custom-q-item">' +
            '<div class="cq-question">' + escapeHtml(cq.q) + '</div>' +
            '<div class="cq-meta">' +
                '<span>' + escapeHtml(cq.category || 'Mixed') + '</span>' +
                '<span>Answer: ' + escapeHtml(cq.a[cq.correct]) + '</span>' +
                '<span>By @' + escapeHtml(cq.createdBy || 'Unknown') + '</span>' +
                '<span>' + dateStr + '</span>' +
                '<button class="cq-delete" onclick="deleteCustomQuestion(' + idx + ')">Delete</button>' +
            '</div></div>';
    });
    container.innerHTML = html;
}

function deleteCustomQuestion(idx) {
    var custom = [];
    try { custom = JSON.parse(localStorage.getItem('trustmyrecord_custom_trivia') || '[]'); } catch(e) {}
    if (idx >= 0 && idx < custom.length) {
        custom.splice(idx, 1);
        localStorage.setItem('trustmyrecord_custom_trivia', JSON.stringify(custom));
        renderCustomQuestionsList();
    }
}

// ================================================================
// UPDATE STATS BAR (from backend)
// ================================================================
async function loadUserStats() {
    var username = getCurrentUsername();
    if (!username) {
        document.getElementById('statTotalPlayed').textContent = '0';
        document.getElementById('statBestScore').textContent = '--';
        document.getElementById('statTotalPoints').textContent = '0';
        document.getElementById('statAccuracy').textContent = '--';
        return;
    }

    try {
        await api.ready;
        var data = await api.request('/trivia/users/' + encodeURIComponent(username) + '/stats');
        var stats = data.stats || data;

        var totalPlayed = stats.quizzes_played || stats.quizzesPlayed || stats.total_sessions || 0;
        var totalPoints = stats.total_points || stats.totalPoints || 0;
        var bestScore = stats.best_score || stats.bestScore || stats.best_percentage || 0;
        var accuracy = stats.accuracy || stats.correct_percentage || stats.avg_accuracy || 0;

        if (typeof accuracy === 'number' && accuracy > 0 && accuracy <= 1) accuracy = Math.round(accuracy * 100);
        if (typeof bestScore === 'number' && bestScore > 0 && bestScore <= 1) bestScore = Math.round(bestScore * 100);

        document.getElementById('statTotalPlayed').textContent = totalPlayed;
        document.getElementById('statBestScore').textContent = totalPlayed > 0 ? Math.round(bestScore) + '%' : '--';
        document.getElementById('statTotalPoints').textContent = totalPoints;
        document.getElementById('statAccuracy').textContent = totalPlayed > 0 ? Math.round(accuracy) + '%' : '--';
    } catch(e) {
        console.error('Failed to load user stats:', e);
    }
}

// ================================================================
// INIT
// ================================================================
document.addEventListener('DOMContentLoaded', async function() {
    await loadCategories();
    loadUserStats();
});
</script>
