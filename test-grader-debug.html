<!DOCTYPE html>
<html>
<head>
    <title>Auto-Grader Debug</title>
    <style>
        body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
        .log { background: #16213e; padding: 10px; margin: 5px 0; border-left: 3px solid #0f3460; }
        .error { border-left-color: #e94560; color: #ff6b6b; }
        .success { border-left-color: #22c55e; color: #22c55e; }
        .warn { border-left-color: #f59e0b; color: #f59e0b; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #0ea5e9; border: none; color: white; }
        pre { background: #0f172a; padding: 10px; overflow-x: auto; }
        .section { margin: 20px 0; padding: 15px; background: #1e293b; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🎰 Auto-Grader Diagnostic Tool</h1>
    
    <div class="section">
        <h2>1. Check Stored Picks</h2>
        <button onclick="checkPicks()">Check tmr_picks</button>
        <button onclick="checkLegacyPicks()">Check legacy picks</button>
        <div id="picks-output"></div>
    </div>
    
    <div class="section">
        <h2>2. Test ESPN API</h2>
        <button onclick="testESPN()">Test ESPN API (NBA)</button>
        <div id="espn-output"></div>
    </div>
    
    <div class="section">
        <h2>3. Manual Grade Test</h2>
        <button onclick="createTestPick()">Create Test Pick</button>
        <button onclick="runManualGrade()">Run Manual Grade</button>
        <div id="grade-output"></div>
    </div>
    
    <div class="section">
        <h2>4. Run Full Auto-Grader</h2>
        <button onclick="runFullGrader()">Run TMR_GRADER</button>
        <div id="full-output"></div>
    </div>

    <script src="static/js/auto-grader.js"></script>
    <script>
        const output = {};
        
        function log(id, msg, type='log') {
            const div = document.getElementById(id);
            const entry = document.createElement('div');
            entry.className = `log ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            div.appendChild(entry);
        }
        
        function checkPicks() {
            const picks = JSON.parse(localStorage.getItem('tmr_picks') || '[]');
            log('picks-output', `Found ${picks.length} picks in tmr_picks`, picks.length ? 'success' : 'warn');
            if (picks.length > 0) {
                log('picks-output', 'Sample pick structure:', 'log');
                document.getElementById('picks-output').innerHTML += '<pre>' + JSON.stringify(picks[0], null, 2) + '</pre>';
            }
        }
        
        function checkLegacyPicks() {
            const picks = JSON.parse(localStorage.getItem('trustmyrecord_picks') || '[]');
            log('picks-output', `Found ${picks.length} picks in trustmyrecord_picks`, picks.length ? 'success' : 'warn');
        }
        
        async function testESPN() {
            log('espn-output', 'Fetching NBA scores from ESPN...');
            try {
                const response = await fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard');
                const data = await response.json();
                const events = data.events || [];
                log('espn-output', `ESPN returned ${events.length} events`, 'success');
                
                if (events.length > 0) {
                    const sample = events[0];
                    log('espn-output', `Sample game: ${sample.name}, Status: ${sample.status?.type?.detail}`, 'log');
                    log('espn-output', `Game ID: ${sample.id}`, 'log');
                    document.getElementById('espn-output').innerHTML += '<pre>' + JSON.stringify({
                        id: sample.id,
                        name: sample.name,
                        status: sample.status,
                        competitors: sample.competitors?.map(c => ({
                            homeAway: c.homeAway,
                            team: c.team?.displayName,
                            score: c.score
                        }))
                    }, null, 2) + '</pre>';
                }
            } catch (e) {
                log('espn-output', `ERROR: ${e.message}`, 'error');
            }
        }
        
        function createTestPick() {
            const testPick = {
                id: 'test_' + Date.now(),
                game_id: 'espn_401705842', // Example game ID - replace with real one
                sport_key: 'basketball_nba',
                sport_title: 'NBA',
                home_team: 'Boston Celtics',
                away_team: 'Los Angeles Lakers',
                market_type: 'h2h',
                selection: 'Boston Celtics',
                odds_snapshot: -150,
                units: 1,
                status: 'pending',
                result: 'pending',
                commence_time: new Date(Date.now() - 86400000).toISOString(), // Yesterday
                created_at: new Date().toISOString()
            };
            
            const picks = JSON.parse(localStorage.getItem('tmr_picks') || '[]');
            picks.unshift(testPick);
            localStorage.setItem('tmr_picks', JSON.stringify(picks));
            log('grade-output', 'Created test pick: ' + testPick.id, 'success');
            log('grade-output', JSON.stringify(testPick, null, 2), 'log');
        }
        
        async function runManualGrade() {
            log('grade-output', 'Running manual grade test...');
            
            const picks = JSON.parse(localStorage.getItem('tmr_picks') || '[]');
            const pending = picks.filter(p => p.status === 'pending');
            
            log('grade-output', `${pending.length} pending picks found`, pending.length ? 'success' : 'warn');
            
            if (pending.length === 0) return;
            
            const pick = pending[0];
            log('grade-output', `Grading pick: ${pick.id}`, 'log');
            log('grade-output', `Game: ${pick.away_team} @ ${pick.home_team}`, 'log');
            log('grade-output', `Selection: ${pick.selection}`, 'log');
            log('grade-output', `Market: ${pick.market_type}`, 'log');
        }
        
        async function runFullGrader() {
            log('full-output', 'Initializing TMR_GRADER...');
            
            if (typeof TMR_GRADER === 'undefined') {
                log('full-output', 'ERROR: TMR_GRADER not loaded!', 'error');
                return;
            }
            
            log('full-output', 'TMR_GRADER found, running init...', 'success');
            
            // Override console.log to capture grader output
            const originalLog = console.log;
            const logs = [];
            console.log = (...args) => {
                const msg = args.join(' ');
                logs.push(msg);
                if (msg.includes('[TMR Grader]')) {
                    log('full-output', msg, 'log');
                }
                originalLog.apply(console, args);
            };
            
            try {
                await TMR_GRADER.init();
                log('full-output', 'Grader init complete!', 'success');
            } catch (e) {
                log('full-output', `ERROR: ${e.message}`, 'error');
                console.error(e);
            }
            
            console.log = originalLog;
        }
    </script>
</body>
</html>
